<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>藥局盤點系統 - 資料維護分流中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-lg rounded-3xl shadow-xl p-6 md:p-8 border border-slate-100 flex flex-col justify-between min-h-[580px]">
        <div>
            <div class="text-center mt-2 mb-6">
                <div class="w-14 h-14 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-3 shadow-sm">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                </div>
                <h1 class="text-2xl font-black text-slate-800 tracking-wide">後台資料維護分流中心</h1>
                <p class="text-xs font-bold text-slate-400 tracking-widest mt-1 uppercase">Changhua Hospital Pharmacy</p>
            </div>

            <div class="bg-slate-50 border border-slate-200/60 p-4 rounded-2xl text-xs text-slate-600 leading-relaxed space-y-1 mb-6">
                <div class="font-bold text-slate-700 text-sm flex items-center gap-1 mb-1"><i class="fa-solid fa-layer-group text-emerald-500"></i> 多規格全欄位補齊機制：</div>
                <p>1. 📦 **散裝欄位強制回歸**：例如 `1盒=10排,1排=5支`，手機端將完美呈現 **盒、排、支** 三個輸入框，絕不遺漏任何最末端散裝！</p>
                <p>2. 自動校正複合單位的最小階乘，確保雲端加總數量精確無誤。</p>
            </div>

            <div class="space-y-4">
                <div class="border border-slate-200 p-4 rounded-2xl bg-white shadow-sm hover:border-teal-400 transition">
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">💊</span>
                            <span class="font-black text-slate-800 text-sm">口服藥品 基本庫更新</span>
                        </div>
                        <span id="status-oral" class="text-[11px] font-bold text-slate-400">尚未上傳</span>
                    </div>
                    <input type="file" id="excelOral" accept=".xlsx, .xls" class="hidden" onchange="uploadDatabase('oral', this)">
                    <button onclick="document.getElementById('excelOral').click()" class="w-full bg-gradient-to-r from-teal-600 to-cyan-600 text-white font-bold py-2.5 rounded-xl text-xs shadow-sm active:scale-95 transition flex items-center justify-center gap-1.5 cursor-pointer">
                        <i class="fa-solid fa-file-import"></i> 匯入口服藥總表
                    </button>
                </div>

                <div class="border border-slate-200 p-4 rounded-2xl bg-white shadow-sm hover:border-indigo-400 transition">
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">💉</span>
                            <span class="font-black text-slate-800 text-sm">針劑/外用 基本庫更新</span>
                        </div>
                        <span id="status-inject" class="text-[11px] font-bold text-slate-400">尚未上傳</span>
                    </div>
                    <input type="file" id="excelInject" accept=".xlsx, .xls" class="hidden" onchange="uploadDatabase('inject', this)">
                    <button onclick="document.getElementById('excelInject').click()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-2.5 rounded-xl text-xs shadow-sm active:scale-95 transition flex items-center justify-center gap-1.5 cursor-pointer">
                        <i class="fa-solid fa-file-import"></i> 匯入針劑外用盤點表
                    </button>
                </div>

                <div class="pt-2">
                    <button onclick="resetInventoryRecords()" class="w-full bg-white hover:bg-red-50 border-2 border-red-200 hover:border-red-400 text-red-600 font-black py-3 rounded-2xl text-xs shadow-sm active:scale-95 transition flex items-center justify-center gap-1.5 cursor-pointer">
                        <i class="fa-solid fa-trash-can animate-pulse"></i> 🧹 刪除並清空全院盤點數據 (不影響基本庫)
                    </button>
                </div>
            </div>
        </div>

        <div class="mt-6 pt-4 border-t border-slate-100 flex justify-between items-center">
            <a href="inventory_login.html" class="text-xs font-bold text-slate-400 hover:text-slate-600 transition flex items-center gap-1"><i class="fa-solid fa-arrow-left"></i> 返回登入頁</a>
            <span class="text-[10px] text-slate-300 font-mono">v8.80-multi-spec-fixed</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, remove } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
            authDomain: "drug--arrive.firebaseapp.com",
            databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
            projectId: "drug--arrive",
            storageBucket: "drug--arrive.appspot.com",
            messagingSenderId: "215426668369",
            appId: "1:215426668369:web:eaa94e83974fcec391a570"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.resetInventoryRecords = function() {
            if (!confirm("⚠️ 警告！確定要清空目前所有已盤點的數量紀錄嗎？")) return;
            if (prompt("請輸入 RESET 確認：") !== "RESET") return;
            remove(ref(db, 'inventoryRecords')).then(() => alert("🎉 全院盤點數據已成功歸零！"));
        };

        window.uploadDatabase = function(type, element) {
            const file = element.files[0];
            if (!file) return;

            const statusLabel = document.getElementById(`status-${type}`);
            statusLabel.className = "text-[11px] font-bold text-blue-500 animate-pulse";
            statusLabel.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 規格補齊同步中...`;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                let newMasterList = {};
                let parsedCount = 0;
                let globalIndex = 0;

                workbook.SheetNames.forEach(sheetName => {
                    if (sheetName.includes('工作表') || sheetName === '工作表9') return;

                    const worksheet = workbook.Sheets[sheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });

                    let headerIndex = -1;
                    for (let i = 0; i < jsonData.length; i++) {
                        const rowStr = JSON.stringify(jsonData[i]);
                        if (rowStr.includes('藥品碼') || rowStr.includes('藥碼')) {
                            headerIndex = i;
                            break;
                        }
                    }
                    if (headerIndex === -1) headerIndex = 1;

                    const headers = jsonData[headerIndex] || [];
                    const locIdx = headers.findIndex(h => String(h).includes('位號') || String(h).includes('儲位'));
                    const codeIdx = headers.findIndex(h => String(h).includes('藥品碼') || String(h).includes('藥碼'));
                    const nameIdx = headers.findIndex(h => String(h).includes('品名') || String(h).includes('名稱'));

                    for (let j = headerIndex + 1; j < jsonData.length; j++) {
                        const row = jsonData[j];
                        if (!row || !row[codeIdx]) continue;

                        const drugCode = String(row[codeIdx]).trim();
                        if (drugCode === "undefined" || drugCode === "" || drugCode.includes('藥品碼')) continue;

                        const drugName = row[nameIdx] ? String(row[nameIdx]).trim() : '無對應藥名';
                        const locationValue = row[locIdx] ? String(row[locIdx]).trim() : '';
                        
                        let isMultiSpec = false;
                        let hasCustomSpec = false;
                        let specArray = [];
                        let rateBoxToPiece = 1; 
                        let unitBox = "";
                        let unitPiece = (sheetName.includes('外用') || sheetName.includes('少用')) ? "罐" : "支";
                        let descStr = "純散裝品項";

                        row.forEach(cell => {
                            if (!cell) return;
                            let rawText = String(cell).trim();
                            let cellText = rawText.replace(/\s+/g, '').replace(/，/g, ',').replace(/＝/g, '=').replace(/'/g, '');
                            
                            if (cellText.includes('=')) {
                                try {
                                    if (cellText.includes(',')) {
                                        // 🌟 多規格解析中心：例如 1盒=10排,1排=5支
                                        isMultiSpec = true;
                                        descStr = cellText;
                                        specArray = [];
                                        
                                        let tempSubs = cellText.split(',');
                                        
                                        // 1. 先把前面的各階層（如：盒、排）塞進去
                                        tempSubs.forEach(sub => {
                                            const parts = sub.split('=');
                                            if (parts.length === 2) {
                                                let labelStr = parts[0].trim();
                                                let rateNum = parseInt(parts[1].match(/\d+/)[0]) || 1;
                                                specArray.push({ label: labelStr, rate: rateNum });
                                            }
                                        });

                                        // 2. 🎯 終極補漏：把最後一階等號右邊的散裝單位（如：支）也強制補成獨立欄位，比率為 1
                                        let lastSub = tempSubs[tempSubs.length - 1];
                                        if (lastSub && lastSub.includes('=')) {
                                            let lastRightSide = lastSub.split('=')[1];
                                            let unitMatch = lastRightSide.match(/[^\d]+/);
                                            if (unitMatch) {
                                                unitPiece = unitMatch[0].trim(); // 抓出 "支"
                                                // 強制追加最末梢的散裝欄位，讓畫面長出輸入框
                                                specArray.push({ label: unitPiece, rate: 1 });
                                            }
                                        }
                                    } else {
                                        // 🌟 單一自訂雙單位：例如 1盒=30片
                                        let parts = cellText.split('=');
                                        if (parts.length === 2) {
                                            let u1Match = parts[0].match(/[^\d]+/);
                                            let rateMatch = parts[1].match(/\d+/);
                                            let u2Match = parts[1].match(/[^\d]+/);
                                            
                                            if (u1Match && rateMatch && u2Match) {
                                                hasCustomSpec = true;
                                                unitBox = u1Match[0].trim();
                                                rateBoxToPiece = parseInt(rateMatch[0]);
                                                unitPiece = u2Match[0].trim();
                                                descStr = `實行包裝：1${unitBox} = ${rateBoxToPiece}${unitPiece}`;
                                            }
                                        }
                                    }
                                } catch (e) {
                                    // 容錯跳過
                                }
                            }
                        });

                        globalIndex++;
                        const uniquePrimaryKey = `${drugCode}_${locationValue || '0'}_${globalIndex}`;

                        newMasterList[uniquePrimaryKey] = {
                            id: drugCode,
                            name: drugName,
                            subZone: sheetName,
                            location: locationValue,
                            unitBox: unitBox,
                            unitPiece: unitPiece,
                            rateBoxToPiece: rateBoxToPiece,
                            desc: descStr,
                            mainType: type,
                            sortOrder: globalIndex,
                            dbKey: uniquePrimaryKey,
                            isMultiSpec: isMultiSpec,
                            hasCustomSpec: hasCustomSpec,
                            specArray: specArray
                        };
                        parsedCount++;
                    }
                });

                if (parsedCount > 0) {
                    const nodePath = (type === 'oral') ? 'masterOralList' : 'masterInjectList';
                    set(ref(db, nodePath), newMasterList).then(() => {
                        statusLabel.className = "text-[11px] font-bold text-green-600";
                        statusLabel.innerHTML = `<i class="fa-solid fa-circle-check"></i> 同步完成 (${parsedCount}品項)`;
                        alert(`🎉 散裝欄位補齊完畢！手機端現在會完整出現三層輸入框囉！`);
                    });
                }
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
