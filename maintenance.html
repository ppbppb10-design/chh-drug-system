<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>藥局盤點系統 - 資料維護分流中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-lg rounded-3xl shadow-xl p-6 md:p-8 border border-slate-100 flex flex-col justify-between min-h-[550px]">
        <div>
            <div class="text-center mt-2 mb-6">
                <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-3 shadow-sm">
                    <i class="fa-solid fa-screwdriver-wrench"></i>
                </div>
                <h1 class="text-2xl font-black text-slate-800 tracking-wide">後台資料維護分流中心</h1>
                <p class="text-xs font-bold text-slate-400 tracking-widest mt-1 uppercase">Changhua Hospital Pharmacy</p>
            </div>

            <div class="bg-slate-50 border border-slate-200/60 p-4 rounded-2xl text-xs text-slate-600 leading-relaxed space-y-1 mb-6">
                <div class="font-bold text-slate-700 text-sm flex items-center gap-1 mb-1"><i class="fa-solid fa-folder-tree text-blue-500"></i> 彰醫專屬 Excel 規格已優化：</div>
                <p>1. 系統已適應首行大標題結構，自動精準定位第二行標頭。</p>
                <p>2. 已鎖定欄位：<span class="font-bold text-blue-600">「位號」</span>、<span class="font-bold text-blue-600">「藥品碼」</span>、<span class="font-bold text-blue-600">「聯標品名」</span>。</p>
                <p>3. 自動跳過工作表1、工作表9、UD藍標預包區外用等無效分頁。</p>
            </div>

            <div class="space-y-4">
                <!-- 口服藥匯入端 -->
                <div class="border border-slate-200 p-4 rounded-2xl bg-white shadow-sm hover:border-teal-400 transition">
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">💊</span>
                            <span class="font-black text-slate-800 text-sm">口服藥品 基本庫更新</span>
                        </div>
                        <span id="status-oral" class="text-[11px] font-bold text-slate-400">尚未上傳</span>
                    </div>
                    <input type="file" id="excelOral" accept=".xlsx, .xls" class="hidden" onchange="uploadDatabase('oral', this)">
                    <button onclick="document.getElementById('excelOral').click()" class="w-full bg-gradient-to-r from-teal-600 to-cyan-600 text-white font-bold py-2.5 rounded-xl text-xs shadow-sm active:scale-95 transition flex items-center justify-center gap-1.5 cursor-pointer">
                        <i class="fa-solid fa-file-import"></i> 匯入口服藥總表
                    </button>
                </div>

                <!-- 針劑外用匯入端 (完美支援 11504 盤點表) -->
                <div class="border border-slate-200 p-4 rounded-2xl bg-white shadow-sm hover:border-indigo-400 transition">
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">💉</span>
                            <span class="font-black text-slate-800 text-sm">針劑/外用 基本庫更新</span>
                        </div>
                        <span id="status-inject" class="text-[11px] font-bold text-slate-400">尚未上傳</span>
                    </div>
                    <input type="file" id="excelInject" accept=".xlsx, .xls" class="hidden" onchange="uploadDatabase('inject', this)">
                    <button onclick="document.getElementById('excelInject').click()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-2.5 rounded-xl text-xs shadow-sm active:scale-95 transition flex items-center justify-center gap-1.5 cursor-pointer">
                        <i class="fa-solid fa-file-import"></i> 匯入針劑外用盤點表
                    </button>
                </div>
            </div>
        </div>

        <div class="mt-6 pt-4 border-t border-slate-100 flex justify-between items-center">
            <a href="inventory_login.html" class="text-xs font-bold text-slate-400 hover:text-slate-600 transition flex items-center gap-1"><i class="fa-solid fa-arrow-left"></i> 返回登入頁</a>
            <span class="text-[10px] text-slate-300 font-mono">v5.60-chh-final</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
            authDomain: "drug--arrive.firebaseapp.com",
            databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
            projectId: "drug--arrive",
            storageBucket: "drug--arrive.appspot.com",
            messagingSenderId: "215426668369",
            appId: "1:215426668369:web:eaa94e83974fcec391a570"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.uploadDatabase = function(type, element) {
            const file = element.files[0];
            if (!file) return;

            const statusLabel = document.getElementById(`status-${type}`);
            statusLabel.className = "text-[11px] font-bold text-blue-500 animate-pulse";
            statusLabel.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 正在沖刷雲端...`;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                let newMasterList = {};
                let parsedCount = 0;

                workbook.SheetNames.forEach(sheetName => {
                    // 🎯 智慧篩選：只抓取您指定的實體儲位頁籤
                    if (sheetName.includes('工作表') || sheetName.includes('UD藍標')) return;

                    const worksheet = workbook.Sheets[sheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                    // 🎯 核心修正：主動向下巡迴，尋找「藥品碼」標頭行 (完美解決 Row 1 標題干擾)
                    let headerIndex = -1;
                    for (let i = 0; i < jsonData.length; i++) {
                        const rowStr = JSON.stringify(jsonData[i]);
                        if (rowStr.includes('藥品碼') || rowStr.includes('藥碼')) {
                            headerIndex = i;
                            break;
                        }
                    }

                    // 如果真的找不到，預設向下抓第二行 (Index 1)
                    if (headerIndex === -1) headerIndex = 1;

                    const headers = jsonData[headerIndex] || [];
                    const locIdx = headers.findIndex(h => String(h).includes('位號'));
                    const codeIdx = headers.findIndex(h => String(h).includes('藥品碼') || String(h).includes('藥碼'));
                    const nameIdx = headers.findIndex(h => String(h).includes('品名') || String(h).includes('名稱'));

                    // 從標頭行的下一行開始掃描
                    for (let j = headerIndex + 1; j < jsonData.length; j++) {
                        const row = jsonData[j];
                        if (!row || !row[codeIdx]) continue; // 沒藥碼就跳過

                        const drugCode = String(row[codeIdx]).trim();
                        if (drugCode === "undefined" || drugCode === "" || drugCode.includes('藥品碼')) continue;

                        const drugName = row[nameIdx] ? String(row[nameIdx]).trim() : '無對應藥名';
                        const locationValue = row[locIdx] ? String(row[locIdx]).trim() : '';
                        
                        // 自動為口服與針劑設定外觀單位規則
                        let rate1 = 10;
                        let unit1 = "盒", unit2 = "支";
                        if (sheetName.includes('外用') || sheetName.includes('少用')) {
                            rate1 = 1; unit1 = "盒"; unit2 = "罐";
                        }

                        newMasterList[drugCode] = {
                            id: drugCode,
                            name: drugName,
                            subZone: sheetName,       // 分頁名稱 (如：外用庫存區)
                            location: locationValue,  // 位號 (如：1, 2)
                            rate1: rate1,
                            unit1: unit1,
                            unit2: unit2,
                            desc: `1${unit1} = ${rate1}${unit2}`,
                            mainType: type
                        };
                        parsedCount++;
                    }
                });

                if (parsedCount > 0) {
                    const nodePath = (type === 'oral') ? 'masterOralList' : 'masterInjectList';
                    set(ref(db, nodePath), newMasterList).then(() => {
                        statusLabel.className = "text-[11px] font-bold text-green-600";
                        statusLabel.innerHTML = `<i class="fa-solid fa-circle-check"></i> 同步完成 (${parsedCount}品項)`;
                        alert(`🎉 彰醫專屬基本庫上傳成功！\n系統已完美解析第二行標頭，共匯入 ${parsedCount} 筆藥品數據！`);
                    });
                } else {
                    statusLabel.className = "text-[11px] font-bold text-red-500";
                    statusLabel.innerText = "❌ 解析失敗";
                    alert("匯入失敗！請確認 Excel 的第二行有包含「藥品碼」與「聯標品名」的標頭。");
                }
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
