<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彰化醫院藥劑科管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .portal-card { transition: all 0.2s ease-in-out; }
        .portal-card:hover { transform: translateY(-3px); box-shadow: 0 12px 20px -3px rgba(59, 130, 246, 0.15); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-7xl mx-auto md:p-6 p-3 space-y-8">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 text-white p-3 rounded-2xl shadow-md text-2xl">🏥</div>
                <div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-wide">彰化醫院 藥劑科管理系統</h1>
                    <p class="text-xs font-bold text-slate-400 tracking-widest uppercase mt-0.5">Changhua Hospital Pharmacy Department</p>
                </div>
            </div>
            <div class="flex gap-2 text-xs">
                <button onclick="alert('目前字級已設定為最適大小')" class="bg-slate-100 text-slate-600 px-3 py-2 rounded-xl border font-bold">較小</button>
                <button onclick="alert('目前字級已設定為最適大小')" class="bg-slate-100 text-slate-600 px-3 py-2 rounded-xl border font-bold">較大</button>
            </div>
        </div>

        <div class="space-y-4">
            <h2 class="text-md font-black text-blue-700 flex items-center gap-2 border-b pb-1">⚙️ 一、行政管理與查詢</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                <div class="portal-card bg-white p-5 rounded-2xl border flex items-center gap-4 cursor-pointer" onclick="alert('排班系統建置中...')">
                    <span class="text-3xl bg-purple-50 p-3 rounded-xl">📅</span>
                    <span class="font-bold text-slate-700 text-lg">線上排班系統</span>
                </div>
                <div class="portal-card bg-white p-5 rounded-2xl border flex items-center gap-4 cursor-pointer" onclick="alert('廢片系統建置中...')">
                    <span class="text-3xl bg-blue-50 p-3 rounded-xl">🩻</span>
                    <span class="font-bold text-slate-700 text-lg">Fentanyl 廢片</span>
                </div>
                <div class="portal-card bg-white p-5 rounded-2xl border flex items-center gap-4 cursor-pointer" onclick="location.href='inventory.html'">
                    <span class="text-3xl bg-indigo-50 p-3 rounded-xl">📋</span>
                    <span class="font-bold text-slate-700 text-lg">盤點系統</span>
                </div>
                <div class="portal-card bg-white p-5 rounded-2xl border flex items-center gap-4 cursor-pointer" onclick="alert('處方集載入中...')">
                    <span class="text-3xl bg-cyan-50 p-3 rounded-xl">📘</span>
                    <span class="font-bold text-slate-700 text-lg">院內處方集</span>
                </div>
                <div class="portal-card bg-white p-5 rounded-2xl border flex items-center gap-4 cursor-pointer" onclick="alert('儲位系統載入中...')">
                    <span class="text-3xl bg-emerald-50 p-3 rounded-xl">🔍</span>
                    <span class="font-bold text-slate-700 text-lg">西藥儲位</span>
                </div>
                <div class="portal-card bg-gradient-to-br from-blue-600 to-indigo-600 p-5 rounded-2xl flex items-center gap-4 cursor-pointer shadow-md text-white" onclick="routeToTransfer()">
                    <span class="text-3xl bg-white/20 p-3 rounded-xl shadow-inner">🚑</span>
                    <div>
                        <span class="font-black text-xl block">撥補 / 急領</span>
                        <span class="text-[10px] opacity-80 font-bold">缺藥調撥即時通知</span>
                    </div>
                </div>
                <div class="portal-card bg-white p-5 rounded-2xl border flex items-center gap-4 cursor-pointer" onclick="alert('UD系統載入中...')">
                    <span class="text-3xl bg-orange-50 p-3 rounded-xl">🍴</span>
                    <span class="font-bold text-slate-700 text-lg">UD 點餐單</span>
                </div>
                <div class="portal-card bg-white p-5 rounded-2xl border flex items-center gap-4 cursor-pointer" onclick="alert('會議系統載入中...')">
                    <span class="text-3xl bg-slate-50 p-3 rounded-xl">📄</span>
                    <span class="font-bold text-slate-700 text-lg">科會記錄</span>
                </div>
            </div>
        </div>

        <div class="space-y-4 pt-4">
            <h2 class="text-md font-black text-emerald-700 flex items-center gap-2 border-b pb-1">🎓 二、教學與諮詢</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                <div class="portal-card bg-white p-5 rounded-2xl border flex items-center gap-4 cursor-pointer" onclick="location.href='sop.html'">
                    <span class="text-3xl bg-teal-50 p-3 rounded-xl">🧑‍🏫</span>
                    <span class="font-bold text-slate-700 text-lg">工作SOP</span>
                </div>
                <div class="portal-card bg-white p-5 rounded-2xl border flex items-center gap-4 cursor-pointer" onclick="alert('建置中...')">
                    <span class="text-3xl bg-cyan-50 p-3 rounded-xl">🔢</span>
                    <span class="font-bold text-slate-700 text-lg">Wegovy 換算器</span>
                </div>
                <div class="portal-card bg-white p-5 rounded-2xl border flex items-center gap-4 cursor-pointer" onclick="alert('建置中...')">
                    <span class="text-3xl bg-green-50 p-3 rounded-xl">👥</span>
                    <span class="font-bold text-slate-700 text-lg">民眾藥品查詢</span>
                </div>
                <div class="portal-card bg-white p-5 rounded-2xl border flex items-center gap-4 cursor-pointer" onclick="alert('建置中...')">
                    <span class="text-3xl bg-lime-50 p-3 rounded-xl">🍃</span>
                    <span class="font-bold text-slate-700 text-lg">保健營養品</span>
                </div>
            </div>
        </div>

        <div class="space-y-4 pt-4">
            <h2 class="text-md font-black text-red-700 flex items-center gap-2 border-b pb-1">🚨 三、品質通報專區</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                <div class="portal-card bg-white p-5 rounded-2xl border flex items-center gap-4 cursor-pointer" onclick="alert('建置中...')">
                    <span class="text-3xl bg-red-50 p-3 rounded-xl">❓</span>
                    <span class="font-bold text-slate-700 text-lg">疑義處方登記</span>
                </div>
                <div class="portal-card bg-white p-5 rounded-2xl border flex items-center gap-4 cursor-pointer"
