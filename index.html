<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彰化醫院藥劑科 - 缺藥調撥系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .active-form { background-color: #3b82f6 !important; color: white !important; }
        .mode-arriving { background: #fee2e2; animation: flashRed 1.5s infinite; }
        @keyframes flashRed { 0%, 100% { background: #fee2e2; } 50% { background: #fecaca; } }
        .mode-elevator { background: #fff3cd; animation: flashYellow 1.5s infinite; }
        @keyframes flashYellow { 0%, 100% { background: #fff3cd; } 50% { background: #ffeeba; } }
        .btn-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); } 100% { transform: scale(1); } }
        .role-hidden { display: none !important; }
    </style>
</head>
<body id="bodyTag" class="bg-slate-100 min-h-screen transition-colors duration-500">

    <div class="max-w-6xl mx-auto md:p-6 p-2">
        <div class="bg-white p-4 rounded-t-xl border-b flex justify-between items-center shadow-sm">
            <h1 class="text-xl font-bold text-slate-700">彰化醫院 藥品調撥通知</h1>
            <div class="flex gap-2">
                <input type="file" id="fileInput" class="hidden" onchange="importDrugDb(this)">
                <button onclick="document.getElementById('fileInput').click()" class="text-[10px] border px-2 py-1 rounded bg-slate-50">📁 匯入庫存</button>
                <button onclick="resetToIdle()" class="text-[10px] bg-white border border-slate-300 px-2 py-1 rounded">🔄 重設</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 bg-white p-4 rounded-b-xl shadow-lg">
            <div id="pharmacySection" class="lg:col-span-5 space-y-4 bg-slate-50 p-4 rounded-lg border">
                <h2 class="text-sm font-bold text-blue-600 border-b pb-2">Step 1. 藥局端：填寫缺藥</h2>
                <div class="grid grid-cols-3 gap-2 mb-3">
                    <button onclick="setForm('口服', this)" class="form-btn border bg-white py-2 rounded-lg text-xs">口服</button>
                    <button onclick="setForm('針劑', this)" class="form-btn border bg-white py-2 rounded-lg text-xs">針劑</button>
                    <button onclick="setForm('外用', this)" class="form-btn border bg-white py-2 rounded-lg text-xs">外用</button>
                </div>
                <input type="text" id="searchInput" autocomplete="off" placeholder="搜尋缺藥名稱..." class="w-full p-4 border-2 rounded-xl outline-none focus:border-blue-500">
                <ul id="suggestList" class="absolute z-50 w-64 bg-white border rounded-lg mt-1 shadow-2xl hidden max-h-48 overflow-y-auto"></ul>

                <div id="confirmBox" class="bg-blue-100 p-3 rounded-lg border border-blue-200 hidden">
                    <div id="selectedDrugName" class="font-bold text-blue-900 text-sm"></div>
                    <div id="selectedDrugInfo" class="text-[10px] text-blue-700"></div>
                </div>

                <div class="flex gap-4">
                    <input type="number" id="qtyInput" value="1" class="w-20 p-3 border rounded-lg font-bold text-center">
                    <button onclick="addToCart()" class="flex-grow bg-blue-600 text-white font-bold rounded-lg shadow active:scale-95 transition">加入清單</button>
                </div>
                
                <button onclick="submitTransfer()" id="submitBtn" disabled class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold opacity-30 shadow-lg">🚀 送出缺藥通知</button>
            </div>

            <div id="warehouseSection" class="lg:col-span-7 flex flex-col">
                <div id="statusLabel" class="text-center font-bold p-3 mb-2 rounded bg-slate-100 text-slate-500 text-sm italic">系統待機中...</div>
                <div class="flex-grow border rounded-lg bg-slate-50 min-h-[300px] overflow-y-auto mb-4">
                    <table class="w-full text-xs">
                        <thead class="bg-slate-200 sticky top-0">
                            <tr><th class="p-3 text-left">藥名規格</th><th class="p-3 text-center w-16">數量</th><th class="p-3 w-8"></th></tr>
                        </thead>
                        <tbody id="cartBody" class="bg-white divide-y"></tbody>
                    </table>
                </div>
                <div id="actionArea" class="space-y-3">
                    <button onclick="receiveAndDownload()" id="receiveBtn" class="hidden w-full bg-red-600 text-white py-6 rounded-2xl font-bold text-xl shadow-xl btn-pulse">✅ 收到藥局缺藥調撥</button>
                    <button onclick="sendToElevator()" id="elevatorBtn" class="hidden w-full bg-green-600 text-white py-6 rounded-2xl font-bold text-xl shadow-xl">📦 藥品已放入電梯</button>
                    <button onclick="resetToIdle()" id="doneBtn" class="hidden w-full bg-slate-700 text-white py-6 rounded-2xl font-bold text-xl shadow-xl">✅ 已領取藥品 (解除廣播)</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        // === 1. 角色判斷邏輯 ===
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role'); // ?role=pharmacy 或 ?role=warehouse
        if (role === 'pharmacy') {
            document.getElementById('warehouseSection').classList.add('lg:col-span-12');
            document.getElementById('warehouseSection').classList.remove('lg:col-span-7');
            document.getElementById('actionArea').classList.add('role-hidden');
        } else if (role === 'warehouse') {
            document.getElementById('pharmacySection').classList.add('role-hidden');
            document.getElementById('warehouseSection').classList.add('lg:col-span-12');
            document.getElementById('warehouseSection').classList.remove('lg:col-span-7');
        }

        // === 2. Firebase 設定 ===
        const firebaseConfig = {
            apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
            authDomain: "drug--arrive.firebaseapp.com",
            databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
            projectId: "drug--arrive",
            storageBucket: "drug--arrive.firebasestorage.app",
            messagingSenderId: "215426668369",
            appId: "1:215426668369:web:eaa94e83974fcec391a570"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const statusRef = ref(db, 'combinedSystemStatus');

        let drugDb = JSON.parse(localStorage.getItem('savedDrugDb')) || [];
        let cart = [];
        let currentDrug = null;
        let selectedForm = '';
        let pendingItems = [];
        let alertInterval = null;

        function playVoice(text) {
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            window.speechSynthesis.speak(msg);
        }

        function startVoiceLoop(text) {
            if (alertInterval) clearInterval(alertInterval);
            playVoice(text);
            alertInterval = setInterval(() => playVoice(text), 6000);
        }

        window.submitTransfer = function() {
            set(statusRef, { state: "arriving", items: cart, time: new Date().getTime() });
            cart = []; renderCart();
        };

        window.receiveAndDownload = function() {
            if (pendingItems.length > 0) {
                const ws = XLSX.utils.json_to_sheet(pendingItems.map(i => ({ "藥碼": i.id, "藥名": i.name, "數量": i.qty, "時間": i.time })));
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "清單");
                XLSX.writeFile(wb, `藥局缺藥單_${new Date().getTime()}.xlsx`);
            }
            set(statusRef, { state: "preparing" });
        };

        window.sendToElevator = function() { set(statusRef, { state: "in_elevator" }); };
        window.resetToIdle = function() { set(statusRef, { state: "idle", items: [] }); };

        onValue(statusRef, (snapshot) => {
            const data = snapshot.val();
            const body = document.getElementById('bodyTag');
            const label = document.getElementById('statusLabel');
            const btnR = document.getElementById('receiveBtn');
            const btnE = document.getElementById('elevatorBtn');
            const btnD = document.getElementById('doneBtn');

            [btnR, btnE, btnD].forEach(b => b.classList.add('hidden'));
            body.className = "bg-slate-100 min-h-screen transition-colors";

            if (!data || data.state === "idle") {
                label.innerText = "🟢 系統待機中";
                label.className = "text-center font-bold p-3 mb-2 rounded bg-slate-100 text-slate-500 text-sm";
                if(alertInterval) { clearInterval(alertInterval); alertInterval = null; }
            } 
            else if (data.state === "arriving") {
                pendingItems = data.items || [];
                label.innerText = "🚨 藥局缺藥調撥申請中！";
                label.className = "text-center font-bold p-3 mb-2 rounded bg-red-600 text-white";
                body.classList.add('mode-arriving');
                btnR.classList.remove('hidden');
                // 只有藥庫端才播放缺藥聲音
                if(role === 'warehouse') startVoiceLoop("藥局有缺藥調撥申請，請確認清單並簽收");
            }
            else if (data.state === "preparing") {
                label.innerText = "⏳ 藥庫處理中 (請將藥品送至電梯)";
                label.className = "text-center font-bold p-3 mb-2 rounded bg-blue-100 text-blue-700 text-sm";
                btnE.classList.remove('hidden');
                if(alertInterval) { clearInterval(alertInterval); alertInterval = null; }
            }
            else if (data.state === "in_elevator") {
                label.innerText = "📦 藥品已在電梯，等候領取";
                label.className = "text-center font-bold p-3 mb-2 rounded bg-yellow-400 text-yellow-900";
                body.classList.add('mode-elevator');
                btnD.classList.remove('hidden');
                // 只有藥局端才播放送達聲音
                if(role === 'pharmacy') startVoiceLoop("藥品已送達，請至電梯口簽收");
            }
        });

        // 原有搜尋功能
        const searchInput = document.getElementById('searchInput');
        const suggestList = document.getElementById('suggestList');
        searchInput.addEventListener('input', () => {
            const val = searchInput.value.trim().toUpperCase();
            suggestList.innerHTML = '';
            if (!val || drugDb.length === 0) return suggestList.classList.add('hidden');
            const matches = drugDb.filter(d => (String(d.id).toUpperCase().includes(val) || String(d.name).toUpperCase().includes(val)) && (selectedForm ? d.form === selectedForm : true)).slice(0, 10);
            matches.forEach(drug => {
                const li = document.createElement('li');
                li.className = "p-3 border-b hover:bg-blue-50 cursor-pointer flex justify-between text-xs";
                li.innerHTML = `<span>${drug.name}</span><span class="text-slate-400">${drug.id}</span>`;
                li.onclick = () => {
                    currentDrug = drug;
                    document.getElementById('confirmBox').classList.remove('hidden');
                    document.getElementById('selectedDrugName').innerText = drug.name;
                    document.getElementById('selectedDrugInfo').innerText = `${drug.id} | ${drug.form}`;
                    searchInput.value = drug.name; suggestList.classList.add('hidden');
                };
                suggestList.appendChild(li);
            });
            suggestList.classList.remove('hidden');
        });

        window.addToCart = function() {
            if (!currentDrug) return alert("請先選擇藥品");
            cart.push({ ...currentDrug, qty: document.getElementById('qtyInput').value, time: new Date().toLocaleTimeString() });
            renderCart();
            currentDrug = null; searchInput.value = ''; document.getElementById('confirmBox').classList.add('hidden');
        };

        function renderCart() {
            const tbody = document.getElementById('cartBody');
            const btn = document.getElementById('submitBtn');
            btn.disabled = cart.length === 0;
            btn.classList.toggle('opacity-30', cart.length === 0);
            btn.classList.toggle('opacity-100', cart.length > 0);
            tbody.innerHTML = cart.map((item, index) => `<tr class="text-[10px]"><td class="p-3"><b>${item.name}</b><br>${item.id}</td><td class="p-3 text-center font-bold text-blue-600">${item.qty}</td><td class="p-3"><button onclick="removeFromCart(${index})" class="text-red-300">✕</button></td></tr>`).join('');
        }

        window.removeFromCart = (idx) => { cart.splice(idx,1); renderCart(); };
        window.setForm = (form, btn) => {
            selectedForm = (selectedForm === form) ? '' : form;
            document.querySelectorAll('.form-btn').forEach(b => b.classList.remove('active-form'));
            if(selectedForm) btn.classList.add('active-form');
            searchInput.dispatchEvent(new Event('input'));
        };
        window.importDrugDb = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                drugDb = json.map(i => ({ id: i['藥碼']||i['ID']||Object.values(i)[0], name: i['藥名']||i['Name']||Object.values(i)[1], form: i['劑型']||i['Form']||Object.values(i)[2] }));
                localStorage.setItem('savedDrugDb', JSON.stringify(drugDb));
                alert("資料匯入成功！"); location.reload();
            };
            reader.readAsArrayBuffer(input.files[0]);
        };
    </script>
</body>
</html>
