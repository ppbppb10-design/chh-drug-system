<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>彰化醫院藥劑科 - 缺藥調撥系統</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .active-form { background-color: #3b82f6 !important; color: white !important; }
        .mode-arriving { background: #fee2e2; animation: flashRed 1.5s infinite; }
        @keyframes flashRed { 0%, 100% { background: #fee2e2; } 50% { background: #fecaca; } }
        .mode-elevator { background: #fff3cd; animation: flashYellow 1.5s infinite; }
        @keyframes flashYellow { 0%, 100% { background: #fff3cd; } 50% { background: #ffeeba; } }
        .btn-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); } 100% { transform: scale(1); } }
        .role-hidden { display: none !important; }
    </style>
</head>
<body id="bodyTag" class="bg-slate-100 min-h-screen">

    <div class="max-w-6xl mx-auto md:p-6 p-2">
        <div class="bg-white p-4 rounded-t-xl border-b flex justify-between items-center shadow-sm">
            <h1 class="text-xl font-bold text-slate-700">彰化醫院 藥品調撥系統</h1>
            <div class="flex gap-2">
                <input type="file" id="fileInput" class="hidden" onchange="importDrugDb(this)">
                <button onclick="document.getElementById('fileInput').click()" class="text-[10px] border px-2 py-1 rounded bg-slate-50">📁 匯入</button>
                <button onclick="resetToIdle()" class="text-[10px] bg-white border border-slate-300 px-2 py-1 rounded text-red-500 font-bold">🔄 重設</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 bg-white p-4 rounded-b-xl shadow-lg">
            <div id="pharmacySection" class="lg:col-span-5 space-y-4 bg-slate-50 p-4 rounded-lg border">
                <h2 class="text-sm font-bold text-blue-600 border-b pb-2 italic">1. 藥局搜尋</h2>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setForm('口服', this)" class="form-btn border bg-white py-2 rounded-lg text-xs">口服</button>
                    <button onclick="setForm('針劑', this)" class="form-btn border bg-white py-2 rounded-lg text-xs">針劑</button>
                    <button onclick="setForm('外用', this)" class="form-btn border bg-white py-2 rounded-lg text-xs">外用</button>
                </div>
                <input type="text" id="searchInput" autocomplete="off" placeholder="搜尋藥名或代碼..." class="w-full p-4 border-2 rounded-xl outline-none focus:border-blue-500">
                <ul id="suggestList" class="absolute z-50 w-64 bg-white border rounded-lg mt-1 shadow-2xl hidden max-h-48 overflow-y-auto"></ul>

                <div id="confirmBox" class="bg-blue-100 p-3 rounded-lg border border-blue-200 hidden">
                    <div id="selectedDrugName" class="font-bold text-blue-900 text-sm"></div>
                    <div id="selectedDrugInfo" class="text-[10px] text-blue-700"></div>
                </div>

                <div class="flex gap-4">
                    <input type="number" id="qtyInput" value="1" class="w-20 p-3 border rounded-lg font-bold text-center">
                    <button onclick="addToCart()" class="flex-grow bg-blue-600 text-white font-bold rounded-lg shadow active:scale-95 transition">加入清單</button>
                </div>
                <button onclick="submitTransfer()" id="submitBtn" disabled class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold opacity-30 shadow-lg">🚀 送出通知</button>
            </div>

            <div id="warehouseSection" class="lg:col-span-7 flex flex-col">
                <div id="statusLabel" class="text-center font-bold p-3 mb-2 rounded bg-slate-100 text-slate-500 text-sm italic">系統連線中...</div>
                <div class="flex-grow border rounded-lg bg-slate-50 min-h-[350px] overflow-y-auto">
                    <table class="w-full text-xs">
                        <thead class="bg-slate-200 sticky top-0">
                            <tr><th class="p-3 text-left">藥名規格</th><th class="p-3 text-center w-16">數量</th><th class="p-3 w-8"></th></tr>
                        </thead>
                        <tbody id="cartBody" class="bg-white divide-y"></tbody>
                    </table>
                </div>
                <div id="actionArea" class="space-y-3 pt-4">
                    <button onclick="receiveAndDownload()" id="receiveBtn" class="hidden w-full bg-red-600 text-white py-6 rounded-2xl font-bold text-xl shadow-xl btn-pulse active:scale-95">✅ 收到調撥</button>
                    <button onclick="sendToElevator()" id="elevatorBtn" class="hidden w-full bg-green-600 text-white py-6 rounded-2xl font-bold text-xl shadow-xl active:scale-95">📦 藥品已入電梯</button>
                    <button onclick="resetToIdle()" id="doneBtn" class="hidden w-full bg-slate-700 text-white py-6 rounded-2xl font-bold text-xl shadow-xl active:scale-95">✅ 完成領貨</button>
                </div>
            </div>
        </div>
    </div>

        let cart = [];
        let currentDrug = null;
        let selectedForm = '';
        let pendingItems = [];

        // 角色判斷
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role');
        if (role === 'pharmacy') {
            document.getElementById('warehouseSection').classList.replace('lg:col-span-7', 'lg:col-span-12');
            document.getElementById('actionArea').classList.add('role-hidden');
        } else if (role === 'warehouse') {
            document.getElementById('pharmacySection').classList.add('role-hidden');
            document.getElementById('warehouseSection').classList.replace('lg:col-span-7', 'lg:col-span-12');
        }

        // 搜尋功能
        const searchInput = document.getElementById('searchInput');
        const suggestList = document.getElementById('suggestList');
        searchInput.addEventListener('input', () => {
            const val = searchInput.value.trim().toUpperCase();
            suggestList.innerHTML = '';
            if (!val) return suggestList.classList.add('hidden');
            const matches = drugDb.filter(d => (String(d.id).toUpperCase().includes(val) || String(d.name).toUpperCase().includes(val)) && (selectedForm ? d.form === selectedForm : true)).slice(0, 10);
            matches.forEach(drug => {
                const li = document.createElement('li');
                li.className = "p-3 border-b hover:bg-blue-50 cursor-pointer flex justify-between text-xs";
                li.innerHTML = `<span>${drug.name}</span><span class="text-slate-400">${drug.id}</span>`;
                li.onclick = () => {
                    currentDrug = drug;
                    document.getElementById('confirmBox').classList.remove('hidden');
                    document.getElementById('selectedDrugName').innerText = drug.name;
                    document.getElementById('selectedDrugInfo').innerText = `${drug.id} | ${drug.form}`;
                    searchInput.value = drug.name;
                    suggestList.classList.add('hidden');
                };
                suggestList.appendChild(li);
            });
            suggestList.classList.remove('hidden');
        });

        // 按鈕功能掛載
        window.setForm = (form, btn) => {
            selectedForm = (selectedForm === form) ? '' : form;
            document.querySelectorAll('.form-btn').forEach(b => b.classList.remove('active-form'));
            if(selectedForm) btn.classList.add('active-form');
            searchInput.dispatchEvent(new Event('input'));
        };

        window.addToCart = () => {
            if (!currentDrug) return alert("請先選擇藥品");
            cart.push({ ...currentDrug, qty: document.getElementById('qtyInput').value });
            renderCart();
            currentDrug = null; searchInput.value = ''; document.getElementById('confirmBox').classList.add('hidden');
        };

        function renderCart() {
            const tbody = document.getElementById('cartBody');
            const btn = document.getElementById('submitBtn');
            btn.disabled = cart.length === 0;
            btn.classList.toggle('opacity-30', cart.length === 0);
            btn.classList.toggle('opacity-100', cart.length > 0);
            tbody.innerHTML = cart.map((item, index) => `<tr class="text-[10px]"><td class="p-3"><b>${item.name}</b><br>${item.id}</td><td class="p-3 text-center">${item.qty}</td><td class="p-3 text-red-500" onclick="removeFromCart(${index})">✕</td></tr>`).join('');
        }

        window.removeFromCart = (idx) => { cart.splice(idx,1); renderCart(); };
        window.submitTransfer = () => { set(statusRef, { state: "arriving", items: cart }); cart = []; renderCart(); };
        window.receiveAndDownload = () => { 
            const ws = XLSX.utils.json_to_sheet(pendingItems);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "清單");
            XLSX.writeFile(wb, "藥局申請單.xlsx");
            set(statusRef, { state: "preparing" }); 
        };
        window.sendToElevator = () => { set(statusRef, { state: "in_elevator" }); };
        window.resetToIdle = () => { set(statusRef, { state: "idle", items: [] }); };

        // 監聽 Firebase 狀態
        onValue(statusRef, (snapshot) => {
            const data = snapshot.val();
            const label = document.getElementById('statusLabel');
            const btnR = document.getElementById('receiveBtn');
            const btnE = document.getElementById('elevatorBtn');
            const btnD = document.getElementById('doneBtn');
            [btnR, btnE, btnD].forEach(b => b.classList.add('hidden'));

            if (!data || data.state === "idle") {
                label.innerText = "🟢 系統待機中";
            } else if (data.state === "arriving") {
                pendingItems = data.items || [];
                label.innerText = "🚨 藥局缺藥調撥申請中！";
                btnR.classList.remove('hidden');
            } else if (data.state === "preparing") {
                label.innerText = "⏳ 藥庫處理中";
                btnE.classList.remove('hidden');
            } else if (data.state === "in_elevator") {
                label.innerText = "📦 藥品已在電梯";
                btnD.classList.remove('hidden');
            }
        });

        window.importDrugDb = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                drugDb = json.map(i => ({ id: i['藥碼']||i['ID'], name: i['藥名']||i['Name'], form: i['劑型']||i['Form'] }));
                localStorage.setItem('savedDrugDb', JSON.stringify(drugDb));
                location.reload();
            };
            reader.readAsArrayBuffer(input.files[0]);
        };
    </script>
