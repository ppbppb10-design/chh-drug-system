<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>藥局盤點系統 - 報表中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <nav class="bg-gradient-to-r from-blue-700 to-indigo-800 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="inventory_login.html" class="hover:opacity-80 transition"><i class="fa-solid fa-arrow-left text-xl"></i></a>
                <h1 class="text-xl font-bold tracking-wide flex items-center">
                    <i class="fa-solid fa-chart-pie mr-2 text-2xl"></i>
                    盤點數據報表中心
                </h1>
            </div>
            <div class="text-xs bg-white/20 px-3 py-1.5 rounded-full backdrop-blur-sm font-bold">
                彰化醫院藥劑科
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 mt-8 space-y-6">
        
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h2 class="text-xl font-black text-slate-800">📊 雲端盤點數據總覽</h2>
                <p class="text-xs text-slate-400 font-medium mt-1">目前已連線至 Firebase Database，即時顯示全院最新盤點結果。</p>
            </div>
            
            <button onclick="downloadExcel()" class="bg-gradient-to-r from-emerald-600 to-green-600 hover:from-emerald-700 hover:to-green-700 text-white font-black px-6 py-3 rounded-2xl text-sm shadow-md shadow-green-600/10 active:scale-95 transition flex items-center gap-2">
                <i class="fa-solid fa-file-excel text-lg"></i>
                <span>下載 Excel 盤點總報表</span>
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100 text-slate-500 font-bold text-xs uppercase tracking-wider">
                            <th class="py-4 px-6">藥品代碼</th>
                            <th class="py-4 px-6">藥品名稱</th>
                            <th class="py-4 px-6 text-center">輸入包裝明細</th>
                            <th class="py-4 px-6 text-center">系統換算總量</th>
                            <th class="py-4 px-6 text-center">最後盤點人</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody" class="text-slate-700 text-sm divide-y divide-slate-50">
                        <tr>
                            <td colspan="5" class="text-center py-8 text-slate-400 font-medium">⏳ 正在自雲端同步最新盤點報表數據...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
            authDomain: "drug--arrive.firebaseapp.com",
            databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
            projectId: "drug--arrive",
            storageBucket: "drug--arrive.appspot.com",
            messagingSenderId: "215426668369",
            appId: "1:215426668369:web:eaa94e83974fcec391a570"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 彰醫種子藥品基底庫 (與盤點頁完全對應)
        const drugDb = [
            { id: 'RI-I99', name: 'Humulin R', u1: '束', u2: '支', u3: '' },
            { id: 'INSI14', name: 'Novomix 30', u1: '盒', u2: '支', u3: '' },
            { id: 'INSI13', name: 'NovoRapid', u1: '盒', u2: '支', u3: '' },
            { id: 'INSI19', name: 'Ryzodeg', u1: '盒', u2: '支', u3: '' },
            { id: 'INSI16', name: 'Toujeo', u1: '盒', u2: '支', u3: '' },
            { id: 'INSI17', name: 'Tresiba', u1: '盒', u2: '支', u3: '' },
            { id: 'GLMO01', name: 'Amamet', u1: '盒', u2: '排', u3: '顆' },
            { id: 'DROO00', name: 'Multaq', u1: '盒', u2: '排', u3: '顆' },
            { id: 'SITO05', name: 'SitaMet', u1: '盒', u2: '排', u3: '顆' },
            { id: 'AMIO12', name: 'Adarone', u1: '盒', u2: '排', u3: '顆' },
            { id: 'API000', name: 'Eliquis', u1: '盒', u2: '排', u3: '顆' },
            { id: 'EDOO02', name: 'LIXIANA 60', u1: '盒', u2: '排', u3: '顆' }
        ];

        let globalRecords = {};

        // 監聽 Firebase 實時動態
        onValue(ref(db, 'inventoryRecords'), (snapshot) => {
            globalRecords = snapshot.val() || {};
            renderTable();
        });

        // 在網頁畫面上即時渲染報表
        function renderTable() {
            const tbody = document.getElementById('reportTableBody');
            tbody.innerHTML = '';

            drugDb.forEach(drug => {
                const rec = globalRecords[drug.id] || { u1: 0, u2: 0, u3: 0, total: 0, user: '—' };
                
                // 拼接輸入明細 (如：2盒、3排、0顆)
                let detailStr = `${rec.u1} ${drug.u1} + ${rec.u2} ${drug.u2}`;
                if (drug.u3) detailStr += ` + ${rec.u3} ${drug.u3}`;

                let tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition text-slate-600";
                tr.innerHTML = `
                    <td class="py-4 px-6 font-black text-slate-800">${drug.id}</td>
                    <td class="py-4 px-6 font-bold text-slate-700">${drug.name}</td>
                    <td class="py-4 px-6 text-center font-medium text-slate-400 text-xs">${detailStr}</td>
                    <td class="py-4 px-6 text-center font-black ${rec.total > 0 ? 'text-green-600 text-base' : 'text-slate-300'}">${rec.total}</td>
                    <td class="py-4 px-6 text-center"><span class="bg-slate-100 text-slate-600 px-2.5 py-1 rounded-lg font-bold text-xs">${rec.user}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 🎯 核心秘密武器：將資料打包，全自動生成並導出 Excel 表格
        window.downloadExcel = function() {
            const timeString = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' }).replace(/[\/:]/g, '-');
            
            // 1. 設定 Excel 的表頭欄位
            const excelRows = [
                ["彰化醫院藥劑科 - 智慧盤點歷史總報表"],
                ["匯出時間：" + new Date().toLocaleString('zh-TW')],
                [], // 空一行
                ["藥品代碼", "藥品名稱", "輸入包裝數據明細", "全自動換算總顆數/支數", "最終盤點負責藥師"]
            ];

            // 2. 依序將藥品庫的實時數據塞入列中
            drugDb.forEach(drug => {
                const rec = globalRecords[drug.id] || { u1: 0, u2: 0, u3: 0, total: 0, user: '未盤點' };
                
                let detailStr = `${rec.u1}${drug.u1} ${rec.u2}${drug.u2}`;
                if (drug.u3) detailStr += ` ${rec.u3}${drug.u3}`;

                excelRows.push([
                    drug.id,
                    drug.name,
                    detailStr,
                    rec.total,
                    rec.user
                ]);
            });

            // 3. 呼叫 SheetJS 套件引擎在瀏覽器背景快速建構試算表
            const worksheet = XLSX.utils.aoa_to_sheet(excelRows);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "盤點總明細");

            // 4. 強制瀏覽器啟動下載行為
            XLSX.writeFile(workbook, `彰醫藥局盤點報表_${timeString}.xlsx`);
        };
    </script>
</body>
</html>
