<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>藥局盤點系統 - 報表中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <!-- 頂部導航 -->
    <nav class="bg-gradient-to-r from-blue-700 to-indigo-800 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="inventory_login.html" class="hover:opacity-80 transition"><i class="fa-solid fa-arrow-left text-xl"></i></a>
                <h1 class="text-xl font-bold tracking-wide flex items-center">
                    <i class="fa-solid fa-chart-pie mr-2 text-2xl"></i>
                    盤點數據報表中心
                </h1>
            </div>
            <div class="text-xs bg-white/20 px-3 py-1.5 rounded-full backdrop-blur-sm font-bold">彰化醫院藥劑科</div>
        </div>
    </nav>

    <!-- 主體內容 -->
    <main class="max-w-7xl mx-auto px-4 mt-8 space-y-6">
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h2 class="text-xl font-black text-slate-800">📊 雲端盤點數據明細總覽 (<span id="totalItemsCount">0</span> 品項)</h2>
                <p class="text-xs text-slate-400 font-medium mt-1">目前已同步口服與針劑外用雙基本庫，即時顯示最新盤點結果。</p>
            </div>
            <button onclick="downloadExcel()" class="bg-gradient-to-r from-emerald-600 to-green-600 hover:from-emerald-700 hover:to-green-700 text-white font-black px-6 py-3 rounded-2xl text-sm shadow-md active:scale-95 transition flex items-center gap-2">
                <i class="fa-solid fa-file-excel text-lg"></i>
                <span>下載 Excel 盤點總報表</span>
            </button>
        </div>

        <!-- 表格 -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100 text-slate-500 font-bold text-xs uppercase tracking-wider">
                            <th class="py-4 px-6">儲位分類</th>
                            <th class="py-4 px-6">藥品代碼</th>
                            <th class="py-4 px-6">藥品名稱</th>
                            <th class="py-4 px-6 text-center">包裝換算規則</th>
                            <th class="py-4 px-6 text-center">當前盤點總量</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody" class="text-slate-700 text-sm divide-y divide-slate-50">
                        <tr><td colspan="5" class="text-center py-8 text-slate-400 font-medium">⏳ 正在即時整合雙分流基本庫數據...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
            authDomain: "drug--arrive.firebaseapp.com",
            databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
            projectId: "drug--arrive",
            storageBucket: "drug--arrive.appspot.com",
            messagingSenderId: "215426668369",
            appId: "1:215426668369:web:eaa94e83974fcec391a570"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let masterOralList = {};
        let masterInjectList = {};
        let allCombinedDrugs = []; // 合併後的總藥品基本庫
        let firebaseRecords = {};  // 全院盤點數據

        // 監聽盤點數據紀錄
        onValue(ref(db, 'inventoryRecords'), (snapshot) => {
            firebaseRecords = snapshot.val() || {};
            combineAndRender();
        });

        // 監聽分流一：口服藥基本庫
        onValue(ref(db, 'masterOralList'), (snapshot) => {
            masterOralList = snapshot.val() || {};
            combineAndRender();
        });

        // 監聽分流二：針劑外用基本庫
        onValue(ref(db, 'masterInjectList'), (snapshot) => {
            masterInjectList = snapshot.val() || {};
            combineAndRender();
        });

        // 🎯 核心秘密武器：將口服藥與針劑外用庫完美合併，並按儲位與原始 Excel 順序重新校正！
        function combineAndRender() {
            const oralItems = Object.values(masterOralList);
            const injectItems = Object.values(masterInjectList);
            
            // 合併兩大分流基本庫
            allCombinedDrugs = [...oralItems, ...injectItems];
            
            // 依照儲位分頁英文字母排序，相同儲位內則嚴格依照 Excel 的 sortOrder 流水號排序
            allCombinedDrugs.sort((a, b) => {
                const zoneCompare = (a.subZone || '').localeCompare(b.subZone || '');
                if (zoneCompare !== 0) return zoneCompare;
                return (a.sortOrder || 0) - (b.sortOrder || 0);
            });

            document.getElementById('totalItemsCount').innerText = allCombinedDrugs.length;
            renderTable();
        }

        // 渲染綜合報表畫面
        function renderTable() {
            const tbody = document.getElementById('reportTableBody');
            if (allCombinedDrugs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-slate-400 font-medium">⚠️ 雲端目前無品項資料，請先至「資料維護」匯入 Excel。</td></tr>`;
                return;
            }

            tbody.innerHTML = '';
            allCombinedDrugs.forEach(drug => {
                // 智慧跨層級搜尋數量 (從 inventoryRecords -> subZone -> drugId 抓取)
                const zoneRecord = firebaseRecords[drug.subZone] || {};
                const rec = zoneRecord[drug.id] || { total: 0, user: '未盤' };

                let tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition text-slate-600";
                tr.innerHTML = `
                    <td class="py-4 px-6"><span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-md font-bold text-xs">${drug.subZone || '未分類'}</span></td>
                    <td class="py-4 px-6 font-black text-slate-800">${drug.id}</td>
                    <td class="py-4 px-6 font-bold text-slate-700">${drug.name}</td>
                    <td class="py-4 px-6 text-center text-xs text-slate-400 font-bold">${drug.desc || '1盒=10支'}</td>
                    <td class="py-4 px-6 text-center font-black ${rec.total > 0 ? 'text-green-600 text-base' : 'text-slate-300'}">${rec.total} <span class="text-[10px] text-slate-400 font-normal">(${rec.user})</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 一鍵下載符合彰醫 ledger 的綜合總報表 Excel
        window.downloadExcel = function() {
            const timeString = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' }).replace(/[\/:]/g, '-');
            const excelRows = [
                ["彰化醫院藥劑科 - 雲端盤點歷史總報表"],
                ["匯出時間：" + new Date().toLocaleString('zh-TW')],
                [],
                ["儲位分類", "藥品代碼", "藥品名稱", "包裝換算規則", "全自動換算總量", "負責藥師"]
            ];

            allCombinedDrugs.forEach(drug => {
                const zoneRecord = firebaseRecords[drug.subZone] || {};
                const rec = zoneRecord[drug.id] || { total: 0, user: '未盤點' };
                excelRows.push([
                    drug.subZone || '未分類',
                    drug.id,
                    drug.name,
                    drug.desc || '1盒=10支',
                    rec.total,
                    rec.user
                ]);
            });

            const worksheet = XLSX.utils.aoa_to_sheet(excelRows);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "盤點數據總明細");
            XLSX.writeFile(workbook, `彰醫藥局盤點報表_${timeString}.xlsx`);
        };
    </script>
</body>
</html>
