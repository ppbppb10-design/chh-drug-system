<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>藥局盤點系統 - 報表中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <nav class="bg-gradient-to-r from-blue-700 to-indigo-800 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="inventory_login.html" class="hover:opacity-80 transition"><i class="fa-solid fa-arrow-left text-xl"></i></a>
                <h1 class="text-xl font-bold tracking-wide flex items-center">
                    <i class="fa-solid fa-chart-pie mr-2 text-2xl"></i>
                    盤點數據報表中心
                </h1>
            </div>
            <div class="text-xs bg-white/20 px-3 py-1.5 rounded-full backdrop-blur-sm font-bold">彰化醫院藥劑科</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 mt-8 space-y-6">
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h2 class="text-xl font-black text-slate-800">📊 雲端盤點數據明細總覽 (<span id="totalItemsCount">0</span> 行明細)</h2>
                <p class="text-xs text-slate-400 font-medium mt-1">匯出 Excel 功能已全面升級：自動提供【明細、全院總量、針劑分類、外用分類】多頁籤整合報表！</p>
            </div>
            <button onclick="downloadExcel()" class="bg-gradient-to-r from-emerald-600 to-green-600 hover:from-emerald-700 hover:to-green-700 text-white font-black px-6 py-3 rounded-2xl text-sm shadow-md active:scale-95 transition flex items-center gap-2">
                <i class="fa-solid fa-file-excel text-lg"></i>
                <span>下載 Excel 分類加總報表</span>
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100 text-slate-500 font-bold text-xs uppercase tracking-wider">
                            <th class="py-4 px-6">儲位分類</th>
                            <th class="py-4 px-6">位號</th>
                            <th class="py-4 px-6">藥品代碼</th>
                            <th class="py-4 px-6">藥品名稱</th>
                            <th class="py-4 px-6 text-center">包裝規則</th>
                            <th class="py-4 px-6 text-center">當前盤點數量</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody" class="text-slate-700 text-sm divide-y divide-slate-50">
                        <tr><td colspan="6" class="text-center py-8 text-slate-400 font-medium">⏳ 正在即時整合並比對多儲位盤點數據...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
            authDomain: "drug--arrive.firebaseapp.com",
            databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
            projectId: "drug--arrive",
            storageBucket: "drug--arrive.appspot.com",
            messagingSenderId: "215426668369",
            appId: "1:215426668369:web:eaa94e83974fcec391a570"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let masterOralList = {};
        let masterInjectList = {};
        let allCombinedDrugs = []; 
        let firebaseRecords = {};  

        onValue(ref(db, 'inventoryRecords'), (snapshot) => {
            firebaseRecords = snapshot.val() || {};
            combineAndRender();
        });

        onValue(ref(db, 'masterOralList'), (snapshot) => {
            masterOralList = snapshot.val() || {};
            combineAndRender();
        });

        onValue(ref(db, 'masterInjectList'), (snapshot) => {
            masterInjectList = snapshot.val() || {};
            combineAndRender();
        });

        function getFirebaseZoneData(subZoneName) {
            if (!subZoneName) return {};
            if (firebaseRecords[subZoneName]) return firebaseRecords[subZoneName];
            const upperZone = subZoneName.toUpperCase();
            if (firebaseRecords[upperZone]) return firebaseRecords[upperZone];
            const lowerZone = subZoneName.toLowerCase();
            if (firebaseRecords[lowerZone]) return firebaseRecords[lowerZone];
            return {};
        }

        function combineAndRender() {
            const oralItems = Object.values(masterOralList);
            const injectItems = Object.values(masterInjectList);
            allCombinedDrugs = [...oralItems, ...injectItems];
            
            allCombinedDrugs.sort((a, b) => {
                const zoneCompare = (a.subZone || '').localeCompare(b.subZone || '');
                if (zoneCompare !== 0) return zoneCompare;
                return (a.sortOrder || 0) - (b.sortOrder || 0);
            });

            document.getElementById('totalItemsCount').innerText = allCombinedDrugs.length;
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('reportTableBody');
            if (allCombinedDrugs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-slate-400 font-medium">⚠️ 雲端目前無品項資料，請先至「資料維護」匯入 Excel。</td></tr>`;
                return;
            }

            tbody.innerHTML = '';
            allCombinedDrugs.forEach(drug => {
                const zoneRecord = getFirebaseZoneData(drug.subZone);
                let rec = zoneRecord[drug.dbKey];
                if (!rec) rec = zoneRecord[drug.id];
                if (!rec) rec = { total: 0, user: '未盤' };

                let tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition text-slate-600";
                tr.innerHTML = `
                    <td class="py-4 px-6"><span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-md font-bold text-xs">${drug.subZone || '未分類'}</span></td>
                    <td class="py-4 px-6 font-mono text-xs text-slate-400 font-bold">${drug.location || '—'}</td>
                    <td class="py-4 px-6 font-black text-slate-800">${drug.id}</td>
                    <td class="py-4 px-6 font-bold text-slate-700">${drug.name}</td>
                    <td class="py-4 px-6 text-center text-xs text-slate-400 font-bold">${drug.desc || '1盒=10支'}</td>
                    <td class="py-4 px-6 text-center font-black ${Number(rec.total) > 0 ? 'text-green-600 text-base' : 'text-slate-300'}">${rec.total} <span class="text-[10px] text-slate-400 font-normal">(${rec.user})</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

window.downloadExcel = function() {
            try {
                const timeString = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' }).replace(/[\/:]/g, '-');
                const todayString = new Date().toLocaleString('zh-TW');
                
                // ==========================================
                // 📊 頁籤一：建構【盤點多儲位明細】原始資料 (新增「已領用扣除量」欄位)
                // ==========================================
                const sheet1Rows = [
                    ["彰化醫院藥劑科 - 智慧盤點多儲位原始明細報表"],
                    ["匯出時間：" + todayString],
                    [],
                    ["儲位分類(分頁)", "實體位號", "藥品代碼", "藥品名稱", "包裝換算規則", "盤點淨總量", "已領用扣除量", "負責藥師", "最後領用人/時間"]
                ];

                // 用來收集所有有被領用過的紀錄，準備給「已盤領用記錄」頁籤使用
                let deductLogRows = [
                    ["彰化醫院藥劑科 - 已盤藥品領用異動查核清單"],
                    ["匯出時間：" + todayString],
                    [],
                    ["儲位分類", "藥品代碼", "藥品名稱", "本次被領用扣除量", "最後操作藥師", "最後操作時間"]
                ];

                allCombinedDrugs.forEach(drug => {
                    const zoneRecord = getFirebaseZoneData(drug.subZone);
                    let rec = zoneRecord[drug.dbKey] || zoneRecord[drug.id] || { total: 0, user: '未盤點' };

                    const netTotal = Number(rec.total) || 0;
                    const deducted = Number(rec.deductedTotal) || 0;

                    sheet1Rows.push([
                        drug.subZone || '未分類',
                        drug.location || '',
                        drug.id,
                        drug.name,
                        drug.desc || '1盒=10支',
                        netTotal,
                        deducted > 0 ? deducted : 0, // 顯示被領用扣除的數量
                        rec.user || '未盤',
                        rec.lastDeductTime ? `${rec.lastDeductUser} (${rec.lastDeductTime})` : '無異動'
                    ]);

                    // 如果該品項有被領用扣除過，同步收錄到領用記錄清單中
                    if (deducted > 0) {
                        deductLogRows.push([
                            drug.subZone || '未分類',
                            drug.id,
                            drug.name,
                            deducted,
                            rec.lastDeductUser || '未知',
                            rec.lastDeductTime || ''
                        ]);
                    }
                });
                const worksheet1 = XLSX.utils.aoa_to_sheet(sheet1Rows);
                const worksheet5 = XLSX.utils.aoa_to_sheet(deductLogRows); // 頁籤五：領用記錄

                // ==========================================
                // 🎯 核心計算大腦：全院不重複加總與劑型分類邏輯
                // ==========================================
                let summaryMap = {};

                allCombinedDrugs.forEach(drug => {
                    if (!drug || !drug.id) return;
                    const zoneRecord = getFirebaseZoneData(drug.subZone);
                    let rec = zoneRecord[drug.dbKey] || zoneRecord[drug.id] || { total: 0 };
                    
                    if (!summaryMap[drug.id]) {
                        summaryMap[drug.id] = {
                            id: drug.id,
                            name: drug.name,
                            grandTotal: 0,
                            totalDeducted: 0
                        };
                    }
                    summaryMap[drug.id].grandTotal += (Number(rec.total) || 0);
                    summaryMap[drug.id].totalDeducted += (Number(rec.deductedTotal) || 0);
                });

                // 建立基礎欄位格式 (包含領用統計)
                const headers = ["藥品代碼", "藥品名稱", "全院盤點淨總量", "累計領用扣除量", "狀態提示"];
                
                const allSummaryRows = [["彰化醫院藥劑科 - 全院藥品代碼總量匯總報表"], ["匯出時間：" + todayString], [], headers];
                const injectSummaryRows = [["彰化醫院藥劑科 - 針劑類藥品總量彙整 (第四碼為 I)"], ["匯出時間：" + todayString], [], headers];
                const externalSummaryRows = [["彰化醫院藥劑科 - 外用藥類藥品總量彙整 (第四碼為 E)"], ["匯出時間：" + todayString], [], headers];

                Object.values(summaryMap).forEach(item => {
                    const rowData = [
                        item.id,
                        item.name,
                        item.grandTotal,
                        item.totalDeducted, // 顯示全院累計被領用量
                        item.grandTotal > 0 || item.totalDeducted > 0 ? "已盤點/有異動" : "未盤點"
                    ];
                    
                    allSummaryRows.push(rowData);
                    
                    const fourthChar = (item.id && item.id.length >= 4) ? item.id.charAt(3).toUpperCase() : '';
                    if (fourthChar === 'I') {
                        injectSummaryRows.push(rowData);
                    } else if (fourthChar === 'E') {
                        externalSummaryRows.push(rowData);
                    }
                });

                const worksheet2 = XLSX.utils.aoa_to_sheet(allSummaryRows);
                const worksheet3 = XLSX.utils.aoa_to_sheet(injectSummaryRows);
                const worksheet4 = XLSX.utils.aoa_to_sheet(externalSummaryRows);

                // ==========================================
                // 📦 封裝 5 大頁籤並匯出 Excel
                // ==========================================
                const finalWorkbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(finalWorkbook, worksheet1, "盤點多儲位明細");
                XLSX.utils.book_append_sheet(finalWorkbook, worksheet2, "全院藥碼總匯總");
                XLSX.utils.book_append_sheet(finalWorkbook, worksheet3, "針劑類加總彙整");
                XLSX.utils.book_append_sheet(finalWorkbook, worksheet4, "外用藥加總彙整");
                XLSX.utils.book_append_sheet(finalWorkbook, worksheet5, "已盤領用記錄"); // 🌟 新增的獨立領用查核分頁
                
                XLSX.writeFile(finalWorkbook, `彰醫藥局盤點報表_含領用紀錄_${timeString}.xlsx`);
            } catch (clickErr) {
                alert("產生 Excel 報表失敗，請刷新重試。");
                console.error(clickErr);
            }
        };
    </script>
</body>
</html>
