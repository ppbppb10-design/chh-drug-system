<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作SOP / Wiki 共編系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif; }
        .sop-card { transition: all 0.3s ease; }
        .sop-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <nav class="bg-gradient-to-r from-teal-600 to-cyan-700 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="index.html" class="hover:opacity-80 transition"><i class="fa-solid fa-arrow-left text-xl"></i></a>
                <h1 class="text-xl font-bold tracking-wide flex items-center">
                    <i class="fa-solid fa-book-medical mr-2 text-2xl animate-pulse"></i>
                    藥劑科工作SOP / Wiki 共編系統
                </h1>
            </div>
            <div class="text-sm bg-white/20 px-3 py-1.5 rounded-full backdrop-blur-sm">
                <i class="fa-solid fa-hospital mr-1"></i> 彰化醫院藥劑科
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 mt-8">
        <div class="mb-10">
            <div class="flex items-center space-x-2 border-b-2 border-teal-500 pb-2 mb-6">
                <i class="fa-solid fa-folder-open text-teal-600 text-xl"></i>
                <h2 class="text-xl font-bold text-slate-800">行政流程說明</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div onclick="openSOP('sop_leave')" class="sop-card bg-white p-6 rounded-2xl border border-slate-100 shadow-sm cursor-pointer flex flex-col justify-between">
                    <div>
                        <div class="w-12 h-12 rounded-xl bg-orange-50 flex items-center justify-center text-orange-500 text-xl mb-4"><i class="fa-solid fa-calendar-check"></i></div>
                        <h3 class="font-bold text-lg text-slate-800 mb-2">請假規定與流程</h3>
                        <p class="text-slate-500 text-sm line-clamp-2">請假規定與流程。</p>
                    </div>
                    <span class="text-teal-600 font-medium text-sm mt-4 inline-flex items-center">查看 SOP <i class="fa-solid fa-chevron-right ml-1 text-xs"></i></span>
                </div>
                <div onclick="openSOP('sop_controlled_loss')" class="sop-card bg-white p-6 rounded-2xl border border-slate-100 shadow-sm cursor-pointer flex flex-col justify-between">
                    <div>
                        <div class="w-12 h-12 rounded-xl bg-red-50 flex items-center justify-center text-red-500 text-xl mb-4"><i class="fa-solid fa-triangle-exclamation"></i></div>
                        <h3 class="font-bold text-lg text-slate-800 mb-2">管制藥品回收</h3>
                        <p class="text-slate-500 text-sm line-clamp-2">管管制藥品回收流程。</p>
                    </div>
                    <span class="text-teal-600 font-medium text-sm mt-4 inline-flex items-center">查看 SOP <i class="fa-solid fa-chevron-right ml-1 text-xs"></i></span>
                </div>
            </div>
        </div>

        <div class="mb-10">
            <div class="flex items-center space-x-2 border-b-2 border-cyan-500 pb-2 mb-6">
                <i class="fa-solid fa-laptop-code text-cyan-600 text-xl"></i>
                <h2 class="text-xl font-bold text-slate-800">系統操作說明</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div onclick="openSOP('sop_drug_arrive')" class="sop-card bg-white p-6 rounded-2xl border border-slate-100 shadow-sm cursor-pointer flex flex-col justify-between">
                    <div>
                        <div class="w-12 h-12 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-500 text-xl mb-4"><i class="fa-solid fa-elevator"></i></div>
                        <h3 class="font-bold text-lg text-slate-800 mb-2">Drug Arrive 通知系統</h3>
                        <p class="text-slate-500 text-sm line-clamp-2">電梯藥品送達時，即時啟動 Firebase 語音與畫面通知之系統設定。</p>
                    </div>
                    <span class="text-cyan-600 font-medium text-sm mt-4 inline-flex items-center">查看 SOP <i class="fa-solid fa-chevron-right ml-1 text-xs"></i></span>
                </div>
                <div onclick="openSOP('sop_pack_machine')" class="sop-card bg-white p-6 rounded-2xl border border-slate-100 shadow-sm cursor-pointer flex flex-col justify-between">
                    <div>
                        <div class="w-12 h-12 rounded-xl bg-purple-50 flex items-center justify-center text-purple-500 text-xl mb-4"><i class="fa-solid fa-gears"></i></div>
                        <h3 class="font-bold text-lg text-slate-800 mb-2">自動藥包機異常排除</h3>
                        <p class="text-slate-500 text-sm line-clamp-2">藥包機卡紙、碳帶耗盡、連線異常等常見硬體故障應變指引。</p>
                    </div>
                    <span class="text-cyan-600 font-medium text-sm mt-4 inline-flex items-center">查看 SOP <i class="fa-solid fa-chevron-right ml-1 text-xs"></i></span>
                </div>
            </div>
        </div>
    </main>

    <div id="sopModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-3xl rounded-2xl shadow-2xl flex flex-col max-h-[85vh] overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <div class="flex items-center space-x-3">
                    <div id="modalIcon" class="w-10 h-10 rounded-lg flex items-center justify-center text-lg"></div>
                    <h3 id="modalTitle" class="text-xl font-bold text-slate-800">SOP 標題</h3>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-1 rounded-full hover:bg-slate-200 transition">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1 bg-white">
                <div id="viewMode" class="prose max-w-none text-slate-600 text-base space-y-4">
                    正在載入 SOP 內容...
                </div>
                <div id="editMode" class="hidden h-full flex flex-col space-y-3">
                    <label class="block text-sm font-medium text-slate-700 font-bold">共編內文說明 (可直接貼上 Google Drive 檔案或圖片網址)：</label>
                    <textarea id="sopTextarea" class="w-full flex-1 min-h-[320px] p-4 border border-slate-300 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-slate-700 leading-relaxed outline-none" placeholder="請在此輸入詳細的操作步驟說明...&#10;可以直接把雲端硬碟連結貼在文字的最後面。"></textarea>
                </div>
            </div>

            <div class="p-4 border-t border-slate-100 flex justify-between items-center bg-slate-
