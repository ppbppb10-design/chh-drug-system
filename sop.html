<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工作SOP / Wiki 共編系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif; }
        .sop-card { transition: all 0.3s ease; }
        .sop-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <nav class="bg-gradient-to-r from-teal-600 to-cyan-700 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="index.html" class="hover:opacity-80 transition"><i class="fa-solid fa-arrow-left text-xl"></i></a>
                <h1 class="text-xl font-bold tracking-wide flex items-center">
                    <i class="fa-solid fa-book-medical mr-2 text-2xl"></i>
                    彰醫藥劑科工作SOP / Wiki 共編系統
                </h1>
            </div>
            <button onclick="createNewSOP()" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold px-4 py-2 rounded-full transition shadow-sm">
                <i class="fa-solid fa-plus mr-1"></i> 新增全新 SOP
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 mt-8 space-y-10">
        <div>
            <div class="flex items-center space-x-2 border-b-2 border-teal-500 pb-2 mb-6">
                <i class="fa-solid fa-folder-open text-teal-600 text-xl"></i>
                <h2 class="text-xl font-bold text-slate-800">行政流程說明</h2>
            </div>
            <div id="adminGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </div>

        <div>
            <div class="flex items-center space-x-2 border-b-2 border-cyan-500 pb-2 mb-6">
                <i class="fa-solid fa-laptop-code text-cyan-600 text-xl"></i>
                <h2 class="text-xl font-bold text-slate-800">系統操作說明</h2>
            </div>
            <div id="systemGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </div>
    </main>

    <div id="sopModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-3xl rounded-2xl shadow-2xl flex flex-col max-h-[85vh] overflow-hidden">
            
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <div class="flex items-center space-x-3 w-full mr-4">
                    <div id="modalIcon" class="w-10 h-10 rounded-lg flex items-center justify-center text-lg bg-teal-50 text-teal-600">
                        <i class="fa-solid fa-file-lines"></i>
                    </div>
                    <h3 id="modalTitle" class="text-xl font-bold text-slate-800 truncate">SOP 標題</h3>
                    <input type="text" id="modalTitleInput" class="hidden w-full text-xl font-bold text-slate-800 border-2 border-blue-400 px-3 py-1 rounded-xl outline-none bg-white" placeholder="請輸入 SOP 標題...">
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-1 rounded-full hover:bg-slate-200 transition">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1 bg-white">
                <div id="viewMode" class="prose max-w-none text-slate-600 text-base space-y-4">
                    正在載入 SOP 內容...
                </div>
                <div id="editMode" class="hidden h-full flex flex-col space-y-3">
                    <div id="categorySelectArea" class="flex items-center space-x-3 text-sm">
                        <span class="font-bold text-slate-700">選擇頁面分類：</span>
                        <label class="inline-flex items-center"><input type="radio" name="sopCategory" value="admin" checked class="mr-1"> 行政流程</label>
                        <label class="inline-flex items-center"><input type="radio" name="sopCategory" value="system" class="mr-1"> 系統操作</label>
                    </div>
                    <label class="block text-sm font-bold text-slate-700">共編內文說明 (可直接貼上 Google Drive 檔案或圖片網址)：</label>
                    <textarea id="sopTextarea" class="w-full flex-1 min-h-[250px] p-4 border border-slate-300 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-slate-700 leading-relaxed outline-none" placeholder="請在此輸入詳細的操作步驟說明..."></textarea>
                </div>
            </div>

            <div class="p-4 border-t border-slate-100 flex justify-between items-center bg-slate-50">
                <span id="lastUpdated" class="text-xs text-slate-400">更新時間：-</span>
                <div class="space-x-2">
                    <button id="btnEdit" onclick="switchMode('edit')" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-xl font-medium transition text-sm">
                        <i class="fa-solid fa-pen-to-square mr-1"></i> 進入共編模式
                    </button>
                    <button id="btnCancel" onclick="switchMode('view')" class="hidden bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-xl font-medium transition text-sm">
                        取消
                    </button>
                    <button id="btnSave" class="hidden bg-teal-600 hover:bg-teal-700 text-white px-5 py-2 rounded-xl font-medium transition text-sm shadow-md">
                        <i class="fa-solid fa-cloud-arrow-up mr-1"></i> 儲存並發佈
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
            authDomain: "drug--arrive.firebaseapp.com",
            databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
            projectId: "drug--arrive",
            storageBucket: "drug--arrive.appspot.com",
            messagingSenderId: "215426668369",
            appId: "1:215426668369:web:eaa94e83974fcec391a570"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentSopId = '';
        let globalSopData = {}; // 存放從 Firebase 抓下來的所有資料

        // 預設的 4 個初始卡片架構
        const defaultSops = {
            'sop_leave': { title: '請假規定與流程', category: 'admin', content: '', icon: 'fa-calendar-check', iconColor: 'text-orange-500', iconBg: 'bg-orange-50', desc: '規範科內各班別請假之代理簽核順序與線上排班登錄流程。' },
            'sop_controlled_loss': { title: '管制藥品減損報備', category: 'admin', content: '', icon: 'fa-triangle-exclamation', iconColor: 'text-red-500', iconBg: 'bg-red-50', desc: '管制藥品若發生破損、調劑殘餘量之申報與衛生局報備標準步驟。' },
            'sop_drug_arrive': { title: 'Drug Arrive 通知系統', category: 'system', content: '', icon: 'fa-elevator', iconColor: 'text-emerald-500', iconBg: 'bg-emerald-50', desc: '電梯藥品送達時，即時啟動 Firebase 語音與畫面通知之系統設定。' },
            'sop_pack_machine': { title: '自動藥包機異常排除', category: 'system', content: '', icon: 'fa-gears', iconColor: 'text-purple-500', iconBg: 'bg-purple-50', desc: '藥包機卡紙、碳帶耗盡、連線異常等常見硬體故障應變指引。' }
        };

        // 一啟動網頁，就即時監聽並生成全院卡片
        onValue(ref(db, 'sopList'), (snapshot) => {
            const data = snapshot.val() || {};
            globalSopData = data;
            
            const adminGrid = document.getElementById('adminGrid');
            const systemGrid = document.getElementById('systemGrid');
            adminGrid.innerHTML = ''; systemGrid.innerHTML = '';

            // 合併預設基礎卡片與 Firebase 現有資料
            const finalSops = { ...defaultSops };
            Object.keys(data).forEach(id => {
                finalSops[id] = { ...finalSops[id], ...data[id] };
            });

            // 開始渲染九宮格卡片
            Object.entries(finalSops).forEach(([id, sop]) => {
                const cardHtml = `
                    <div onclick="openSOP('${id}')" class="sop-card bg-white p-6 rounded-2xl border border-slate-100 shadow-sm cursor-pointer flex flex-col justify-between">
                        <div>
                            <div class="w-12 h-12 rounded-xl ${sop.iconBg || 'bg-teal-50'} flex items-center justify-center ${sop.iconColor || 'text-teal-500'} text-xl mb-4">
                                <i class="fa-solid ${sop.icon || 'fa-file-lines'}"></i>
                            </div>
                            <h3 class="font-bold text-lg text-slate-800 mb-2 truncate">${sop.title}</h3>
                            <p class="text-slate-500 text-sm line-clamp-2">${sop.desc || (sop.content ? sop.content.substring(0,60)+'...' : '點擊查看詳細共編步驟內容。')}</p>
                        </div>
                        <span class="text-teal-600 font-medium text-sm mt-4 inline-flex items-center">查看 SOP <i class="fa-solid fa-chevron-right ml-1 text-xs"></i></span>
                    </div>`;

                if (sop.category === 'system') {
                    systemGrid.innerHTML += cardHtml;
                } else {
                    adminGrid.innerHTML += cardHtml;
                }
            });
        });

        // 打開 SOP
        window.openSOP = function(sopId) {
            currentSopId = sopId;
            window.switchMode('view');
            
            const sop = globalSopData[sopId] || defaultSops[sopId] || { title: '全新 SOP', content: '' };
            
            // 設定標題與打字框的舊資料
            document.getElementById('modalTitle').innerText = sop.title;
            document.getElementById('modalTitleInput').value = sop.title;
            document.getElementById('sopTextarea').value = sop.content || '';
            document.getElementById('lastUpdated').innerText = '最後更新：' + (sop.updatedAt || '尚無紀錄');

            if (sop.category) {
                document.querySelector(`input[name="sopCategory"][value="${sop.category}"]`).checked = true;
            }

            if (sop.content) {
                window.parseAndRenderContent(sop.content);
            } else {
                document.getElementById('viewMode').innerHTML = `<div>目前尚無詳細操作步驟資料。<br>請點擊右下方「進入共編模式」開始建立。</div>`;
            }
            document.getElementById('sopModal').classList.remove('hidden');
        };

        // 按下建立全新卡片按鈕
        window.createNewSOP = function() {
            const newId = 'sop_' + Date.now();
            currentSopId = newId;
            document.getElementById('modalTitle').innerText = '全新 SOP';
            document.getElementById('modalTitleInput').value = '';
            document.getElementById('sopTextarea').value = '';
            document.getElementById('lastUpdated').innerText = '最後更新：全新建立';
            
            window.switchMode('edit');
            document.getElementById('sopModal').classList.remove('hidden');
        };

        // 智慧解析網址連結
        window.parseAndRenderContent = function(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            let urls = text.match(urlRegex) || [];
            let html = `<div class="whitespace-pre-line leading-relaxed text-slate-700">${text}</div>`;
            
            if (urls.length > 0) {
                html += `<div class="mt-6 space-y-3 pt-4 border-t border-slate-100">`;
                urls.forEach((url, index) => {
                    html += `
                        <div>
                            <a href="${url}" target="_blank" class="inline-flex items-center space-x-2 bg-gradient-to-r from-blue-600 to-cyan-600 text-white font-bold px-4 py-2.5 rounded-xl shadow transition transform active:scale-95 text-sm">
                                <i class="fa-solid fa-arrow-up-right-from-square"></i>
                                <span>🔗 開啟雲端附件：連結 ${index + 1}</span>
                            </a>
                        </div>`;
                });
                html += `</div>`;
            }
            document.getElementById('viewMode').innerHTML = html;
        };

        // 按下儲存按鈕
        document.getElementById('btnSave').onclick = function() {
            const textContent = document.getElementById('sopTextarea').value;
            const titleContent = document.getElementById('modalTitleInput').value.trim();
            const categoryContent = document.querySelector('input[name="sopCategory"]:checked').value;
            const timeString = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });

            if (!titleContent) { alert('SOP 標題不能為空！'); return; }
            if (!textContent.trim()) { alert('步驟內容不能為空！'); return; }

            const oldSop = globalSopData[currentSopId] || defaultSops[currentSopId] || {};

            // 寫入 Firebase 
            set(ref(db, 'sopList/' + currentSopId), {
                title: titleContent,
                content: textContent,
                category: categoryContent,
                updatedAt: timeString,
                icon: oldSop.icon || 'fa-file-lines',
                iconColor: oldSop.iconColor || 'text-teal-500',
                iconBg: oldSop.iconBg || 'bg-teal-50'
            }).then(() => {
                alert('🎉 SOP 標題與內文已同步儲存成功！');
                window.openSOP(currentSopId);
            });
        };

        window.switchMode = function(mode) {
            const titleText = document.getElementById('modalTitle');
            const titleInput = document.getElementById('modalTitleInput');
            const viewMode = document.getElementById('viewMode');
            const editMode = document.getElementById('editMode');
            const btnEdit = document.getElementById('btnEdit');
            const btnCancel = document.getElementById('btnCancel');
            const btnSave = document.getElementById('btnSave');

            if (mode === 'edit') {
                titleText.classList.add('hidden');
                titleInput.classList.remove('hidden');
                viewMode.classList.add('hidden');
                editMode.classList.remove('hidden');
                btnEdit.classList.add('hidden');
                btnCancel.classList.remove('hidden');
                btnSave.classList.remove('hidden');
            } else {
                titleText.classList.remove('hidden');
                titleInput.classList.add('hidden');
                viewMode.classList.remove('hidden');
                editMode.classList.add('hidden');
                btnEdit.classList.remove('hidden');
                btnCancel.classList.add('hidden');
                btnSave.classList.add('hidden');
            }
        };

        window.closeModal = function() { 
            document.getElementById('sopModal').classList.add('hidden'); 
        };
    </script>
</body>
</html>
