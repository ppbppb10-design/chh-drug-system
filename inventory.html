<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彰化醫院藥劑科 - 智慧盤點系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen pb-12">

    <!-- 頂部狀態橫幅 -->
    <div class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3 w-full md:w-auto">
                <div class="bg-blue-800 px-4 py-2 rounded-xl font-black text-lg">
                    <i class="fa-solid fa-user-doctor mr-2"></i><span id="currentUserLabel">藥師</span>
                </div>
                <span class="bg-emerald-500 text-white text-xs font-bold px-2.5 py-1 rounded-full"><i class="fa-solid fa-link mr-1"></i>已連線</span>
                <a href="inventory_login.html" class="bg-red-500 hover:bg-red-600 text-white text-xs font-bold px-3 py-1.5 rounded-xl transition"><i class="fa-solid fa-house mr-1"></i>離開</a>
            </div>
            <div class="flex-1 w-full max-w-xl mx-4">
                <div class="flex justify-between text-xs font-bold mb-1">
                    <span>當前櫃位盤點進度 (<span id="currentZoneLabel">-</span>)</span>
                    <span id="progressText">0 / 0 (0%)</span>
                </div>
                <div class="w-full bg-blue-800 rounded-full h-3 overflow-hidden shadow-inner">
                    <div id="progressBar" class="bg-green-400 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
            <div class="w-full md:w-auto max-w-sm">
                <div class="relative w-full">
                    <input type="text" id="inventorySearch" placeholder="搜尋藥名、藥碼、儲位..." class="w-full pl-9 pr-4 py-2 rounded-xl text-slate-800 outline-none focus:ring-2 focus:ring-green-400 text-sm">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-slate-400 text-sm"></i>
                </div>
            </div>
        </div>

        <!-- 智慧儲位快捷鍵橫列（完美通殺英文字母 A/B/G 與 數字 1/2/4） -->
        <div class="max-w-7xl mx-auto mt-3 pt-2 border-t border-blue-500/40 flex items-center gap-2 overflow-x-auto no-scrollbar">
            <span class="text-xs font-bold text-blue-200 shrink-0"><i class="fa-solid fa-tags mr-1"></i>儲位快選:</span>
            <div id="locationBadgeContainer" class="flex items-center gap-1.5">
                <!-- 快捷鍵按鈕自動生成處 -->
            </div>
        </div>
    </div>

    <!-- 卡片網格 -->
    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <div id="inventoryGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-12 text-slate-400 font-bold">⏳ 正在同步彰醫精準盤點界面...</div>
        </div>
    </main>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
        authDomain: "drug--arrive.firebaseapp.com",
        databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
        projectId: "drug--arrive",
        storageBucket: "drug--arrive.appspot.com",
        messagingSenderId: "215426668369",
        appId: "1:215426668369:web:eaa94e83974fcec391a570"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const loginUser = urlParams.get('user') || '公用帳號';
    const mainZone = urlParams.get('mainZone') || 'even';
    const subZone = urlParams.get('subZone') || '冰箱';

    document.getElementById('currentUserLabel').innerText = loginUser;
    document.getElementById('currentZoneLabel').innerText = subZone;

    let masterDrugDb = [];
    let firebaseRecords = {};
    let activeLocationFilter = "";

    // 基礎邏輯：監聽資料庫
    onValue(ref(db, (mainZone === 'odd') ? 'masterOralList' : 'masterInjectList'), (snapshot) => {
        const data = snapshot.val() || {};
        let list = Object.values(data).filter(d => d.subZone === subZone);
        list.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
        masterDrugDb = list.map(d => ({...d, dbKey: d.id || d.dbKey}));
        generateLocationBadges();
        renderGrid();
        calculateProgress();
    });

    onValue(ref(db, `inventoryRecords/${subZone}`), (snapshot) => {
        firebaseRecords = snapshot.val() || {};
        renderGrid();
        calculateProgress();
    });

    // 核心渲染函式
    window.renderGrid = function() {
        const grid = document.getElementById('inventoryGrid');
        if (!grid) return;
        const searchVal = document.getElementById('inventorySearch').value.toUpperCase();
        grid.innerHTML = '';

        masterDrugDb.forEach(drug => {
            if (activeLocationFilter && getShortLocLabel(drug.location) !== activeLocationFilter) return;
            if (searchVal && !drug.name.toUpperCase().includes(searchVal) && !drug.id.toUpperCase().includes(searchVal)) return;

            const currentKey = drug.dbKey || drug.id;
            const record = firebaseRecords[currentKey] || { total: 0, user: '未盤' };
            const hasWeightMode = (drug.weightPer10 && drug.weightPer10 > 0);

            let card = document.createElement('div');
            card.className = "bg-white rounded-2xl border p-4 shadow-sm";
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-black text-slate-800">${drug.name}</h3>
                        <p class="text-[11px] text-slate-400">${drug.id} · ${drug.location || '無位號'}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-2xl font-black text-green-500">${record.total || 0}</span>
                        <div class="text-[9px] text-slate-400">負責: ${record.user}</div>
                    </div>
                </div>
                ${hasWeightMode ? `
                    <div class="mt-3 grid grid-cols-2 gap-2 text-center bg-slate-50 p-2 rounded-lg">
                        <div><label class="text-[9px] text-slate-400">輸入重量(g)</label>
                             <input type="number" step="any" oninput="calculateByWeight('${currentKey}', ${drug.weightPer10}, this.value)" class="w-full text-center border rounded p-1 text-sm"></div>
                        <div><label class="text-[9px] text-emerald-600">換算顆數</label>
                             <div id="display-qty-${currentKey}" class="text-emerald-600 font-black">${record.total || 0}</div></div>
                    </div>` : ''}
                <div class="mt-3 flex items-center justify-between">
                    <span class="text-xs font-black text-slate-500">總量(${drug.unitPiece || '支'})</span>
                    <input type="number" step="any" value="${record.total || 0}" onchange="updateSingleCount('${currentKey}', this.value)" 
                           class="w-24 text-center font-black border rounded-lg p-2 text-md">
                </div>`;
            grid.appendChild(card);
        });
    };

    // 輔助與互動函式
    window.updateSingleCount = (dbKey, val) => {
        set(ref(db, `inventoryRecords/${subZone}/${dbKey}`), { total: parseFloat(val) || 0, user: loginUser });
    };

    window.calculateByWeight = (dbKey, weightPer10, weightVal) => {
        const qty = Math.round(parseFloat(weightVal) / (weightPer10 / 10));
        document.getElementById(`display-qty-${dbKey}`).innerText = qty;
        updateSingleCount(dbKey, qty);
    };

    function getShortLocLabel(fullLoc) { /* ...原有的簡化邏輯... */ return fullLoc; }
    function generateLocationBadges() { /* ...原有的選單邏輯... */ }
    function calculateProgress() { /* ...原有的進度邏輯... */ }
    document.getElementById('inventorySearch').addEventListener('input', renderGrid);
</script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
</html>
