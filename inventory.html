<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彰化醫院藥劑科 - 智慧盤點系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen pb-12 pt-36 md:pt-28">

    <!-- 頂部狀態橫幅 -->
    <div class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3 w-full md:w-auto">
                <div class="bg-blue-800 px-4 py-2 rounded-xl font-black text-lg">
                    <i class="fa-solid fa-user-doctor mr-2"></i><span id="currentUserLabel">藥師</span>
                </div>
                <span class="bg-emerald-500 text-white text-xs font-bold px-2.5 py-1 rounded-full"><i class="fa-solid fa-link mr-1"></i>已連線</span>
                <a href="inventory_login.html" class="bg-red-500 hover:bg-red-600 text-white text-xs font-bold px-3 py-1.5 rounded-xl transition"><i class="fa-solid fa-house mr-1"></i>離開</a>
            </div>
            <div class="flex-1 w-full max-w-xl mx-4">
                <div class="flex justify-between text-xs font-bold mb-1">
                    <span>當前櫃位盤點進度 (<span id="currentZoneLabel">-</span>)</span>
                    <span id="progressText">0 / 0 (0%)</span>
                </div>
                <div class="w-full bg-blue-800 rounded-full h-3 overflow-hidden shadow-inner">
                    <div id="progressBar" class="bg-green-400 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
            <div class="w-full md:w-auto max-w-sm">
                <div class="relative w-full">
                    <input type="text" id="inventorySearch" placeholder="搜尋藥名、藥碼、儲位..." class="w-full pl-9 pr-4 py-2 rounded-xl text-slate-800 outline-none focus:ring-2 focus:ring-green-400 text-sm">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-slate-400 text-sm"></i>
                </div>
            </div>
        </div>

        <!-- 智慧儲位快捷鍵橫列（完美通殺英文字母 A/B/G 與 數字 1/2/4） -->
        <div class="max-w-7xl mx-auto mt-3 pt-2 border-t border-blue-500/40 flex items-center gap-2 overflow-x-auto no-scrollbar">
            <span class="text-xs font-bold text-blue-200 shrink-0"><i class="fa-solid fa-tags mr-1"></i>儲位快選:</span>
            <div id="locationBadgeContainer" class="flex items-center gap-1.5">
                <!-- 快捷鍵按鈕自動生成處 -->
            </div>
        </div>
    </div>

    <!-- 卡片網格 -->
    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <div id="inventoryGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-12 text-slate-400 font-bold">⏳ 正在同步彰醫精準盤點界面...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
            authDomain: "drug--arrive.firebaseapp.com",
            databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
            projectId: "drug--arrive",
            storageBucket: "drug--arrive.appspot.com",
            messagingSenderId: "215426668369",
            appId: "1:215426668369:web:eaa94e83974fcec391a570"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const loginUser = urlParams.get('user') || '公用帳號';
        const mainZone = urlParams.get('mainZone') || 'even';
        const subZone = urlParams.get('subZone') || '冰箱';

        document.getElementById('currentUserLabel').innerText = loginUser;
        document.getElementById('currentZoneLabel').innerText = subZone;

        let masterDrugDb = [];
        let firebaseRecords = {};
        let activeLocationFilter = ""; 

        const masterNode = (mainZone === 'odd') ? 'masterOralList' : 'masterInjectList';
        
        onValue(ref(db, masterNode), (snapshot) => {
            const data = snapshot.val() || {};
            
            Object.keys(data).forEach(k => {
                if (data[k].subZone === subZone && !data[k].dbKey) {
                    data[k].dbKey = data[k].id || k;
                }
            });
            let list = Object.values(data).filter(d => d.subZone === subZone);

            list.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
            masterDrugDb = list;
            
            generateLocationBadges();
            renderGrid();
            calculateProgress();
        });

        onValue(ref(db, `inventoryRecords/${subZone}`), (snapshot) => {
            firebaseRecords = snapshot.val() || {};
            renderGrid();
            calculateProgress();
        });

        // 🎯 究極類推核心大腦：支持中文字開頭，且完美相容括號內的英文字母 (A/B/G) 或 數字 (1/2/4)
        function getShortLocLabel(fullLoc) {
            if (!fullLoc) return "";
            const str = String(fullLoc).trim();
            
            // 🌟 超強正則：擷取開頭的中文，並強制抓取後方緊接著的「第一個字母或數字」
            // 範例：針(A1) -> 針A, 針(2-10) -> 針2, 針(B2) -> 針B, 針(G1) -> 針G
            const match = str.match(/^([^\d\A-Za-z\(\)]+)[\(\s-]*(.)/);
            if (match) {
                return match[1] + match[2].toUpperCase(); // 完美輸出 針A、針B、針2
            }
            return str; 
        }

        // 智慧橫列生成器
        function generateLocationBadges() {
            const container = document.getElementById('locationBadgeContainer');
            if (!container) return;
            container.innerHTML = '';

            let locSet = new Set();
            masterDrugDb.forEach(drug => {
                if (drug.location && String(drug.location).trim()) {
                    locSet.add(getShortLocLabel(drug.location));
                }
            });

            // 依拼音/筆畫順序漂亮排序快捷鍵
            let sortedLocs = Array.from(locSet).sort((a, b) => a.localeCompare(b, 'zh-Hans-TW-u-co-stroke'));

            // 「顯示全部」按鈕
            let allBtn = document.createElement('button');
            allBtn.className = `px-3 py-1 rounded-lg text-xs font-bold transition shrink-0 ${!activeLocationFilter ? 'bg-white text-blue-700 shadow-sm font-black' : 'bg-blue-700/50 text-blue-100 hover:bg-blue-700'}`;
            allBtn.innerText = "顯示全部";
            allBtn.onclick = () => {
                activeLocationFilter = "";
                generateLocationBadges();
                renderGrid();
            };
            container.appendChild(allBtn);

            // 長出過濾後的快捷按鈕
            sortedLocs.forEach(loc => {
                let btn = document.createElement('button');
                const isActive = (activeLocationFilter === loc);
                btn.className = `px-2.5 py-1 rounded-lg text-xs font-bold transition shrink-0 flex items-center gap-1 ${isActive ? 'bg-yellow-400 text-slate-900 shadow-sm font-black' : 'bg-blue-700/50 text-blue-100 hover:bg-blue-700'}`;
                btn.innerHTML = `<i class="fa-solid fa-folder-open opacity-70"></i> ${loc}`;
                btn.onclick = () => {
                    activeLocationFilter = isActive ? "" : loc;
                    generateLocationBadges();
                    renderGrid();
                };
                container.appendChild(btn);
            });
        }
function renderGrid() {
            const grid = document.getElementById('inventoryGrid');
            if (!grid) return;
            
            const searchVal = document.getElementById('inventorySearch').value.toUpperCase();
            grid.innerHTML = '';

            masterDrugDb.forEach(drug => {
                try {
                    // 1. 大類篩選
                    if (activeLocationFilter) {
                        let drugShortLoc = drug.location ? getShortLocLabel(drug.location) : "";
                        if (drugShortLoc !== activeLocationFilter) return;
                    }

                    // 2. 關鍵字搜尋
                    if (searchVal && !drug.name.toUpperCase().includes(searchVal) && !drug.id.toUpperCase().includes(searchVal) && !String(drug.location).toUpperCase().includes(searchVal)) return;

                    const currentKey = drug.dbKey || drug.id;
                    const record = firebaseRecords[currentKey] || { total: 0, user: '未盤' };
                    
                    let card = document.createElement('div');
                    card.className = "bg-white rounded-2xl border border-slate-200 shadow-sm p-4 flex flex-col justify-between relative overflow-hidden transition-all";
                    if (Number(record.total) > 0) card.classList.add('border-green-400', 'bg-green-50/10');

                    const isWeightZone = subZone.replace(/\s+/g, "").includes("罐裝秤重");
                    const hasArray = !!(drug.specArray && Array.isArray(drug.specArray) && drug.specArray.length > 0);
                    
                    let tagHtml = "";
                    // 🌟 修正點：如果是罐裝秤重頁面，優先顯示罐裝秤重標籤
                    if (isWeightZone) {
                        tagHtml = `<span class="text-[10px] bg-emerald-100 text-emerald-700 font-bold px-2 py-0.5 rounded-md"><i class="fa-solid fa-scale-balanced mr-1"></i>罐裝秤重模式</span>`;
                    } else if (hasArray && drug.desc) {
                        tagHtml = `<span class="text-[10px] bg-indigo-100 text-indigo-700 font-bold px-2 py-0.5 rounded-md"><i class="fa-solid fa-calculator mr-1"></i>${drug.desc}</span>`;
                    } else {
                        tagHtml = `<span class="text-[10px] bg-slate-100 text-slate-500 font-bold px-2 py-0.5 rounded-md"><i class="fa-solid fa-box-open mr-1"></i>純散裝品項</span>`;
                    }

                    // 3. 建立卡片骨架
                    let cardHtml = `
                        <div id="card-${currentKey}">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="font-black text-slate-800 text-base leading-tight line-clamp-2">${drug.name}</h3>
                                    <div class="text-[11px] text-slate-400 font-bold mt-1">${drug.id} · <span class="bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded font-mono">${drug.location ? '位號: '+drug.location : '無位號'}</span></div>
                                </div>
                                <div class="text-right shrink-0 ml-2">
                                    <span class="text-3xl font-black ${Number(record.total) > 0 ? 'text-green-500' : 'text-slate-300'}">${record.total}</span>
                                    <div class="text-[9px] text-slate-400 font-medium mt-1">負責: ${record.user}</div>
                                </div>
                            </div>
                            <div class="mt-3 flex space-x-1">${tagHtml}</div>
                    `;

                    // 4. 根據分頁型態長出對應的輸入介面 (🌟 優先判定 isWeightZone)
                    if (isWeightZone) {
                        // ① 罐裝秤重專用介面 (整瓶 + 重量g + 散裝顆數)
                        const w10 = drug.weight10 || drug.weightPer10 || 0;
                        const boxRate = (drug.specArray && drug.specArray[0]) ? drug.specArray[0].rate : 1000;
                        
                        cardHtml += `
                        <div class="mt-4 bg-slate-50 rounded-2xl border border-slate-200 p-3 shadow-inner">
                            <div class="text-[10px] text-indigo-600 font-bold mb-2 flex justify-between items-center">
                                <span>💊 1瓶 = ${boxRate}顆</span>
                                <span>⚖️ 10顆重: ${w10 > 0 ? w10 + 'g' : '未設定'}</span>
                            </div>                         
                           
                            <div class="grid grid-cols-3 gap-2">
                            <div>
                            <div class="text-[10px] font-bold text-slate-500 text-center mb-1">整瓶</div>
                            <input id="bottle-${currentKey}" type="number" min="0" value="${record.bottle || 0}"
                            oninput="updateBottlePreview('${currentKey}')"
                            onchange="updateBottleDrug('${currentKey}')"
                            class="w-full text-center font-black border rounded-xl p-1.5 text-sm bg-white shadow-sm">
                            </div>
                            <div>
                            <div class="text-[10px] font-bold text-slate-500 text-center mb-1">重量(g)</div>
                            <input id="gram-${currentKey}" type="number" step="any" min="0" value="${record.gram !== undefined ? record.gram : ''}"
                            oninput="updateBottlePreview('${currentKey}')"
                            onchange="updateBottleDrug('${currentKey}')"
                            class="w-full text-center font-black border rounded-xl p-1.5 text-sm bg-white shadow-sm" placeholder="0.0">
                            </div>
                            <div>
                            <div class="text-[10px] font-bold text-slate-500 text-center mb-1">散裝顆數</div>
                            <input id="piece-${currentKey}" type="number" min="0" value="${record.piece || 0}"
                            oninput="updateBottlePreview('${currentKey}')"
                            onchange="updateBottleDrug('${currentKey}')"
                            class="w-full text-center font-black border rounded-xl p-1.5 text-sm bg-white shadow-sm">
                            </div>
                            </div>                            
                            <div class="flex justify-between items-center mt-3 pt-2 border-t border-slate-200">
                                <span class="text-xs font-bold text-slate-600">總量計算：</span>
                                <span id="display-total-${currentKey}" class="text-xl font-black text-green-600">${record.total || 0} 顆</span>
                            </div>
                        </div>
                        `;
                        
                    } else 
                        if (hasArray) {
                        // ① 多規格 (🌟 依照大到小排序：盒/瓶 -> 束 -> 排 -> 顆)
                        cardHtml += `<div class="flex flex-row gap-1.5 mt-4 w-full">`;
                        
                        // 建立一份複本並進行排序或反轉，讓「束」或「盒」的大單位排在前面
                        const sortedSpecs = [...drug.specArray].sort((a, b) => {
                            // 定義單位權重：束 > 排 > 其他
                            const getWeight = (label) => {
                                if (label.includes('盒') || label.includes('瓶')) return 3;
                                if (label.includes('束')) return 2;
                                if (label.includes('排') || label.includes('片')) return 1;
                                return 0;
                            };
                            return getWeight(b.label) - getWeight(a.label); // 大單位在前
                        });

                        sortedSpecs.forEach((spec, idx)=>{
                            // 找出原本在陣列中的真實索引，確保寫入 Firebase 時對應正確的欄位
                            const realIdx = drug.specArray.findIndex(s => s.label === spec.label);
                            const value = record[`spec_${realIdx}`] ?? 0;
                            
                            cardHtml += `
                            <div class="bg-slate-50 p-2 rounded-xl border flex-1">
                                <div class="text-xs font-bold text-center text-indigo-600">${spec.label}</div>
                                <input id="input-${currentKey}-${realIdx}" type="number" value="${value}" min="0"
                                onchange="updateMultiCount('${currentKey}',${realIdx},this.value)"
                                class="w-full text-center border rounded-lg p-1">
                            </div>`;
                        });
                        cardHtml += `</div>`;
                        
                    } else {
                        // ③ 一般單一數量
                        cardHtml += `
                        <div class="mt-4">
                            <input id="single-${currentKey}" type="number" min="0"
                                value="${record.total||0}"
                                oninput="updateSingleCount('${currentKey}',this.value)"
                                class="w-full text-center border rounded-xl p-2 text-xl">
                        </div>
                        `;
                    }

                    // 5. 封裝並放入頁面
                    cardHtml += `</div>`;
                    card.innerHTML = cardHtml;
                    grid.appendChild(card);

                } catch (cardError) {
                    console.error("渲染錯誤:", cardError);
                }
            });
        }
        // ===============================
        // 純散裝儲存
        // ===============================
        window.updateSingleCount = function(dbKey,val){
            const intVal = Math.max(0,parseInt(val)||0);
            const old = firebaseRecords[dbKey] || {};
            set(
                ref(db,`inventoryRecords/${subZone}/${dbKey}`),
                {
                    ...old,
                    total:intVal,
                    user:loginUser
                }
            );
        };
        // ===============================
        // 即時預覽(不存Firebase)
        // ===============================
        window.updateBottlePreview = function(dbKey){
    const drug = masterDrugDb.find(
        d => d.dbKey === dbKey || d.id === dbKey
    );
    if(!drug) return;
    
    const bottle = parseInt(document.getElementById(`bottle-${dbKey}`)?.value) || 0;
    const gram = parseFloat(document.getElementById(`gram-${dbKey}`)?.value) || 0;
    const piece = parseInt(document.getElementById(`piece-${dbKey}`)?.value) || 0;
    
    // 1. 重量換算顆數公式： 重量(g) / (10顆重 / 10)
    let weightPiece = 0;
    const weight10 = drug.weight10 || drug.weightPer10 || 0;
    if(weight10 > 0 && gram > 0){
        const singleWeight = weight10 / 10; // 單顆重量
        weightPiece = Math.round(gram / singleWeight); // 四捨五入換算顆數
    }
    
    // 2. 一瓶幾顆 (從 specArray 抓取倍率，預設 1000)
    let bottleRate = 1000;     
    if(drug.specArray && drug.specArray.length > 0){
        bottleRate = Number(drug.specArray[0].rate) || 1000;
    }
    
    // 3. 總量加總
    const total = (bottle * bottleRate) + weightPiece + piece;
    
    const display = document.getElementById(`display-total-${dbKey}`);
    if(display){
        display.innerText = total + " 顆";
    }
    
    return {
        bottle,
        gram,
        piece,
        total
    };
};
        // ===============================
        // 離開欄位才存Firebase
        // ===============================
        window.updateBottleDrug = function(dbKey){
            if(!subZone.includes("罐裝秤重")) return;
            const drug=masterDrugDb.find(
                d=>d.dbKey===dbKey||d.id===dbKey
            );
            if(!drug) return;
            const result = updateBottlePreview(dbKey);
            if(!result) return;
            set(
                ref(db, `inventoryRecords/${subZone}/${dbKey}`),
                {
                    bottle: result.bottle,
                    gram: result.gram,
                    piece: result.piece,
                    total: result.total,
                    user: loginUser
                }
            );
        };

        // 智慧型換算大腦
        window.updateMultiCount = function(dbKey, specIdx, val) {
            const intVal = Math.max(0, parseInt(val) || 0);
            const drug = masterDrugDb.find(d => d.dbKey === dbKey || d.id === dbKey);
            if (!drug || !drug.specArray || !Array.isArray(drug.specArray)) return;
            
            let currentRecord = firebaseRecords[dbKey] ? JSON.parse(JSON.stringify(firebaseRecords[dbKey])) : { total: 0 };
            currentRecord[`spec_${specIdx}`] = intVal;

            let grandTotal = 0;
            const specs = drug.specArray;
            const len = specs.length;

            for (let i = 0; i < len; i++) {
                const inputDom = document.getElementById(`input-${dbKey}-${i}`);
                const currentBoxCount = inputDom ? (Math.max(0, parseInt(inputDom.value) || 0)) : (Math.max(0, parseInt(currentRecord[`spec_${i}`]) || 0));
                
                currentRecord[`spec_${i}`] = currentBoxCount;

                let currentRate = specs[i] ? (parseFloat(specs[i].rate) || 1) : 1;
                if (i === len - 1) {
                    currentRate = 1;
                }

                grandTotal += (Number(currentBoxCount) * Number(currentRate));
            }

            currentRecord.total = grandTotal;
            currentRecord.user = loginUser;

            set(ref(db, `inventoryRecords/${subZone}/${dbKey}`), currentRecord);
        };

        function calculateProgress() {
            const totalItems = masterDrugDb.length;
            let completedItems = 0;
            masterDrugDb.forEach(d => {
                const k = d.dbKey || d.id;
                if (firebaseRecords[k] && Number(firebaseRecords[k].total) > 0) completedItems++;
            });
            const percent = totalItems > 0 ? Math.round((completedItems / totalItems) * 100) : 0;
            document.getElementById('progressText').innerText = `${completedItems} / ${totalItems} (${percent}%)`;
            document.getElementById('progressBar').style.width = percent + '%';
        }

        document.getElementById('inventorySearch').addEventListener('input', renderGrid);

       // ===============================
        // 確保點擊輸入框時，完美停在藍色表頭下方而不被遮擋
        // ===============================
        document.addEventListener('focusin', function(e) {
            if (e.target.tagName === 'INPUT' && e.target.type === 'number') {
                setTimeout(() => {
                    // 取得目前頂部藍色表頭的實際高度（會隨手機畫面自動計算）
                    const stickyHeader = document.querySelector('.sticky');
                    const headerHeight = stickyHeader ? stickyHeader.offsetHeight : 140;

                    // 取得輸入框目前相對於視窗的位置
                    const rect = e.target.getBoundingClientRect();

                    // 如果輸入框的頂端小於表頭高度（代表被表頭蓋住或太靠近頂部）
                    if (rect.top < headerHeight + 20) {
                        // 計算需要往下捲動的精準距離
                        const scrollY = window.pageYOffset || document.documentElement.scrollTop;
                        window.scrollTo({
                            top: scrollY + rect.top - headerHeight - 20,
                            behavior: 'smooth'
                        });
                    }
                }, 350);
            }
        });
        
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
</html>
