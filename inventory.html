<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彰化醫院藥劑科 - 智慧盤點系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen pb-12">

    <!-- 頂部藍色狀態導覽欄 (完全還原截圖樣式) -->
    <div class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <!-- 人員與連線狀態 -->
            <div class="flex items-center space-x-3 w-full md:w-auto">
                <div class="bg-blue-800 px-4 py-2 rounded-xl font-black text-lg flex items-center">
                    <i class="fa-solid fa-user-doctor mr-2"></i>
                    <select id="inventoryUser" class="bg-transparent outline-none cursor-pointer text-white">
                        <option value="李瑞文" class="text-slate-800">李瑞文</option>
                        <option value="陳東錦" class="text-slate-800">陳東錦</option>
                        <option value="賴錦益" class="text-slate-800">賴錦益</option>
                        <option value="邱富強" class="text-slate-800">邱富強</option>
                        <option value="張幸逢" class="text-slate-800">張幸逢</option>
                        <option value="洪紹寧" class="text-slate-800">洪紹寧</option>
                        <option value="劉孟育" class="text-slate-800">劉孟育</option>
                        <option value="蘇惠敏" class="text-slate-800">蘇惠敏</option>
                        <option value="林雅萍" class="text-slate-800">林雅萍</option>
                        <option value="黃聖剛" class="text-slate-800">黃聖剛</option>
                        <option value="陳麗君" class="text-slate-800">陳麗君</option>
                        <option value="楊德宏" class="text-slate-800">楊德宏</option>
                        <option value="陳玫君" class="text-slate-800">陳玫君</option>
                        <option value="馬惠玲" class="text-slate-800">馬惠玲</option>
                        <option value="吳婉瑄" class="text-slate-800">吳婉瑄</option>
                        <option value="嚴宗賓" class="text-slate-800">嚴宗賓</option>                        
                        <option value="張雨淳" class="text-slate-800">張雨淳</option>
                        <option value="劉育伶" class="text-slate-800">劉育伶</option>
                        <option value="邱瑞航" class="text-slate-800">邱瑞航</option>
                        <option value="吳致寛" class="text-slate-800">吳致寛</option>
                        <option value="葉儒樺" class="text-slate-800">葉儒樺</option>
                        <option value="劉子嫣" class="text-slate-800">劉子嫣</option>
                        <option value="許佳燕" class="text-slate-800">許佳燕</option>
                        <option value="劉佳昕" class="text-slate-800">劉佳昕</option>
                        <option value="黃竹珈" class="text-slate-800">黃竹珈</option>
                        <option value="胡明哲" class="text-slate-800">胡明哲</option>
                        <option value="李婉華" class="text-slate-800">李婉華</option>
                        <option value="邱麒文" class="text-slate-800">邱麒文</option>
                        <option value="陳舒婷" class="text-slate-800">陳舒婷</option>
                        <option value="柯宜君" class="text-slate-800">柯宜君</option>
                        <option value="陳宜君" class="text-slate-800">陳宜君</option>
                        <option value="賴達志" class="text-slate-800">賴達志</option>
                        <option value="莊于靚" class="text-slate-800">莊于靚</option>
                    </select>
                </div>
                <span class="bg-emerald-500 text-white text-xs font-bold px-2.5 py-1 rounded-full"><i class="fa-solid fa-link mr-1"></i>已連線</span>
                <span class="bg-cyan-500 text-white text-xs font-bold px-2.5 py-1 rounded-full"><i class="fa-solid fa-rotate mr-1"></i>已同步</span>
                <a href="index.html" class="bg-red-500 hover:bg-red-600 text-white text-xs font-bold px-3 py-1.5 rounded-xl transition"><i class="fa-solid fa-house mr-1"></i>離開</a>
            </div>

            <!-- 完成進度條 -->
            <div class="flex-1 w-full max-w-xl mx-4">
                <div class="flex justify-between text-xs font-bold mb-1">
                    <span>盤點完成進度</span>
                    <span id="progressText">0 / 0 (0%)</span>
                </div>
                <div class="w-full bg-blue-800 rounded-full h-3 overflow-hidden shadow-inner">
                    <div id="progressBar" class="bg-green-400 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <!-- 搜尋與新增 -->
            <div class="flex items-center space-x-2 w-full md:w-auto max-w-sm">
                <div class="relative w-full">
                    <input type="text" id="inventorySearch" placeholder="搜尋藥名、藥碼..." class="w-full pl-9 pr-4 py-2 rounded-xl text-slate-800 outline-none focus:ring-2 focus:ring-green-400 text-sm">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-slate-400 text-sm"></i>
                </div>
                <button onclick="alert('已同步最新雲端品項！')" class="bg-green-500 hover:bg-green-600 p-2.5 rounded-xl text-white shadow-md active:scale-95 transition"><i class="fa-solid fa-sync"></i></button>
            </div>
        </div>
    </div>

    <!-- 儲位/分類分頁標籤 -->
    <div class="bg-white border-b shadow-sm sticky top-[76px] z-30">
        <div class="max-w-7xl mx-auto p-3 flex items-center space-x-2 overflow-x-auto">
            <button onclick="filterStorage('all')" id="btn-storage-all" class="storage-tab px-4 py-1.5 bg-blue-600 text-white font-bold rounded-xl text-xs shadow shadow-blue-200 shrink-0">顯示全部</button>
            <button onclick="filterStorage('冰')" id="btn-storage-冰" class="storage-tab px-4 py-1.5 bg-slate-100 text-slate-600 font-bold rounded-xl text-xs hover:bg-slate-200 shrink-0">❄️ 冰庫品項</button>
            <button onclick="filterStorage('口服')" id="btn-storage-口服" class="storage-tab px-4 py-1.5 bg-slate-100 text-slate-600 font-bold rounded-xl text-xs hover:bg-slate-200 shrink-0">💊 口服藥區</button>
            <button onclick="filterStorage('針劑')" id="btn-storage-針劑" class="storage-tab px-4 py-1.5 bg-slate-100 text-slate-600 font-bold rounded-xl text-xs hover:bg-slate-200 shrink-0">💉 針劑藥區</button>
            <button onclick="filterStorage('外用')" id="btn-storage-外用" class="storage-tab px-4 py-1.5 bg-slate-100 text-slate-600 font-bold rounded-xl text-xs hover:bg-slate-200 shrink-0">🧴 外用藥區</button>
        </div>
    </div>

    <!-- 盤點卡片主網格區 -->
    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <div id="inventoryGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- 智慧盤點卡片會由 JavaScript 自動在此精美渲染 -->
        </div>
    </main>

    <!-- 核心 JavaScript 計算與連線邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
            authDomain: "drug--arrive.firebaseapp.com",
            databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
            projectId: "drug--arrive",
            storageBucket: "drug--arrive.appspot.com",
            messagingSenderId: "215426668369",
            appId: "1:215426668369:web:eaa94e83974fcec391a570"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 彰醫種子盤點藥品庫（包含不同的包裝換算率）
        const drugDb = [
            { id: 'RI-I99', name: 'Humulin R', form: '冰', rate1: 10, unit1: '束', unit2: '支', desc: '1束=10支' },
            { id: 'INSI14', name: 'Novomix 30', form: '冰', rate1: 5, unit1: '盒', unit2: '支', desc: '1盒=5支' },
            { id: 'INSI13', name: 'NovoRapid', form: '冰', rate1: 5, unit1: '盒', unit2: '支', desc: '1盒=5支' },
            { id: 'INSI19', name: 'Ryzodeg', form: '冰', rate1: 5, unit1: '盒', unit2: '支', desc: '1盒=5支' },
            { id: 'INSI16', name: 'Toujeo', form: '冰', rate1: 5, unit1: '盒', unit2: '支', desc: '1盒=5支' },
            { id: 'INSI17', name: 'Tresiba', form: '冰', rate1: 5, unit1: '盒', unit2: '支', desc: '1盒=5支' },
            { id: 'GLMO01', name: 'Amamet', form: '口服', rate1: 1000, rate2: 10, unit1: '盒', unit2: '排', unit3: '顆', desc: '1盒=1000顆/1排=10顆' },
            { id: 'DROO00', name: 'Multaq', form: '口服', rate1: 60, rate2: 10, unit1: '盒', unit2: '排', unit3: '顆', desc: '1盒=60顆/1排=10顆' },
            { id: 'SITO05', name: 'SitaMet', form: '口服', rate1: 1000, rate2: 10, unit1: '盒', unit2: '排', unit3: '顆', desc: '1盒=1000顆/1排=10顆' },
            { id: 'AMIO12', name: 'Adarone', form: '口服', rate1: 1000, rate2: 10, unit1: '盒', unit2: '排', unit3: '顆', desc: '1盒=1000顆/1排=10顆' },
            { id: 'API000', name: 'Eliquis', form: '口服', rate1: 56, rate2: 14, unit1: '盒', unit2: '排', unit3: '顆', desc: '1盒=56顆/1排=14顆' },
            { id: 'EDOO02', name: 'LIXIANA 60', form: '口服', rate1: 28, rate2: 7, unit1: '盒', unit2: '排', unit3: '顆', desc: '1盒=28顆/1排=7顆' }
        ];

        let currentStorageFilter = 'all';
        let firebaseRecords = {};

        // 監聽 Firebase 盤點即時數據
        onValue(ref(db, 'inventoryRecords'), (snapshot) => {
            firebaseRecords = snapshot.val() || {};
            renderGrid();
            calculateProgress();
        });

        // 動態渲染卡片
        function renderGrid() {
            const grid = document.getElementById('inventoryGrid');
            const searchVal = document.getElementById('inventorySearch').value.toUpperCase();
            grid.innerHTML = '';

            drugDb.forEach(drug => {
                // 搜尋與篩選過濾
                if (currentStorageFilter !== 'all' && drug.form !== currentStorageFilter) return;
                if (searchVal && !drug.name.toUpperCase().includes(searchVal) && !drug.id.toUpperCase().includes(searchVal)) return;

                const record = firebaseRecords[drug.id] || { u1: 0, u2: 0, u3: 0, total: 0, user: '未盤' };
                
                // 建立卡片 HTML
                let card = document.createElement('div');
                card.className = "bg-white rounded-2xl border border-slate-200 shadow-sm p-4 flex flex-col justify-between relative overflow-hidden transition-all";
                if(record.total > 0) card.classList.add('border-green-400', 'bg-green-50/10');

                // 判斷是三單位(盒/排/顆)還是雙單位(束/支)
                let isThreeUnit = drug.unit3 ? true : false;

                card.innerHTML = `
                    <div>
                        <!-- 藥名與狀態頂部 -->
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-black text-slate-800 text-lg leading-tight">${drug.name}</h3>
                                <div class="text-[11px] text-slate-400 font-bold mt-0.5">${drug.id} · <span class="bg-blue-50 text-blue-600 px-1.5 py-0.2 rounded">${drug.form}</span></div>
                            </div>
                            <!-- 右上角計算出的總量 -->
                            <div class="text-right">
                                <span class="text-3xl font-black ${record.total > 0 ? 'text-green-500' : 'text-slate-300'}">${record.total}</span>
                                <div class="text-[9px] text-slate-400 font-medium">最後盤點: ${record.user}</div>
                            </div>
                        </div>

                        <!-- 單位規則小標籤 -->
                        <div class="mt-2 flex space-x-1">
                            <span class="text-[10px] bg-green-100 text-green-700 font-bold px-2 py-0.5 rounded-md"><i class="fa-solid fa-calculator mr-1"></i>${drug.desc}</span>
                        </div>

                        <!-- 輸入框群組 -->
                        <div class="grid grid-cols-3 gap-2 mt-4">
                            <!-- 單位1 -->
                            <div class="bg-slate-50 p-2 rounded-xl border border-slate-100 text-center">
                                <span class="text-[10px] font-bold text-slate-400 block mb-1">${drug.unit1}</span>
                                <input type="number" value="${record.u1 || 0}" min="0" onchange="updateCount('${drug.id}', 'u1', this.value)" class="w-full text-center font-black text-slate-700 border rounded-lg p-1 text-md outline-none focus:border-blue-500">
                            </div>
                            <!-- 單位2 -->
                            <div class="bg-slate-50 p-2 rounded-xl border border-slate-100 text-center">
                                <span class="text-[10px] font-bold text-slate-400 block mb-1">${drug.unit2}</span>
                                <input type="number" value="${record.u2 || 0}" min="0" onchange="updateCount('${drug.id}', 'u2', this.value)" class="w-full text-center font-black text-slate-700 border rounded-lg p-1 text-md outline-none focus:border-blue-500">
                            </div>
                            <!-- 單位3 (如果有才秀) -->
                            <div class="bg-slate-50 p-2 rounded-xl border border-slate-100 text-center ${isThreeUnit ? '' : 'invisible'}">
                                <span class="text-[10px] font-bold text-slate-400 block mb-1">${drug.unit3 || ''}</span>
                                <input type="number" value="${record.u3 || 0}" min="0" onchange="updateCount('${drug.id}', 'u3', this.value)" class="w-full text-center font-black text-slate-700 border rounded-lg p-1 text-md outline-none focus:border-blue-500">
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 核心智慧加總演算法
        window.updateCount = function(drugId, unitKey, val) {
            const intVal = Math.max(0, parseInt(val) || 0);
            const drug = drugDb.find(d => d.id === drugId);
            const currentRecord = firebaseRecords[drugId] || { u1: 0, u2: 0, u3: 0 };
            const loginUser = document.getElementById('inventoryUser').value;

            // 更新當前點擊的數值
            currentRecord[unitKey] = intVal;

            // 自動總量換算邏輯
            let calculatedTotal = 0;
            if (drug.unit3) {
                // 三單位換算率 (例如: 1盒 = 1000顆 / 1排 = 10顆)
                // 總量 = (盒 * 盒換算率) + (排 * 排換算率) + 顆
                calculatedTotal = (currentRecord.u1 * drug.rate1) + (currentRecord.u2 * drug.rate2) + currentRecord.u3;
            } else {
                // 雙單位換算率 (例如: 1束 = 10支)
                // 總量 = (束 * 束換算率) + 支
                calculatedTotal = (currentRecord.u1 * drug.rate1) + currentRecord.u2;
            }

            // 同步寫入 Firebase
            set(ref(db, 'inventoryRecords/' + drugId), {
                u1: currentRecord.u1,
                u2: currentRecord.u2,
                u3: currentRecord.u3 || 0,
                total: calculatedTotal,
                user: loginUser
            });
        };

        // 分頁篩選
        window.filterStorage = function(storageName) {
            currentStorageFilter = storageName;
            document.querySelectorAll('.storage-tab').forEach(btn => {
                btn.className = "storage-tab px-4 py-1.5 bg-slate-100 text-slate-600 font-bold rounded-xl text-xs hover:bg-slate-200 shrink-0";
            });
            document.getElementById('btn-storage-' + storageName).className = "storage-tab px-4 py-1.5 bg-blue-600 text-white font-bold rounded-xl text-xs shadow shadow-blue-200 shrink-0";
            renderGrid();
        };

        // 實時計算盤點進度條
        function calculateProgress() {
            const totalItems = drugDb.length;
            let completedItems = 0;
            drugDb.forEach(d => {
                if (firebaseRecords[d.id] && firebaseRecords[d.id].total > 0) {
                    completedItems++;
                }
            });

            const percent = totalItems > 0 ? Math.round((completedItems / totalItems) * 100) : 0;
            document.getElementById('progressText').innerText = `${completedItems} / ${totalItems} (${percent}%)`;
            document.getElementById('progressBar').style.style = `width: ${percent}%`;
            document.getElementById('progressBar').style.width = percent + '%';
        }

        // 綁定搜尋輸入框
        document.getElementById('inventorySearch').addEventListener('input', renderGrid);
    </script>
</body>
</html>
