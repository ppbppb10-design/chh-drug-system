<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彰化醫院藥劑科 - 智慧盤點系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen pb-12">

    <div class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3 w-full md:w-auto">
                <div class="bg-blue-800 px-4 py-2 rounded-xl font-black text-lg">
                    <i class="fa-solid fa-user-doctor mr-2"></i><span id="currentUserLabel">藥師</span>
                </div>
                <span class="bg-emerald-500 text-white text-xs font-bold px-2.5 py-1 rounded-full"><i class="fa-solid fa-link mr-1"></i>已連線</span>
                <a href="inventory_login.html" class="bg-red-500 hover:bg-red-600 text-white text-xs font-bold px-3 py-1.5 rounded-xl transition"><i class="fa-solid fa-house mr-1"></i>離開</a>
            </div>
            <div class="flex-1 w-full max-w-xl mx-4">
                <div class="flex justify-between text-xs font-bold mb-1">
                    <span>當前櫃位盤點進度 (<span id="currentZoneLabel">-</span>)</span>
                    <span id="progressText">0 / 0 (0%)</span>
                </div>
                <div class="w-full bg-blue-800 rounded-full h-3 overflow-hidden shadow-inner">
                    <div id="progressBar" class="bg-green-400 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
            <div class="w-full md:w-auto max-w-sm">
                <div class="relative w-full">
                    <input type="text" id="inventorySearch" placeholder="搜尋藥名、藥碼..." class="w-full pl-9 pr-4 py-2 rounded-xl text-slate-800 outline-none focus:ring-2 focus:ring-green-400 text-sm">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-slate-400 text-sm"></i>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <div id="inventoryGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-12 text-slate-400 font-bold">⏳ 正在載入彰醫精準盤點界面...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
            authDomain: "drug--arrive.firebaseapp.com",
            databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
            projectId: "drug--arrive",
            storageBucket: "drug--arrive.appspot.com",
            messagingSenderId: "215426668369",
            appId: "1:215426668369:web:eaa94e83974fcec391a570"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const loginUser = urlParams.get('user') || '公用帳號';
        const mainZone = urlParams.get('mainZone') || 'even';
        const subZone = urlParams.get('subZone') || '冰箱';

        document.getElementById('currentUserLabel').innerText = loginUser;
        document.getElementById('currentZoneLabel').innerText = subZone;

        let masterDrugDb = [];
        let firebaseRecords = {};

        const masterNode = (mainZone === 'odd') ? 'masterOralList' : 'masterInjectList';
        
        onValue(ref(db, masterNode), (snapshot) => {
            const data = snapshot.val() || {};
            let list = Object.values(data).filter(d => d.subZone === subZone);
            list.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
            masterDrugDb = list;
            renderGrid();
            calculateProgress();
        });

        onValue(ref(db, `inventoryRecords/${subZone}`), (snapshot) => {
            firebaseRecords = snapshot.val() || {};
            renderGrid();
            calculateProgress();
        });

        function renderGrid() {
            const grid = document.getElementById('inventoryGrid');
            const searchVal = document.getElementById('inventorySearch').value.toUpperCase();
            grid.innerHTML = '';

            masterDrugDb.forEach(drug => {
                if (searchVal && !drug.name.toUpperCase().includes(searchVal) && !drug.id.toUpperCase().includes(searchVal) && !String(drug.location).toUpperCase().includes(searchVal)) return;

                const record = firebaseRecords[drug.dbKey] || { total: 0, user: '未盤' };
                let card = document.createElement('div');
                card.className = "bg-white rounded-2xl border border-slate-200 shadow-sm p-4 flex flex-col justify-between relative overflow-hidden transition-all";
                if (record.total > 0) card.classList.add('border-green-400', 'bg-green-50/10');

                let cardHtml = `
                    <div>
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-black text-slate-800 text-base leading-tight line-clamp-2">${drug.name}</h3>
                                <div class="text-[11px] text-slate-400 font-bold mt-1">${drug.id} · <span class="bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded font-mono">${drug.location ? '位號: '+drug.location : '無位號'}</span></div>
                            </div>
                            <div class="text-right shrink-0 ml-2">
                                <span class="text-3xl font-black ${record.total > 0 ? 'text-green-500' : 'text-slate-300'}">${record.total}</span>
                                <div class="text-[9px] text-slate-400 font-medium mt-1">負責: ${record.user}</div>
                            </div>
                        </div>
                `;

                // 🎯 完美收斂路由分流
                if (drug.isMultiSpec && drug.specArray) {
                    // 🌟 1. 藍標多規格預包區
                    cardHtml += `
                        <div class="mt-3 flex space-x-1">
                            <span class="text-[10px] bg-indigo-100 text-indigo-700 font-bold px-2 py-0.5 rounded-md"><i class="fa-solid fa-calculator mr-1"></i>${drug.desc}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-4">
                    `;
                    drug.specArray.forEach((spec, idx) => {
                        const currentVal = record[`spec_${idx}`] || 0;
                        cardHtml += `
                            <div class="bg-slate-50 p-2 rounded-xl border border-slate-100 text-center">
                                <span class="text-[10px] font-black text-indigo-500 block mb-1 tracking-tighter">${spec.label}</span>
                                <input type="number" value="${currentVal}" min="0" onchange="updateMultiCount('${drug.dbKey}', ${idx}, this.value)" class="w-full text-center font-black text-slate-700 border rounded-lg p-1 text-sm outline-none focus:border-indigo-500">
                            </div>
                        `;
                    });
                    cardHtml += `</div>`;
                } else if (drug.hasCustomSpec) {
                    // 🌟 2. 有
