<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">
    <title>彰醫四級管制藥智慧盤點系統 V2</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="bg-slate-100">

    <!-- Header -->
    <header>

        <div class="bg-red-700 text-white shadow-lg">

            <div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4">

                <div class="flex items-center gap-4">

                    <button id="btnHome"
                        class="bg-white/20 hover:bg-white/30 rounded-xl px-4 py-2">

                        <i class="fa-solid fa-house"></i>

                        回系統首頁

                    </button>

                    <div>

                        <div class="text-3xl font-black">

                            💊 彰醫四級管制藥智慧盤點系統 V2

                        </div>

                        <div class="text-sm">

                            CHHW

                        </div>

                    </div>

                </div>

                <div class="text-right">

                    <div id="clock"></div>

                    <div class="text-xs">

                        Version 2.0

                    </div>

                </div>

            </div>

        </div>

    </header>

    <!-- 主內容 -->
    <main class="max-w-7xl mx-auto p-5 space-y-5">

        <section id="controlCenter"></section>

        <section id="dashboardArea"></section>

        <section id="toolCenter"></section>

        <section id="matrixArea"></section>

        <section id="summaryArea"></section>

    </main>

    <!-- Footer -->
    <footer>

        <div class="bg-slate-800 text-white mt-10">

            <div class="max-w-7xl mx-auto p-6 flex justify-between">

                <div>

                    彰化醫院藥劑科<br>

                    四級管制藥智慧管理系統

                </div>

                <div>

                    Version 2.0

                </div>

            </div>

        </div>

    </footer>

    <!-- Modal -->
    <div id="modalArea"></div>

</body>

</html>
