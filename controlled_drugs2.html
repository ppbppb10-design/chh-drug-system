<main class="max-w-7xl mx-auto p-5 space-y-6">

    <!-- Control Center -->

    <div class="bg-white rounded-2xl shadow-lg p-6">

        <div class="grid lg:grid-cols-4 gap-4">

            <!-- 日期 -->

            <div>

                <label class="block text-sm font-bold text-slate-500 mb-2"> 🗓️ 核帳日期

                </label>

                <input type="date" id="targetDate" class="w-full border rounded-xl p-3 font-bold">

            </div>

            <!-- 盤點藥師 -->

            <div>

                <label class="block text-sm font-bold text-slate-500 mb-2"> 👨‍⚕️ 盤點藥師

                </label>

                <select id="pharmacistName" class="w-full border rounded-xl p-3">
                    <option value="">請選擇</option>
                </select>
            </div>

            <!-- 覆核藥師 -->

            <div>

                <label class="block text-sm font-bold text-slate-500 mb-2"> 🕵️ A2 覆核藥師
                </label>
                <select id="approverName" class="w-full border rounded-xl p-3">
                    <option value="">請選擇</option>
                </select>
            </div>

            <!-- 完成盤點 -->

            <div class="flex items-end">

                <button id="btnLockDay"
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl py-4 text-lg font-black"> 🔒 簽章並完成盤點

                </button>

            </div>

        </div>

    </div>

</main>
  <!-- Tool Center -->
    <!-- Dashboard -->

<div class="grid grid-cols-2 lg:grid-cols-4 gap-4">

    <div class="bg-white rounded-2xl shadow-lg p-5">

        <div class="text-slate-500 font-bold"> 📦 今日藥品
        </div>

        <div id="dashDrugCount" class="text-4xl font-black text-red-600 mt-3">

            0

        </div>

    </div>

    <div class="bg-white rounded-2xl shadow-lg p-5">

        <div class="text-slate-500 font-bold"> ✅ 已盤點
        </div>

        <div id="dashFinished" class="text-4xl font-black text-emerald-600 mt-3">

            0

        </div>

    </div>

    <div class="bg-white rounded-2xl shadow-lg p-5">

        <div class="text-slate-500 font-bold"> ⚠️ 今日盤差
        </div>

        <div id="dashDiff" class="text-4xl font-black text-orange-500 mt-3">

            0

        </div>

    </div>

    <div class="bg-white rounded-2xl shadow-lg p-5">

        <div class="text-slate-500 font-bold"> 🔒 覆核狀態
        </div>

        <div id="dashLock" class="text-2xl font-black text-blue-600 mt-4">

            未完成

        </div>

    </div>

</div>

<div class="bg-white rounded-2xl shadow-lg p-6">

        </button>

        <button
            id="btnReportCenter"
            class="bg-cyan-600 hover:bg-cyan-700 text-white rounded-xl py-5 text-lg font-black"> 📊 智慧報表中心

        </button>

        <button
            id="btnHoliday"
            class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl py-5 text-lg font-black"> 📋 假日異動中心

        </button>

    </div>

</div>
