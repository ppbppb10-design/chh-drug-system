<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">
    <title>彰醫四級管制藥智慧盤點系統 V2</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="bg-slate-100">

    <!-- Header -->
    <header>

        <div class="bg-red-700 text-white shadow-lg">

            <div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4">

                <div class="flex items-center gap-4">

                    <button id="btnHome"
                        class="bg-white/20 hover:bg-white/30 rounded-xl px-4 py-2">

                        <i class="fa-solid fa-house"></i> 回系統首頁

                    </button>

                    <div>

                        <div class="text-3xl font-black"> 💊 彰醫四級管制藥智慧盤點系統 V2

                        </div>

                        <div class="text-sm"> CHHW

                        </div>

                    </div>

                </div>

                <div class="text-right">

                    <div id="clock"></div>

                    <div class="text-xs"> Version 2.0

                    </div>

                </div>

            </div>

        </div>

    </header>

    <!-- 主內容 -->
    <main class="max-w-7xl mx-auto p-5 space-y-5">

        <section id="controlCenter"></section>
        <section id="controlCenter">

<div class="bg-white rounded-3xl shadow-lg p-6">

<div class="grid lg:grid-cols-4 gap-5">

    <!-- 日期 -->
    <div>

        <div class="text-sm font-bold text-slate-600 mb-2"> 📅 核帳日期

        </div>

        <input
            type="date"
            id="dateInput"
            class="w-full rounded-xl border p-4 text-lg">

    </div>

    <!-- 盤點藥師 -->
    <div>

        <div class="text-sm font-bold text-orange-700 mb-2"> ✍️ 盤點藥師

        </div>

        <select
            id="pharmacistName"
            class="w-full rounded-xl border p-4">

            <option value="">請選擇</option>

        </select>

    </div>

    <!-- 覆核 -->
    <div>

        <div class="text-sm font-bold text-emerald-700 mb-2"> 🕵️ A2覆核藥師

        </div>

        <select
            id="approverName"
            class="w-full rounded-xl border p-4">

            <option value="">請選擇</option>

        </select>

    </div>

    <!-- 完成 -->
    <div class="flex items-end">

        <button
            id="btnLockDay"
            class="w-full bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl p-4 font-black"> 🔒 簽章並完成盤點

        </button>

    </div>

</div>

</div>

</section>

        <section id="dashboardArea"></section>
        <section id="dashboardArea">

<div class="grid md:grid-cols-4 gap-5">

    <div class="bg-white rounded-2xl shadow p-5">

        <div class="text-slate-500"> 📦 今日藥品

        </div>

        <div id="cardDrugCount"
            class="text-5xl font-black text-red-600 mt-4"> 0

        </div>

    </div>

    <div class="bg-white rounded-2xl shadow p-5">

        <div class="text-slate-500"> ✅ 已盤點

        </div>

        <div id="cardFinished"
            class="text-5xl font-black text-emerald-600 mt-4"> 0

        </div>

    </div>

    <div class="bg-white rounded-2xl shadow p-5">

        <div class="text-slate-500"> ⚠ 今日盤差

        </div>

        <div id="cardDiff"
            class="text-5xl font-black text-orange-500 mt-4"> 0

        </div>

    </div>

    <div class="bg-white rounded-2xl shadow p-5">

        <div class="text-slate-500"> 🔒 覆核狀態

        </div>

        <div id="cardLock"
            class="text-4xl font-black text-blue-600 mt-4"> 未完成

        </div>

    </div>

</div>

</section>

        <section id="toolCenter"></section>
        <section id="toolCenter">

<div class="bg-white rounded-3xl shadow-lg p-6">

    <div class="flex justify-between items-center mb-5">

        <div>

            <div class="text-2xl font-black text-slate-800"> 🧰 工具中心

            </div>

            <div class="text-sm text-slate-500"> 匯入、報表分析、假日異動

            </div>

        </div>

    </div>

    <div class="grid md:grid-cols-3 gap-5">

        <!-- Excel -->

        <button
            id="btnImportExcel"
            class="rounded-2xl bg-rose-600 hover:bg-rose-700 text-white p-6 shadow">

            <div class="text-5xl mb-3"> 📥

            </div>

            <div class="text-xl font-black"> 匯入電腦帳

            </div>

            <div class="text-sm opacity-80 mt-2"> Excel

            </div>

        </button>

        <!-- Report -->

        <button
            id="btnReportCenter"
            class="rounded-2xl bg-cyan-600 hover:bg-cyan-700 text-white p-6 shadow">

            <div class="text-5xl mb-3"> 📊

            </div>

            <div class="text-xl font-black"> 智慧報表中心

            </div>

            <div class="text-sm opacity-80 mt-2"> Dashboard

            </div>

        </button>

        <!-- Holiday -->

        <button
            id="btnHoliday"
            class="rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white p-6 shadow">

            <div class="text-5xl mb-3">

                📋

            </div>

            <div class="text-xl font-black"> 假日異動中心

            </div>

            <div class="text-sm opacity-80 mt-2"> Weekend

            </div>

        </button>

    </div>

</div>

</section>

        <section id="matrixArea"></section>

        <section id="summaryArea"></section>

    </main>

    <!-- Footer -->
    <footer>

        <div class="bg-slate-800 text-white mt-10">

            <div class="max-w-7xl mx-auto p-6 flex justify-between">

                <div>

                    彰化醫院藥劑科<br>

                    四級管制藥智慧管理系統

                </div>

                <div>

                    Version 2.0

                </div>

            </div>

        </div>

    </footer>

    <!-- Modal -->
    <div id="modalArea"></div>

</body>

</html>
