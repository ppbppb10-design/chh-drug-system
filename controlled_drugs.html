<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管制藥日盤核帳與誤差分析中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 min-h-screen pb-12">

    <!-- 頂部導覽列 -->
    <nav class="bg-gradient-to-r from-red-700 to-rose-800 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-[1600px] mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="index.html" class="hover:opacity-80 transition"><i class="fa-solid fa-arrow-left text-xl"></i></a>
                <h1 class="text-xl font-bold tracking-wide flex items-center">
                    <i class="fa-solid fa-file-shield mr-2 text-2xl"></i>
                    四級管制藥每日矩陣核帳中心
                </h1>
            </div>
            <div class="text-xs bg-white/20 px-3 py-1.5 rounded-full backdrop-blur-sm font-bold">彰化醫院藥劑科</div>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto px-4 mt-6 space-y-6">
        
        <!-- 控制面板列 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border flex flex-col justify-center">
                <label class="text-xs font-bold text-slate-400 mb-1">🗓️ 選擇核帳日期</label>
                <input type="date" id="targetDate" onchange="loadDailyData()" class="w-full font-black text-slate-700 border rounded-xl p-2 bg-slate-50 shadow-inner outline-none focus:border-red-500">
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border flex flex-col justify-center">
                <label class="text-xs font-bold text-slate-400 mb-1">✍️ 登錄線上簽章藥師</label>
                <input type="text" id="pharmacistName" value="育伶" placeholder="請輸入姓名" class="w-full font-bold text-slate-700 border rounded-xl p-2 bg-slate-50 shadow-inner outline-none focus:border-red-500">
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border flex flex-col justify-center">
                <label class="text-xs font-bold text-slate-400 mb-1">📤 匯入醫院每日結存 (Excel)</label>
                <input type="file" id="computerExcel" accept=".xlsx, .xls" class="hidden" onchange="importComputerStock(this)">
                <button onclick="document.getElementById('computerExcel').click()" class="w-full bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-700 hover:to-rose-700 text-white font-black py-2.5 rounded-xl text-xs shadow-md active:scale-95 transition flex items-center justify-center gap-1.5 cursor-pointer">
                    <i class="fa-solid fa-file-upload"></i> 匯入當日電腦帳面存量
                </button>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border flex flex-col justify-center">
                <label class="text-xs font-bold text-slate-400 mb-1">💾 下載月度對帳統計</label>
                <button onclick="exportMonthlyReport()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-black py-2.5 rounded-xl text-xs shadow-md active:scale-95 transition flex items-center justify-center gap-1.5 cursor-pointer">
                    <i class="fa-solid fa-download"></i> 匯出歷史盤點誤差總表
                </button>
            </div>
        </div>

        <!-- 月度誤差趨勢圖表 -->
        <div class="bg-white p-4 rounded-3xl shadow-sm border">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-sm font-black text-slate-800 flex items-center gap-1"><i class="fa-solid fa-chart-line text-red-500"></i> 本月份每日誤差量趨勢分析</h3>
                <span id="matchStatusLabel" class="text-xs font-black">讀取中...</span>
            </div>
            <div class="w-full h-[200px] relative">
                <canvas id="monthlyErrorChart"></canvas>
            </div>
        </div>

        <!-- 100% 還原紙本二維矩陣表格區 -->
        <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
            <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                <div>
                    <h3 class="font-black text-slate-800 text-base">🏥 彰化醫院四級管制藥品盤點表</h3>
                    <p class="text-xs text-slate-400 font-medium mt-0.5">說明：依盤點順序：雙號 ➔ 罐裝 ➔ 庫存 ➔ 車 ➔ 住 ➔ 門 ➔ 單。每日切點時間為 15:30；假日切點為 14:00。</p>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse border-slate-200">
                    <thead>
                        <!-- 第一層表頭 -->
                        <tr class="bg-slate-100 text-slate-700 font-black text-xs text-center border-b border-slate-200 divide-x divide-slate-200">
                            <th class="py-3 px-2 w-12" rowspan="2">劑型</th>
                            <th class="py-3 px-4 text-left w-36" rowspan="2">商品名</th>
                            <th class="py-3 px-2 w-24" rowspan="2">規格</th>
                            <th class="py-3 px-2 w-20 text-red-600" rowspan="2">💻電腦存量</th>
                            <th class="py-3 px-2" colspan="7">📱 實體調劑台儲位盤點區域 (線上即時填寫)</th>
                            <th class="py-3 px-2 w-20 text-blue-600" rowspan="2">📊實際總計</th>
                            <th class="py-3 px-2 w-20 text-orange-600" rowspan="2">🚨盤點誤差</th>
                            <th class="py-3 px-2 w-20" rowspan="2">核對藥師</th>
                        </tr>
                        <!-- 第二層分區表頭（完美對齊紙本欄位） -->
                        <tr class="bg-slate-50 text-slate-600 font-bold text-[11px] text-center border-b border-slate-200 divide-x divide-slate-200">
                            <th class="py-2 px-1 w-20">雙號調劑台<br>(5-1~3)</th>
                            <th class="py-2 px-1 w-20">罐裝<br>調劑台</th>
                            <th class="py-2 px-1 w-20">庫存區</th>
                            <th class="py-2 px-1 w-20">藥車<br>Tosho</th>
                            <th class="py-2 px-1 w-20">住院<br>Tosho</th>
                            <th class="py-2 px-1 w-20">門診<br>Tosho</th>
                            <th class="py-2 px-1 w-20">單號調劑台<br>(5-1~3)</th>
                        </tr>
                    </thead>
                    <tbody id="matrixTableBody" class="text-slate-700 text-xs divide-y divide-slate-200">
                        <tr><td colspan="14" class="text-center py-12 text-slate-400 font-medium">⏳ 正在載入彰醫管制藥專用對帳界面...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
            authDomain: "drug--arrive.firebaseapp.com",
            databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
            projectId: "drug--arrive",
            storageBucket: "drug--arrive.appspot.com",
            messagingSenderId: "215426668369",
            appId: "1:215426668369:web:eaa94e83974fcec391a570"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const todayStr = new Date().toLocaleDateString('zh-TW', {timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit'}).replace(/\//g, '-');
        document.getElementById('targetDate').value = todayStr;

        // 📝 依據彰醫管制藥紙本自定義口服藥與針劑品項清單（完美對應 Tosho 盒號與灰色禁用塊）
        const oralList = [
            { id: "ANXI02", name: "Anxiedin", spec: "0.5 mg/tab", disabled: [] },
            { id: "APOZ00", name: "Apo-Zopiclone", spec: "7.5 mg/tab", disabled: [] },
            { id: "APRA02", name: "Aprazo", spec: "0.5 mg/tab", disabled: [] },
            { id: "BROM01", name: "Bromazin", spec: "3 mg/tab", disabled: [] },
            { id: "CLON02", name: "Clonopam 2", spec: "2 mg/tab", disabled: [] },
            { id: "DIAP00", name: "Diapin", spec: "2 mg/tab", disabled: [] },
            { id: "DORM01", name: "Dormicum", spec: "7.5 mg/tab", disabled: [] },
            { id: "ELIN00", name: "Elinin", spec: "20 mg/tab", disabled: [5] }, // Elinin 門診Tosho 灰色屏蔽
            { id: "FLUP01", name: "Flupine", spec: "0.25 mg/tab", disabled: [] },
            { id: "KINA00", name: "Kinax", spec: "1 mg/tab", disabled: [] },
            { id: "KINZ00", name: "Kinzolam", spec: "2 mg/tab", disabled: [] },
            { id: "LARP00", name: "Larpam", spec: "2 mg/tab", disabled: [] },
            { id: "LEND01", name: "Lendormin", spec: "0.25 mg/tab", disabled: [] },
            { id: "LORA00", name: "Lorazepam", spec: "1 mg/tab", disabled: [3, 4, 5] }, // 藥車、住院、門診Tosho 灰色
            { id: "MUAC00", name: "Muaction SR", spec: "100 mg/tab", disabled: [3, 4, 5] }, // 藥車、住院、門診 灰色
            { id: "OPIC00", name: "Opicet", spec: "37.5/325 mg", disabled: [] },
            { id: "RIVO00", name: "Rivotril", spec: "0.5 mg/tab", disabled: [] },
            { id: "SONA00", name: "Sonaplon", spec: "10mg/cap", disabled: [] },
            { id: "TRAM01", name: "Tramtor", spec: "50 mg/cap", disabled: [] },
            { id: "ZOLN00", name: "Zolnox", spec: "10 mg/tab", disabled: [] }
        ];

        const injectList = [
            { id: "ANXI04", name: "Anxicam", spec: "2 mg/ml/amp", disabled: [0, 1, 3, 4, 5, 6] }, // 針劑只開放：庫存區(index 2) 與 UD調劑區(index 4，此處轉為排版對齊)
            { id: "FRES00", name: "Fresofol", spec: "200mg/20ml", disabled: [0, 1, 3, 4, 5, 6] },
            { id: "MIDA00", name: "Midatin", spec: "15 mg/3ml", disabled: [0, 1, 3, 4, 5, 6] },
            { id: "TRAM03", name: "TRAMTOR", spec: "100 mg/2ml", disabled: [0, 1, 3, 4, 5, 6] }
        ];

        let currentDayRecords = {};    
        let fullMonthRecords = {};     
        let errorChart = null;         

        window.loadDailyData = function() {
            const dateStr = document.getElementById('targetDate').value;
            if (!dateStr) return;

            onValue(ref(db, `controlledMatrixRecords/${dateStr}`), (snapshot) => {
                currentDayRecords = snapshot.val() || {};
                renderMatrixTable();
            });

            const currentYearMonth = dateStr.substring(0, 7);
            onValue(ref(db, `controlledMatrixRecords`), (snapshot) => {
                fullMonthRecords = snapshot.val() || {};
                updateMonthlyChart(currentYearMonth);
            });
        };

        // 🎯 建立與紙本百分之百完全相同的渲染大腦
        function renderMatrixTable() {
            const tbody = document.getElementById('matrixTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';

            let totalErrors = 0;

            // --- A. 渲染口服藥區段 ---
            oralList.forEach((drug, idx) => {
                const dayData = currentDayRecords[drug.id] || {};
                const computerCount = Number(dayData.computerStock) || 0;
                
                let tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 divide-x divide-slate-200 text-center";
                
                // 劑型直欄跨行
                let typeHtml = idx === 0 ? `<td class="font-black bg-amber-50/60 text-amber-800 text-sm" rowspan="${oralList.length}">口<br>服</td>` : '';
                
                let html = `
                    ${typeHtml}
                    <td class="py-3 px-3 text-left font-black text-slate-800">${drug.name}</td>
                    <td class="py-2 px-1 text-slate-400 font-bold font-mono text-[11px]">${drug.spec}</td>
                    <td class="py-2 px-1 font-bold bg-slate-50 text-slate-500">${computerCount}</td>
                `;

                // 產生 7 個實體盤點儲位的輸入格子
                let rowActualSum = 0;
                for (let i = 0; i < 7; i++) {
                    const cellVal = dayData[`sub_${i}`] !== undefined ? Number(dayData[`sub_${i}`]) : 0;
                    rowActualSum += cellVal;

                    const isDisabled = drug.disabled.includes(i);
                    if (isDisabled) {
                        html += `<td class="bg-slate-200/80 p-1"></td>`; // 完美還原塗灰不盤點區塊
                    } else {
                        html += `
                            <td class="p-1">
                                <input type="number" value="${cellVal}" min="0"
                                       oninput="liveCalculateMatrix('${drug.id}', ${computerCount})"
                                       onchange="saveMatrixCell('${drug.id}', ${i}, this.value)"
                                       class="w-full text-center font-bold text-slate-700 border rounded p-1 text-xs outline-none bg-white shadow-sm focus:border-red-500 focus:ring-1 focus:ring-red-100">
                            </td>`;
                    }
                }

                const errorCount = rowActualSum - computerCount;
                totalErrors += Math.abs(errorCount);

                html += `
                    <td id="total-${drug.id}" class="font-black text-blue-600 text-sm bg-blue-50/20">${rowActualSum}</td>
                    <td class="py-2 px-1"><span id="err-${drug.id}" class="${getErrClass(errorCount)}">${errorCount > 0 ? '+' + errorCount : errorCount}</span></td>
                    <td id="user-${drug.id}" class="text-[10px] font-bold text-slate-400 truncate max-w-[70px]">${dayData.user || '—'}</td>
                `;
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });

            // --- B. 渲染針劑區段（特殊雙區塊排版：中文字換成 UD庫存區、UD調劑區） ---
            injectList.forEach((drug, idx) => {
                const dayData = currentDayRecords[drug.id] || {};
                const computerCount = Number(dayData.computerStock) || 0;

                let tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 divide-x divide-slate-200 text-center";

                let typeHtml = idx === 0 ? `<td class="font-black bg-rose-50/60 text-rose-800 text-sm" rowspan="${injectList.length}">針<br>劑</td>` : '';
                
                let html = `
                    ${typeHtml}
                    <td class="py-3 px-3 text-left font-black text-slate-800">${drug.name}</td>
                    <td class="py-2 px-1 text-slate-400 font-bold font-mono text-[11px]">${drug.spec}</td>
                    <td class="py-2 px-1 font-bold bg-slate-50 text-slate-500">${computerCount}</td>
                `;

                let rowActualSum = 0;
                for (let i = 0; i < 7; i++) {
                    const cellVal = dayData[`sub_${i}`] !== undefined ? Number(dayData[`sub_${i}`]) : 0;
                    
                    // 針劑在紙本上只有三個格子：中文字跨欄「UD庫存區」、「UD調劑區」，其餘塗灰
                    // 我們對應：index 2 為 UD庫存區，index 4 為 UD調劑區
                    if (i === 2) { // UD 庫存區
                        rowActualSum += cellVal;
                        html += `
                            <td class="p-1" colspan="2">
                                <input type="number" value="${cellVal}" min="0" placeholder="UD庫存"
                                       oninput="liveCalculateMatrix('${drug.id}', ${computerCount})"
                                       onchange="saveMatrixCell('${drug.id}', 2, this.value)"
                                       class="w-full text-center font-black text-emerald-600 bg-emerald-50/40 border border-emerald-200 rounded p-1 text-xs outline-none focus:bg-white focus:border-emerald-500">
                            </td>`;
                        i++; // 跳過下一個，因為使用了 colspan="2"
                    } else if (i === 4) { // UD 調劑區
                        rowActualSum += cellVal;
                        html += `
                            <td class="p-1" colspan="2">
                                <input type="number" value="${cellVal}" min="0" placeholder="UD調劑"
                                       oninput="liveCalculateMatrix('${drug.id}', ${computerCount})"
                                       onchange="saveMatrixCell('${drug.id}', 4, this.value)"
                                       class="w-full text-center font-black text-indigo-600 bg-indigo-50/40 border border-indigo-200 rounded p-1 text-xs outline-none focus:bg-white focus:border-indigo-500">
                            </td>`;
                        i++; // 跳過下一個，使用 colspan="2"
                    } else {
                        html += `<td class="bg-slate-200/80 p-1"></td>`; // 灰色屏蔽
                    }
                }

                const errorCount = rowActualSum - computerCount;
                totalErrors += Math.abs(errorCount);

                html += `
                    <td id="total-${drug.id}" class="font-black text-blue-600 text-sm bg-blue-50/20">${rowActualSum}</td>
                    <td class="py-2 px-1"><span id="err-${drug.id}" class="${getErrClass(errorCount)}">${errorCount > 0 ? '+' + errorCount : errorCount}</span></td>
                    <td id="user-${drug.id}" class="text-[10px] font-bold text-slate-400 truncate max-w-[70px]">${dayData.user || '—'}</td>
                `;
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });

            updateTopStatus(totalErrors);
        }

        // 樣式判定大腦
        function getErrClass(err) {
            if (err > 0) return "text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded font-black";
            if (err < 0) return "text-red-600 bg-red-50 px-1.5 py-0.5 rounded font-black";
            return "text-green-600 font-black";
        }

        // ✍️ 現場打字當下「即時橫向與縱向加總」
        window.liveCalculateMatrix = function(drugId, computerCount) {
            let rowSum = 0;
            // 找出同一橫列所有輸入框的值
            const inputs = document.getElementById('matrixTableBody').querySelectorAll(`input[onchange*="'${drugId}'"]`);
            inputs.forEach(input => {
                rowSum += (parseInt(input.value) || 0);
            });

            const totalDom = document.getElementById(`total-${drugId}`);
            if (totalDom) totalDom.innerText = rowSum;

            const errorCount = rowSum - computerCount;
            const errSpan = document.getElementById(`err-${drugId}`);
            if (errSpan) {
                errSpan.innerText = errorCount > 0 ? '+' + errorCount : errorCount;
                errSpan.className = getErrClass(errorCount);
            }
        };

        // 💾 當藥師切換填寫格子時，立即進行單格 Firebase 雲端寫入
        window.saveMatrixCell = function(drugId, subIdx, val) {
            const dateStr = document.getElementById('targetDate').value;
            const userName = document.getElementById('pharmacistName').value || '線上藥師';
            const cellInt = Math.max(0, parseInt(val) || 0);

            const updateMap = {};
            updateMap[`controlledMatrixRecords/${dateStr}/${drugId}/sub_${subIdx}`] = cellInt;
            updateMap[`controlledMatrixRecords/${dateStr}/${drugId}/user`] = userName;

            update(ref(db), updateMap).then(() => {
                document.getElementById(`user-${drugId}`).innerText = userName;
                recalculateWholePage();
            });
        };

        // 全頁動態統計大總結
        function recalculateWholePage() {
            let totalErrors = 0;
            [...oralList, ...injectList].forEach(drug => {
                const errSpan = document.getElementById(`err-${drug.id}`);
                if (errSpan) {
                    const textVal = parseInt(errSpan.innerText) || 0;
                    totalErrors += Math.abs(textVal);
                }
            });
            updateTopStatus(totalErrors);
        }

        function updateTopStatus(totalErrors) {
            const label = document.getElementById('matchStatusLabel');
            if (totalErrors === 0) {
                label.className = "text-xs font-black text-green-600 bg-green-50 px-3 py-1.5 rounded-full shadow-sm";
                label.innerHTML = `<i class="fa-solid fa-circle-check"></i> 帳物完全相符 (零誤差)`;
            } else {
                label.className = "text-xs font-black text-red-600 bg-red-50 px-3 py-1.5 rounded-full shadow-sm animate-pulse";
                label.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> 警告！全院現存誤差 ${totalErrors} 粒/支`;
            }
        }

        // 📤 解析並匯入電腦存量 Excel
        window.importComputerStock = function(element) {
            const file = element.files[0];
            if (!file) return;

            const dateStr = document.getElementById('targetDate').value;
            const userName = document.getElementById('pharmacistName').value || '線上藥師';
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

                let codeIdx = -1, stockIdx = -1;
                for(let i=0; i<Math.min(10, jsonData.length); i++) {
                    const row = jsonData[i] || [];
                    codeIdx = row.findIndex(c => String(c).includes("藥碼") || String(c).includes("藥品碼") || String(c).includes("代碼"));
                    stockIdx = row.findIndex(c => String(c).includes("存量") || String(c).includes("結存") || String(c).includes("帳面"));
                    if(codeIdx !== -1 && stockIdx !== -1) break;
                }
                if(codeIdx === -1) codeIdx = 0; 
                if(stockIdx === -1) stockIdx = 3; 

                let upload封包 = {};
                // 保留原本已輸入好的多儲位明細
                [...oralList, ...injectList].forEach(d => {
                    upload封包[d.id] = currentDayRecords[d.id] || { computerStock: 0 };
                });

                jsonData.forEach(row => {
                    if(!row || !row[codeIdx]) return;
                    const code = String(row[codeIdx]).trim();
                    const stock = parseInt(row[stockIdx]) || 0;
                    
                    if (upload封包[code]) {
                        upload封包[code].computerStock = stock;
                    }
                });

                set(ref(db, `controlledMatrixRecords/${dateStr}`), upload封包).then(() => {
                    alert(`🎉 ${dateStr} 帳面存量結存批次匯入成功！`);
                    loadDailyData();
                });
            };
            reader.readAsArrayBuffer(file);
        };

        // 📈 繪製本月份 1~31 天誤差量折線趨勢圖 (以月為單位)
        function updateMonthlyChart(yearMonth) {
            const ctx = document.getElementById('monthlyErrorChart');
            if (!ctx) return;

            let labels = [];
            for (let d = 1; d <= 31; d++) labels.push(`${d}日`);

            let datasets = [];
            const colors = ['#dc2626', '#d97706', '#059669', '#2563eb', '#7c3aed', '#db2777', '#4b5563'];
            
            // 挑選具體代表性的藥物進行趨勢繪製
            const sampleDrugs = [...oralList.slice(0, 3), ...injectList.slice(0, 2)];

            sampleDrugs.forEach((drug, idx) => {
                let dayArr = new Array(31).fill(0);
                
                Object.keys(fullMonthRecords).forEach(dateKey => {
                    if (dateKey.startsWith(yearMonth)) {
                        const dNum = parseInt(dateKey.split('-')[2]);
                        const dayData = fullMonthRecords[dateKey][drug.id] || {};
                        const comp = Number(dayData.computerStock) || 0;
                        
                        let actSum = 0;
                        for(let i=0; i<7; i++) actSum += Number(dayData[`sub_${i}`] || 0);
                        
                        if (dNum >= 1 && dNum <= 31) {
                            dayArr[dNum - 1] = actSum - comp; // 誤差趨勢
                        }
                    }
                });

                datasets.push({
                    label: drug.name,
                    data: dayArr,
                    borderColor: colors[idx % colors.length],
                    borderWidth: 1.5,
                    pointRadius: 2,
                    fill: false
                });
            });

            if (errorChart) errorChart.destroy();

            errorChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { grid: { color: '#f1f5f9' }, title: { display: true, text: '誤差量', font: { size: 10 } } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { position: 'right', labels: { font: { size: 9 } } } }
                }
            });
        }

        // 💾 導出本月完整加總與誤差分析 Excel
        window.exportMonthlyReport = function() {
            const dateStr = document.getElementById('targetDate').value;
            const currentYearMonth = dateStr.substring(0, 7);

            const exportRows = [
                [`彰化醫院藥劑科 - 四級管制藥盤點多儲位結存與誤差月報表 (${currentYearMonth})`],
                ["匯出時間：" + new Date().toLocaleString('zh-TW')],
                [],
                ["藥品代碼", "藥品名稱", "包裝規格", "電腦結存量", "實際加總總計", "對帳誤差量", "線上盤點簽章"]
            ];

            [...oralList, ...injectList].forEach(drug => {
                const dayData = currentDayRecords[drug.id] || {};
                const comp = Number(dayData.computerStock) || 0;
                let actSum = 0;
                for(let i=0; i<7; i++) actSum += Number(dayData[`sub_${i}`] || 0);

                exportRows.push([
                    drug.id, drug.name, drug.spec, comp, actSum, (actSum - comp), dayData.user || '—'
                ]);
            });

            const ws = XLSX.utils.aoa_to_sheet(exportRows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "管制藥月度核帳分析");
            XLSX.writeFile(wb, `彰醫四級管制藥核帳月報表_${currentYearMonth}.xlsx`);
        };

        loadDailyData();
    </script>
</body>
