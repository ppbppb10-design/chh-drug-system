<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管制藥日盤核帳與誤差分析中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-12">

    <nav class="bg-gradient-to-r from-red-700 to-rose-800 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-[1600px] mx-auto px-4 py-3.5 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <a href="index.html" class="hover:opacity-80 transition py-1 px-2"><i class="fa-solid fa-arrow-left text-lg"></i></a>
                <h1 class="text-base md:text-xl font-black tracking-wide flex items-center">
                    <i class="fa-solid fa-boxes-stacked mr-2 text-xl animate-pulse"></i>
                    彰醫管制藥儲位動態盤點系統
                </h1>
            </div>
            <div class="text-[11px] bg-white/20 px-2.5 py-1 rounded-full backdrop-blur-sm font-bold">彰醫藥劑科</div>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto px-3 mt-4 space-y-4">
        
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
            <div class="bg-white p-2.5 rounded-xl shadow-sm border flex flex-col justify-center">
                <label class="text-[10px] font-bold text-slate-400 mb-0.5">🗓️ 選擇核帳日期</label>
                <input type="date" id="targetDate" class="w-full font-black text-slate-700 border rounded-lg p-1 text-xs bg-slate-50 outline-none focus:border-red-500">
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border border-amber-300 bg-amber-50/30 flex flex-col justify-center">
                <label class="text-[10px] font-bold text-red-500 mb-0.5"><i class="fa-solid fa-user-check"></i> ✍️ 請選取盤點藥師 (必選)</label>
                <select id="pharmacistName" class="w-full font-black text-slate-700 border border-amber-300 rounded-lg p-1 text-xs bg-white outline-none cursor-pointer">
                    <option value="" disabled selected>⚠️ 請選擇藥師名字...</option>
                    <option value="陳東錦">陳東錦</option><option value="賴錦益">賴錦益</option><option value="邱富強">邱富強</option>
                    <option value="劉孟育">劉孟育</option><option value="蘇惠敏">蘇惠敏</option><option value="林雅萍">林雅萍</option>
                    <option value="張幸逢">張幸逢</option><option value="洪紹寧">洪紹寧</option><option value="黃聖剛">黃聖剛</option>
                    <option value="陳麗君">陳麗君</option><option value="楊德宏">楊德宏</option><option value="陳玫君">陳玫君</option>
                    <option value="馬惠玲">馬惠玲</option><option value="吳婉瑄">吳婉瑄</option><option value="嚴宗賓">嚴宗賓</option>
                    <option value="張雨淳">張雨淳</option><option value="劉育伶">劉育伶</option><option value="邱瑞航">邱瑞航</option>
                    <option value="吳致寛">吳致寛</option><option value="葉儒樺">葉儒樺</option><option value="劉子嫣">劉子嫣</option>
                    <option value="許佳燕">許佳燕</option><option value="許藝齡">許藝齡</option><option value="劉佳昕">劉佳昕</option>
                    <option value="黃竹珈">黃竹珈</option><option value="胡明哲">胡明哲</option><option value="李婉華">李婉華</option>
                    <option value="邱麒文">邱麒文</option><option value="陳宜君">陳宜君</option>
                </select>
            </div>
            <div class="bg-white p-2.5 rounded-xl shadow-sm border border-emerald-300 bg-emerald-50/10 flex flex-col justify-center">
                <label class="text-[10px] font-bold text-emerald-600 mb-0.5"><i class="fa-solid fa-user-shield"></i> 🕵️ 當日總覆核藥師</label>
                <div class="flex gap-1 items-center">
                    <select id="approverName" class="flex-1 font-black text-slate-700 border border-emerald-300 rounded-lg p-1 text-xs bg-white outline-none cursor-pointer">
                        <option value="" disabled selected>未覆核...</option>
                        <option value="陳東錦">陳東錦</option><option value="賴錦益">賴錦益</option><option value="邱富強">邱富強</option>
                        <option value="劉孟育">劉孟育</option><option value="蘇惠敏">蘇惠敏</option><option value="林雅萍">林雅萍</option>
                        <option value="張幸逢">張幸逢</option><option value="洪紹寧">洪紹寧</option><option value="黃聖剛">黃聖剛</option>
                        <option value="陳麗君">陳麗君</option><option value="楊德宏">楊德宏</option><option value="陳玫君">陳玫君</option>
                        <option value="馬惠玲">馬惠玲</option><option value="吳婉瑄">吳婉瑄</option><option value="嚴宗賓">嚴宗賓</option>
                        <option value="張雨淳">張雨淳</option><option value="劉育伶">劉育伶</option><option value="邱瑞航">邱瑞航</option>
                        <option value="吳致寛">吳致寛</option><option value="葉儒樺">葉儒樺</option><option value="劉子嫣">劉子嫣</option>
                        <option value="許佳燕">許佳燕</option><option value="許藝齡">許藝齡</option><option value="劉佳昕">劉佳昕</option>
                        <option value="黃竹珈">黃竹珈</option><option value="胡明哲">胡明哲</option><option value="李婉華">李婉華</option>
                        <option value="邱麒文">邱麒文</option><option value="陳宜君">陳宜君</option>
                    </select>
                    <button id="btnLockDay" class="bg-emerald-600 hover:bg-emerald-700 text-white font-black px-2 py-1 rounded-lg text-[10px] shadow transition whitespace-nowrap cursor-pointer">
                        <i class="fa-solid fa-lock"></i> 結束今日
                    </button>
                </div>
            </div>
            <div class="bg-white p-2.5 rounded-xl shadow-sm border flex flex-col justify-center">
                <input type="file" id="computerExcel" class="hidden">
                <button onclick="document.getElementById('computerExcel').click()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-black rounded-lg text-xs shadow transition py-1.5 cursor-pointer">
                    <i class="fa-solid fa-file-upload"></i> 匯入電腦帳
                </button>
            </div>
            <div class="bg-white p-2.5 rounded-xl shadow-sm border flex flex-col justify-center">
                <button id="btnExport" class="w-full bg-gradient-to-r from-slate-800 to-slate-900 text-white font-black rounded-lg text-xs shadow transition py-1.5 cursor-pointer">
                    <i class="fa-solid fa-cloud-download-alt"></i> 匯出智慧多維報表
                </button>
            </div>
        </div>

        <div id="matchStatusBox" class="p-3 rounded-xl font-black text-xs shadow-sm bg-slate-50 border">
            <div id="matchStatusLabel">載入數據中...</div>
            <div id="errorDetailsLabel" class="mt-1.5 text-[11px] font-medium flex flex-wrap gap-1.5"></div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div class="p-3 bg-gradient-to-r from-slate-700 to-slate-800 text-white flex justify-between items-center">
                <h3 class="font-black text-xs md:text-sm flex items-center">
                    <i class="fa-solid fa-chart-pie mr-2 text-amber-400"></i> 全院管制藥品即時總量匯總看板 (💡 點擊藥名可直接呈現 QR Code)
                </h3>
                <span class="text-[10px] bg-white/20 px-2 py-0.5 rounded font-bold">即時同步中</span>
            </div>
            <div class="max-h-60 overflow-y-auto overflow-x-auto">
                <table class="w-full text-left border-collapse text-[11px]">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 font-black border-b sticky top-0 shadow-sm text-center">
                            <th class="py-2 px-2 text-left">藥品商品名 (代碼)</th>
                            <th class="py-2 px-1 w-24 text-blue-600">📊 實體盤點總量</th>
                            <th class="py-2 px-1 w-24 text-red-600">💻 電腦帳結存</th>
                            <th class="py-2 px-1 w-24">🚨 今日落差</th>
                            <th class="py-2 px-1 w-24 text-slate-400">📈 7日滾動有效均線</th>
                        </tr>
                    </thead>
                    <tbody id="summaryTableBody" class="divide-y divide-slate-100 font-bold text-slate-700 text-center"></tbody>
                </table>
            </div>
        </div>

        <div id="debugBox" class="hidden bg-amber-50 border border-amber-300 rounded-xl p-3 text-xs text-amber-900 font-mono">
            <p class="font-bold mb-1">📢 系統匯入即時診斷分析：</p>
            <div id="debugContent" class="bg-white/80 p-2 rounded border overflow-x-auto max-h-32 whitespace-pre-wrap"></div>
        </div>

        <div class="block lg:hidden space-y-3">
            <div class="bg-slate-200/80 p-2.5 rounded-xl">
                <span class="text-xs font-black text-slate-700 block mb-2"><i class="fa-solid fa-map-location-dot text-red-600"></i> 請選擇目前所在的盤點儲位：</span>
                <div class="grid grid-cols-4 gap-1.5" id="mobileTabHeader">
                    <button type="button" data-tab="6" class="mobile-tab-btn py-2 text-xs font-black rounded
