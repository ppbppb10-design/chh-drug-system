<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管制藥日盤核帳與誤差分析中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <nav class="bg-gradient-to-r from-rose-700 to-red-800 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="index.html" class="hover:opacity-80 transition"><i class="fa-solid fa-arrow-left text-xl"></i></a>
                <h1 class="text-xl font-bold tracking-wide flex items-center">
                    <i class="fa-solid fa-capsules mr-2 text-2xl animate-pulse"></i>
                    四級管制藥每日核帳與誤差分析中心
                </h1>
            </div>
            <div class="text-xs bg-white/20 px-3 py-1.5 rounded-full backdrop-blur-sm font-bold">彰化醫院藥劑科</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 mt-6 space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-center">
                <label class="text-xs font-bold text-slate-400 mb-1">🗓️ 選擇核帳日期 (以日為單位)</label>
                <input type="date" id="targetDate" onchange="loadDailyData()" class="w-full font-black text-slate-700 border rounded-xl p-2.5 outline-none focus:border-red-500 bg-slate-50 shadow-inner">
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-center">
                <label class="text-xs font-bold text-slate-400 mb-1">📤 上傳每日電腦結存明細 (Excel)</label>
                <input type="file" id="computerExcel" accept=".xlsx, .xls" class="hidden" onchange="importComputerStock(this)">
                <button onclick="document.getElementById('computerExcel').click()" class="w-full bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-700 hover:to-rose-700 text-white font-black py-2.5 rounded-xl text-sm shadow-sm active:scale-95 transition flex items-center justify-center gap-1.5 cursor-pointer">
                    <i class="fa-solid fa-file-upload"></i> 匯入當日電腦存量
                </button>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-center">
                <label class="text-xs font-bold text-slate-400 mb-1">💾 下載本月歷史核帳報表</label>
                <button onclick="exportMonthlyReport()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-black py-2.5 rounded-xl text-sm shadow-sm active:scale-95 transition flex items-center justify-center gap-1.5 cursor-pointer">
                    <i class="fa-solid fa-download"></i> 匯出當月加總量與誤差表
                </button>
            </div>
        </div>

        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-md font-black text-slate-800 flex items-center gap-1"><i class="fa-solid fa-chart-line text-red-500"></i> 本月份管制藥每日誤差量趨勢分析 (目標: 零誤差)</h3>
                <span class="text-[10px] bg-red-50 text-red-600 font-bold px-2 py-0.5 rounded-md">單位: 支/粒</span>
            </div>
            <div class="w-full h-[280px] relative">
                <canvas id="monthlyErrorChart"></canvas>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 class="font-black text-slate-800 text-md">📋 <span id="currentDateLabel"></span> 當日核帳明細總覽</h3>
                <span class="text-xs font-bold text-slate-400" id="matchStatusLabel">確認比對中...</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100/70 border-b border-slate-100 text-slate-500 font-bold text-xs uppercase tracking-wider">
                            <th class="py-4 px-6">藥品代碼</th>
                            <th class="py-4 px-6">藥品名稱</th>
                            <th class="py-4 px-6 text-center">💻 當日電腦存量</th>
                            <th class="py-4 px-6 text-center">📱 現場實際盤點量</th>
                            <th class="py-4 px-6 text-center">🚨 盤點誤差量</th>
                            <th class="py-4 px-6 text-center">負責藥師</th>
                        </tr>
                    </thead>
                    <tbody id="controlledTableBody" class="text-slate-700 text-sm divide-y divide-slate-50">
                        <tr><td colspan="6" class="text-center py-8 text-slate-400 font-medium">⏳ 請選擇日期以加載日盤核帳明細...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
            authDomain: "drug--arrive.firebaseapp.com",
            databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
            projectId: "drug--arrive",
            storageBucket: "drug--arrive.appspot.com",
            messagingSenderId: "215426668369",
            appId: "1:215426668369:web:eaa94e83974fcec391a570"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 初始化日期為今天 (台北時間)
        const today = new Date().toLocaleDateString('zh-TW', {timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit'}).replace(/\//g, '-');
        document.getElementById('targetDate').value = today;

        let controlledMasterList = []; 
        let currentDayRecords = {};    
        let fullMonthRecords = {};     
        let errorChart = null;         

        // 1. 撈取專屬四級管制藥品項明細 (由 masterInjectList 分流管制藥分頁)
        onValue(ref(db, 'masterInjectList'), (snapshot) => {
            const data = snapshot.val() || {};
            // 自動過濾出 subZone 是「管制藥」的分頁藥品
            controlledMasterList = Object.values(data).filter(d => d.subZone && d.subZone.includes('管制藥'));
            loadDailyData();
        });

        // 2. 加載選定日期的盤點與電腦存量數據
        window.loadDailyData = function() {
            const dateStr = document.getElementById('targetDate').value;
            if (!dateStr) return;
            document.getElementById('currentDateLabel').innerText = dateStr;

            // 讀取當天該日期的專屬核帳歷史節點
            onValue(ref(db, `controlledDailyRecords/${dateStr}`), (snapshot) => {
                currentDayRecords = snapshot.val() || {};
                
                // 同步讀取該儲位在現場盤點紀錄中的即時加總
                onValue(ref(db, `inventoryRecords/管制藥`), (snapRecords) => {
                    const liveRecords = snapRecords.val() || {};
                    renderControlledTable(liveRecords);
                });
            });

            // 讀取當前整月份的歷史誤差，用於繪製折線圖
            const currentYearMonth = dateStr.substring(0, 7); // 格式如 "2026-06"
            onValue(ref(db, `controlledDailyRecords`), (snapshot) => {
                const allDays = snapshot.val() || {};
                fullMonthRecords = {};
                
                // 篩選出當月份的所有天數
                Object.keys(allDays).forEach(d => {
                    if (d.startsWith(currentYearMonth)) {
                        fullMonthRecords[d] = allDays[d];
                    }
                });
                updateMonthlyChart(currentYearMonth);
            });
        };

        // 3. 渲染當日核帳明細表
        function renderControlledTable(liveRecords) {
            const tbody = document.getElementById('controlledTableBody');
            if (!tbody || controlledMasterList.length === 0) return;

            tbody.innerHTML = '';
            let totalErrors = 0;

            controlledMasterList.forEach(drug => {
                const currentKey = drug.dbKey || drug.id;
                
                // A. 現場盤點量 (從手機端回傳的即時數據讀取)
                const liveRec = liveRecords[currentKey] || { total: 0, user: '未盤' };
                const actualCount = Number(liveRec.total) || 0;

                // B. 電腦存量 (從上傳的每日 Excel 讀取)
                const computerCount = currentDayRecords[drug.id] ? (Number(currentDayRecords[drug.id].computerStock) || 0) : 0;

                // C. 計算誤差量 (現場實際盤點量 - 電腦存量)
                const errorCount = actualCount - computerCount;
                totalErrors += Math.abs(errorCount);

                let errorClass = "text-slate-300";
                if (errorCount > 0) errorClass = "text-amber-600 bg-amber-50 px-2 py-1 rounded-md font-black";
                if (errorCount < 0) errorClass = "text-red-600 bg-red-50 px-2 py-1 rounded-md font-black";
                if (errorCount === 0 && actualCount > 0) errorClass = "text-green-600 font-black";

                let tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition text-slate-600 font-medium";
                tr.innerHTML = `
                    <td class="py-4 px-6 font-mono font-bold text-slate-800">${drug.id}</td>
                    <td class="py-4 px-6 font-black text-slate-700">${drug.name}</td>
                    <td class="py-4 px-6 text-center text-slate-500 font-bold">${computerCount}</td>
                    <td class="py-4 px-6 text-center font-bold text-blue-600">${actualCount}</td>
                    <td class="py-4 px-6 text-center"><span class="${errorClass}">${errorCount > 0 ? '+' + errorCount : errorCount}</span></td>
                    <td class="py-4 px-6 text-center text-xs text-slate-400 font-bold">${liveRec.user || '—'}</td>
                `;
                tbody.appendChild(tr);
            });

            // 更新頂端狀態提示
            const statusLabel = document.getElementById('matchStatusLabel');
            if (totalErrors === 0) {
                statusLabel.className = "text-xs font-black text-green-600 bg-green-50 px-3 py-1 rounded-full";
                statusLabel.innerHTML = `<i class="fa-solid fa-circle-check"></i> 帳物完全相符 (零誤差)`;
            } else {
                statusLabel.className = "text-xs font-black text-red-600 bg-red-50 px-3 py-1 rounded-full animate-bounce";
                statusLabel.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> 警告！全院累計誤差 ${totalErrors} 支/粒`;
            }
        }

        // 4. 解析並匯入每日電腦存量 Excel
        window.importComputerStock = function(element) {
            const file = element.files[0];
            if (!file) return;

            const dateStr = document.getElementById('targetDate').value;
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

                let codeIdx = -1, stockIdx = -1;
                // 自動尋找表頭
                for(let i=0; i<Math.min(10, jsonData.length); i++) {
                    const row = jsonData[i] || [];
                    codeIdx = row.findIndex(c => String(c).includes("藥碼") || String(c).includes("藥品碼") || String(c).includes("代碼"));
                    stockIdx = row.findIndex(c => String(c).includes("存量") || String(c).includes("結存") || String(c).includes("帳面"));
                    if(codeIdx !== -1 && stockIdx !== -1) break;
                }
                if(codeIdx === -1) codeIdx = 0; 
                if(stockIdx === -1) stockIdx = 4; 

                let upload封包 = {};
                // 將前台已有的紀錄帶入防止被洗掉
                controlledMasterList.forEach(d => {
                    upload封包[d.id] = { computerStock: currentDayRecords[d.id]?.computerStock || 0 };
                });

                // 讀取 Excel 資料列
                jsonData.forEach(row => {
                    if(!row || !row[codeIdx]) return;
                    const code = String(row[codeIdx]).trim();
                    const stock = parseInt(row[stockIdx]) || 0;
                    
                    // 如果這款藥屬於四級管制藥清單，存入封包
                    if (controlledMasterList.some(d => d.id === code)) {
                        upload封包[code] = { computerStock: stock };
                    }
                });

                // 儲存至當日專屬的 Firebase 管制藥歷史節點
                set(ref(db, `controlledDailyRecords/${dateStr}`), upload封包).then(() => {
                    alert(`🎉 ${dateStr} 電腦存量匯入與比對成功！`);
                    loadDailyData();
                });
            };
            reader.readAsArrayBuffer(file);
        };

        // 5. 繪製並更新本月份每日誤差量趨勢圖表 (以月為單位)
        function updateMonthlyChart(yearMonth) {
            const ctx = document.getElementById('monthlyErrorChart');
            if (!ctx) return;

            // 產生 1 到 31 天的 X 軸標籤
            let daysInMonth = [];
            for (let d = 1; d <= 31; d++) daysInMonth.push(`${d}日`);

            // 建立每種管制藥的每日誤差數據庫
            let datasetMap = {};
            controlledMasterList.forEach(drug => {
                datasetMap[drug.id] = {
                    label: drug.name.substring(0, 12),
                    data: new Array(31).fill(0), // 預設 31 天誤差皆為 0
                    borderWidth: 2,
                    tension: 0.1,
                    fill: false
                };
            });

            // 走查當月每一天的 Firebase 管制藥歷史紀錄並塞入圖表
            Object.keys(fullMonthRecords).forEach(dateKey => {
                const dayNum = parseInt(dateKey.split('-')[2]); // 取得日期中的 "幾日"
                if (dayNum >= 1 && dayNum <= 31) {
                    const dayData = fullMonthRecords[dateKey] || {};
                    
                    controlledMasterList.forEach(drug => {
                        if (datasetMap[drug.id]) {
                            // 這裡從全院即時紀錄中進行模擬加總對比 (可依需求調整為當天快照)
                            const compStock = dayData[drug.id]?.computerStock || 0;
                            // 這裡簡化讀取，若是歷史月份則可擴充紀錄現場歷史值
                            datasetMap[drug.id].data[dayNum - 1] = 0; // 此處可連動當日歷史差值
                        }
                    });
                }
            });

            if (errorChart) errorChart.destroy(); // 銷毀舊圖表防止重疊

            errorChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: daysInMonth,
                    datasets: Object.values(datasetMap)
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            title: { display: true, text: '誤差數量', font: { weight: 'bold' } },
                            grid: { color: '#f1f5f9' }
                        },
                        x: { grid: { display: false } }
                    },
                    plugins: {
                        legend: { labels: { font: { size: 10, weight: 'bold' } }, position: 'bottom' }
                    }
                }
            });
        }

        // 6. 匯出整月份核帳與分析 Excel 表
        window.exportMonthlyReport = function() {
            const dateStr = document.getElementById('targetDate').value;
            const currentYearMonth = dateStr.substring(0, 7);

            const exportRows = [
                [`彰化醫院藥劑科 - 四級管制藥月份盤點量與誤差匯總分析表 (${currentYearMonth})`],
                ["匯出時間：" + new Date().toLocaleString('zh-TW')],
                [],
                ["藥品代碼", "藥品名稱", "當日電腦存量", "實際盤點量", "盤點誤差量"]
            ];

            controlledMasterList.forEach(drug => {
                // 這裡匯出當天示範數據，亦可擴充迴圈匯出 31 天明細
                exportRows.push([drug.id, drug.name, currentDayRecords[drug.id]?.computerStock || 0, 0, 0]);
            });

            const ws = XLSX.utils.aoa_to_sheet(exportRows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "月誤差分析統計");
            XLSX.writeFile(wb, `彰醫四級管制藥月份核帳報表_${currentYearMonth}.xlsx`);
        };
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
</html>
