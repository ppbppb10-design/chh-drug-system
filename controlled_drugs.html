<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管制藥系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-100 p-4">
    <nav class="bg-rose-800 text-white p-4 rounded-lg shadow mb-4">
        <h1 class="font-black text-lg">彰醫管制藥系統</h1>
    </nav>

    <main class="max-w-6xl mx-auto space-y-4">
        <div class="grid grid-cols-2 md:grid-cols-6 gap-2 bg-white p-4 rounded shadow border">
            <input type="date" id="targetDate" class="border p-2 rounded text-sm">
            <select id="pharmacistName" class="border p-2 rounded text-sm font-bold">
                <option value="">請選擇盤點藥師</option>
                <option value="劉育伶">劉育伶</option>
                </select>
            <select id="approverName" class="border p-2 rounded text-sm">
                <option value="">選擇覆核藥師</option>
                <option value="劉育伶">劉育伶</option>
            </select>
            <button id="btnLockDay" class="bg-emerald-600 text-white p-2 rounded text-sm font-bold">結束今日盤點</button>
            <button onclick="document.getElementById('computerExcel').click()" class="bg-rose-600 text-white p-2 rounded text-sm font-bold">匯入帳</button>
            <button id="btnExport" class="bg-slate-800 text-white p-2 rounded text-sm font-bold">匯出報表</button>
            <input type="file" id="computerExcel" class="hidden">
        </div>

        <div class="bg-white p-4 rounded shadow border overflow-x-auto">
            <table class="w-full text-xs border-collapse text-center">
                <thead><tr class="bg-slate-100 border-b"><th class="p-2 border">藥品</th><th class="p-2 border">盤點量</th></tr></thead>
                <tbody id="matrixTableBody"></tbody>
            </table>
        </div>
    </main>

    <div id="qrModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[100]">
        <div class="bg-white p-6 rounded-lg shadow-xl text-center">
            <h3 id="qrModalTitle" class="font-bold mb-4"></h3>
            <div id="qrcodeContainer" class="flex justify-center mb-4"></div>
            <button onclick="document.getElementById('qrModal').classList.add('hidden')" class="bg-slate-200 px-6 py-2 rounded text-sm font-bold">關閉</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        // 藥品清單 (已修正 Fresofol 為 PRPI02)
        const allDrugs = [
            { id: "ATIO01", name: "Anxiedin", spec: "0.5 mg" },
            { id: "PRPI02", name: "Fresofol", spec: "200mg" }
        ];

        // 綁定點擊藥名顯示 QR Code
        window.showQR = (id, name) => {
            document.getElementById('qrModal').classList.remove('hidden');
            document.getElementById('qrModalTitle').innerText = name;
            const container = document.getElementById('qrcodeContainer');
            container.innerHTML = "";
            new QRCode(container, { text: id, width: 150, height: 150 });
        };

        // 渲染表格 (包含藥師與儲位邏輯)
        function render() {
            const tbody = document.getElementById('matrixTableBody');
            tbody.innerHTML = "";
            allDrugs.forEach(drug => {
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-2 border font-bold cursor-pointer text-rose-700 hover:underline" onclick="showQR('${drug.id}', '${drug.name}')">${drug.name}</td>
                    <td class="p-2 border"><input type="number" class="border p-1 w-20 text-center"></td>
                `;
                tbody.appendChild(tr);
            });
        }

        render();
    </script>
</body>
</html>
