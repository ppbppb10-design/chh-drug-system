<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管制藥日盤核帳與誤差分析中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-12">

    <nav class="bg-gradient-to-r from-red-700 to-rose-800 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-[1600px] mx-auto px-4 py-3.5 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <a href="index.html" class="hover:opacity-80 transition py-1 px-2"><i class="fa-solid fa-arrow-left text-lg"></i></a>
                <h1 class="text-base md:text-xl font-black tracking-wide flex items-center">
                    <i class="fa-solid fa-boxes-stacked mr-2 text-xl animate-pulse"></i>
                    彰醫管制藥儲位動態盤點系統
                </h1>
            </div>
            <div class="text-[11px] bg-white/20 px-2.5 py-1 rounded-full backdrop-blur-sm font-bold">彰醫藥劑科</div>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto px-3 mt-4 space-y-4">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-center">
                <label class="text-[10px] font-bold text-slate-400 mb-0.5">🗓️ 選擇核帳日期</label>
                <input type="date" id="targetDate" onchange="loadDailyData()" class="w-full font-black text-slate-700 border rounded-lg p-1.5 text-xs bg-slate-50 outline-none focus:border-red-500">
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-center">
                <label class="text-[10px] font-bold text-slate-400 mb-0.5">✍️ 線上簽章藥師</label>
                <input type="text" id="pharmacistName" value="育伶" placeholder="姓名" class="w-full font-bold text-slate-700 border rounded-lg p-1.5 text-xs bg-slate-50 outline-none focus:border-red-500">
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-center col-span-1">
                <input type="file" id="computerExcel" accept=".xlsx, .xls" class="hidden" onchange="importComputerStock(this)">
                <button onclick="document.getElementById('computerExcel').click()" class="w-full h-full bg-rose-600 hover:bg-rose-700 text-white font-black rounded-lg text-xs shadow transition flex items-center justify-center gap-1 py-2 cursor-pointer">
                    <i class="fa-solid fa-file-upload"></i> 匯入電腦帳
                </button>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-center col-span-1">
                <button onclick="exportMonthlyReport()" class="w-full h-full bg-slate-800 hover:bg-slate-900 text-white font-black rounded-lg text-xs shadow transition flex items-center justify-center gap-1 py-2 cursor-pointer">
                    <i class="fa-solid fa-download"></i> 匯出報表
                </button>
            </div>
        </div>

        <div id="matchStatusBox" class="p-3 rounded-xl font-black text-xs flex justify-between items-center shadow-sm">
            <span id="matchStatusLabel">載入數據中...</span>

        <div id="debugBox" class="hidden bg-amber-50 border border-amber-300 rounded-xl p-3 text-xs text-amber-900 font-mono">

            <div id="debugContent" class="bg-white/80 p-2 rounded border overflow-x-auto max-h-32 whitespace-pre-wrap"></div>
        </div>

        <div class="block lg:hidden space-y-3">

                <span class="text-xs font-black text-slate-700 block mb-2"><i class="fa-solid fa-map-location-dot text-red-600"></i> 請選擇目前所在的盤點儲位：</span>
                <div class="grid grid-cols-3 gap-1.5" id="mobileTabHeader">
                    <button type="button" onclick="switchMobileTab(0)" id="btnTab-0" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">雙號台</button>
                    <button type="button" onclick="switchMobileTab(1)" id="btnTab-1" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">罐裝台</button>
                    <button type="button" onclick="switchMobileTab(2)" id="btnTab-2" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">庫存區</button>
                    <button type="button" onclick="switchMobileTab(3)" id="btnTab-3" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">藥車</button>
                    <button type="button" onclick="switchMobileTab(4)" id="btnTab-4" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">住院盒</button>
                    <button type="button" onclick="switchMobileTab(5)" id="btnTab-5" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">門診盒</button>
                    <button type="button" onclick="switchMobileTab(6)" id="btnTab-6" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700 col-span-3">單號台</button>
                </div>
            </div>
            <div id="mobileZoneCardsContainer" class="space-y-3"></div>
        </div>

        <div class="hidden lg:block bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div class="p-4 bg-slate-50 border-b">
                <h3 class="font-black text-slate-800 text-sm">💻 桌上型電腦完整二維核帳矩陣總覽</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-700 font-black text-xs text-center border-b border-slate-200 divide-x divide-slate-200">
                            <th class="py-3 px-1 w-10" rowspan="2">劑型</th>
                            <th class="py-3 px-3 text-left w-32" rowspan="2">商品名</th>
                            <th class="py-3 px-1 w-20" rowspan="2">規格</th>
                            <th class="py-3 px-1 w-16 text-red-600" rowspan="2">💻電腦帳<br>(總量)</th>
                            <th class="py-3 px-2" colspan="7">📱 實體調劑台儲位盤點區域</th>
                            <th class="py-3 px-1 w-16 text-blue-600" rowspan="2">📊實際總計</th>
                            <th class="py-3 px-1 w-16 text-orange-600" rowspan="2">🚨誤差</th>
                            <th class="py-3 px-1 w-16" rowspan="2">藥師</th>
                        </tr>
                        <tr class="bg-slate-50 text-slate-600 font-bold text-[10px] text-center border-b border-slate-200 divide-x divide-slate-200">
                            <th class="py-1.5 px-0.5 w-16">雙號台</th>
                            <th class="py-1.5 px-0.5 w-16">罐裝台</th>
                            <th class="py-1.5 px-0.5 w-16">庫存區</th>
                            <th class="py-1.5 px-0.5 w-16">藥車Tosho</th>
                            <th class="py-1.5 px-0.5 w-16">住院Tosho</th>
                            <th class="py-1.5 px-0.5 w-16">門診Tosho</th>
                            <th class="py-1.5 px-0.5 w-16">單號台</th>
                        </tr>
                    </thead>
                    <tbody id="matrixTableBody" class="text-slate-700 text-xs divide-y divide-slate-200"></tbody>
                </table>
            </div>
        </div>
    </main>
