<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管制藥日盤核帳與誤差分析中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-12">

    <nav class="bg-gradient-to-r from-red-700 to-rose-800 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-[1600px] mx-auto px-4 py-3.5 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <a href="index.html" class="hover:opacity-80 transition py-1 px-2"><i class="fa-solid fa-arrow-left text-lg"></i></a>
                <h1 class="text-base md:text-xl font-black tracking-wide flex items-center">
                    <i class="fa-solid fa-boxes-stacked mr-2 text-xl animate-pulse"></i>
                    彰醫管制藥儲位動態盤點系統
                </h1>
            </div>
            <div class="text-[11px] bg-white/20 px-2.5 py-1 rounded-full backdrop-blur-sm font-bold">彰醫藥劑科</div>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto px-3 mt-4 space-y-4">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-center">
                <label class="text-[10px] font-bold text-slate-400 mb-0.5">🗓️ 選擇核帳日期</label>
                <input type="date" id="targetDate" onchange="loadDailyData()" class="w-full font-black text-slate-700 border rounded-lg p-1.5 text-xs bg-slate-50 outline-none focus:border-red-500">
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-center">
                <label class="text-[10px] font-bold text-slate-400 mb-0.5">✍️ 線上簽章藥師</label>
                <input type="text" id="pharmacistName" value="育伶" placeholder="姓名" class="w-full font-bold text-slate-700 border rounded-lg p-1.5 text-xs bg-slate-50 outline-none focus:border-red-500">
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-center col-span-1">
                <input type="file" id="computerExcel" accept=".xlsx, .xls" class="hidden" onchange="importComputerStock(this)">
                <button onclick="document.getElementById('computerExcel').click()" class="w-full h-full bg-rose-600 hover:bg-rose-700 text-white font-black rounded-lg text-xs shadow transition flex items-center justify-center gap-1 py-2 cursor-pointer">
                    <i class="fa-solid fa-file-upload"></i> 匯入電腦帳
                </button>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-center col-span-1">
                <button onclick="exportMonthlyReport()" class="w-full h-full bg-slate-800 hover:bg-slate-900 text-white font-black rounded-lg text-xs shadow transition flex items-center justify-center gap-1 py-2 cursor-pointer">
                    <i class="fa-solid fa-download"></i> 匯出報表
                </button>
            </div>
        </div>

        <div id="matchStatusBox" class="p-3 rounded-xl font-black text-xs flex justify-between items-center shadow-sm">
            <span id="matchStatusLabel">載入數據中...</span>
        </div>

        <div class="block lg:hidden space-y-3">
            <div class="bg-slate-200/80 p-2.5 rounded-xl">
                <span class="text-xs font-black text-slate-700 block mb-2"><i class="fa-solid fa-map-location-dot text-red-600"></i> 請選擇目前所在的盤點儲位：</span>
                <div class="grid grid-cols-3 gap-1.5" id="mobileTabHeader">
                    <button type="button" onclick="switchMobileTab(0)" id="btnTab-0" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">雙號台</button>
                    <button type="button" onclick="switchMobileTab(1)" id="btnTab-1" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">罐裝台</button>
                    <button type="button" onclick="switchMobileTab(2)" id="btnTab-2" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">庫存區</button>
                    <button type="button" onclick="switchMobileTab(3)" id="btnTab-3" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">藥車</button>
                    <button type="button" onclick="switchMobileTab(4)" id="btnTab-4" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">住院盒</button>
                    <button type="button" onclick="switchMobileTab(5)" id="btnTab-5" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">門診盒</button>
                    <button type="button" onclick="switchMobileTab(6)" id="btnTab-6" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700 col-span-3">單號台</button>
                </div>
            </div>
            <div id="mobileZoneCardsContainer" class="space-y-3"></div>
        </div>

        <div class="hidden lg:block bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div class="p-4 bg-slate-50 border-b">
                <h3 class="font-black text-slate-800 text-sm">💻 桌上型電腦完整二維核帳矩陣總覽</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-700 font-black text-xs text-center border-b border-slate-200 divide-x divide-slate-200">
                            <th class="py-3 px-1 w-10" rowspan="2">劑型</th>
                            <th class="py-3 px-3 text-left w-32" rowspan="2">商品名</th>
                            <th class="py-3 px-1 w-20" rowspan="2">規格</th>
                            <th class="py-3 px-1 w-16 text-red-600" rowspan="2">💻電腦帳<br>(總量)</th>
                            <th class="py-3 px-2" colspan="7">📱 實體調劑台儲位盤點區域</th>
                            <th class="py-3 px-1 w-16 text-blue-600" rowspan="2">📊實際總計</th>
                            <th class="py-3 px-1 w-16 text-orange-600" rowspan="2">🚨誤差</th>
                            <th class="py-3 px-1 w-16" rowspan="2">藥師</th>
                        </tr>
                        <tr class="bg-slate-50 text-slate-600 font-bold text-[10px] text-center border-b border-slate-200 divide-x divide-slate-200">
                            <th class="py-1.5 px-0.5 w-16">雙號台</th>
                            <th class="py-1.5 px-0.5 w-16">罐裝台</th>
                            <th class="py-1.5 px-0.5 w-16">庫存區</th>
                            <th class="py-1.5 px-0.5 w-16">藥車Tosho</th>
                            <th class="py-1.5 px-0.5 w-16">住院Tosho</th>
                            <th class="py-1.5 px-0.5 w-16">門診Tosho</th>
                            <th class="py-1.5 px-0.5 w-16">單號台</th>
                        </tr>
                    </thead>
                    <tbody id="matrixTableBody" class="text-slate-700 text-xs divide-y divide-slate-200"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
            authDomain: "drug--arrive.firebaseapp.com",
            databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
            projectId: "drug--arrive"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 📅 每日 0 點自動歸零邏輯：進入系統時自動取得當天最新日期
        const todayStr = new Date().toLocaleDateString('zh-TW', {timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit'}).replace(/\//g, '-');
        document.getElementById('targetDate').value = todayStr;

        const oralList = [
            { id: "ANXI02", name: "Anxiedin", spec: "0.5 mg/tab", disabled: [] },
            { id: "APOZ00", name: "Apo-Zopiclone", spec: "7.5 mg/tab", disabled: [] },
            { id: "APRA02", name: "Aprazo", spec: "0.5 mg/tab", disabled: [] },
            { id: "BROM01", name: "Bromazin", spec: "3 mg/tab", disabled: [] },
            { id: "CLON02", name: "Clonopam 2", spec: "2 mg/tab", disabled: [] },
            { id: "DIAP00", name: "Diapin", spec: "2 mg/tab", disabled: [] },
            { id: "DORM01", name: "Dormicum", spec: "7.5 mg/tab", disabled: [] },
            { id: "ELIN00", name: "Elinin", spec: "20 mg/tab", disabled: [5] }, 
            { id: "FLUP01", name: "Flupine", spec: "0.25 mg/tab", disabled: [] },
            { id: "KINA00", name: "Kinax", spec: "1 mg/tab", disabled: [] },
            { id: "KINZ00", name: "Kinzolam", spec: "2 mg/tab", disabled: [] },
            { id: "LARP00", name: "Larpam", spec: "2 mg/tab", disabled: [] },
            { id: "LEND01", name: "Lendormin", spec: "0.25 mg/tab", disabled: [] },
            { id: "LORA00", name: "Lorazepam", spec: "1 mg/tab", disabled: [3, 4, 5] }, 
            { id: "MUAC00", name: "Muaction SR", spec: "100 mg/tab", disabled: [3, 4, 5] }, 
            { id: "OPIC00", name: "Opicet", spec: "37.5/325 mg", disabled: [] },
            { id: "RIVO00", name: "Rivotril", spec: "0.5 mg/tab", disabled: [] },
            { id: "SONA00", name: "Sonaplon", spec: "10mg/cap", disabled: [] },
            { id: "TRAM01", name: "Tramtor", spec: "50 mg/cap", disabled: [] },
            { id: "ZOLN00", name: "Zolnox", spec: "10 mg/tab", disabled: [] }
        ];

        const injectList = [
            { id: "ANXI04", name: "Anxicam", spec: "2 mg/ml/amp", disabled: [0, 1, 3, 4, 5, 6] }, 
            { id: "FRES00", name: "Fresofol", spec: "200mg/20ml", disabled: [0, 1, 3, 4, 5, 6] },
            { id: "MIDA00", name: "Midatin", spec: "15 mg/3ml", disabled: [0, 1, 3, 4, 5, 6] },
            { id: "TRAM03", name: "TRAMTOR", spec: "100 mg/2ml", disabled: [0, 1, 3, 4, 5, 6] }
        ];

        const allDrugs = [...oralList, ...injectList];
        const subZoneNames = ["雙號調劑台(5-1~3)", "罐裝調劑台", "庫存區 (針劑庫存)", "藥車Tosho", "住院Tosho (針劑調劑)", "門診Tosho", "單號調劑台(5-1~3)"];
        
        let currentDayRecords = {};    
        let activeMobileTab = 0; 

        window.loadDailyData = function() {
            const dateStr = document.getElementById('targetDate').value;
            if (!dateStr) return;

            onValue(ref(db, `controlledMatrixRecords/${dateStr}`), (snapshot) => {
                currentDayRecords = snapshot.val() || {};
                renderMobileZoneList(); 
                renderMatrixTable();    
                recalculateWholePage();
            });
        };

        window.switchMobileTab = function(tabIdx) {
            activeMobileTab = tabIdx;
            for(let i=0; i<7; i++) {
                const btn = document.getElementById(`btnTab-${i}`);
                if(!btn) continue;
                if(i === tabIdx) {
                    btn.className = "py-2 text-xs font-black rounded-lg shadow-sm border transition bg-gradient-to-r from-red-600 to-rose-600 text-white border-transparent scale-105 duration-150";
                } else {
                    btn.className = "py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700 border-slate-200";
                }
            }
            renderMobileZoneList();
        };

        function renderMobileZoneList() {
            const container = document.getElementById('mobileZoneCardsContainer');
            if (!container) return;
            container.innerHTML = '';

            let titleBox = document.createElement('div');
            titleBox.className = "bg-slate-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm flex justify-between items-center";
            
            let zoneTitleText = subZoneNames[activeMobileTab];
            if(activeMobileTab === 2) zoneTitleText = "庫存區 (包含口服與針劑UD庫存)";
            if(activeMobileTab === 4) zoneTitleText = "住院Tosho (包含口服與針劑UD調劑)";
            
            titleBox.innerHTML = `<span>📍 目前儲位：${zoneTitleText}</span> <span class="bg-white/20 text-[10px] px-1.5 py-0.5 rounded">行動模式</span>`;
            container.appendChild(titleBox);

            let hasItems = false;

            allDrugs.forEach((drug) => {
                if (drug.disabled.includes(activeMobileTab)) return;

                hasItems = true;
                const dayData = currentDayRecords[drug.id] || {};
                const cellVal = dayData[`sub_${activeMobileTab}`] !== undefined ? dayData[`sub_${activeMobileTab}`] : 0;
                
                let isInject = injectList.some(j => j.id === drug.id);
                let textBorderColor = isInject ? "border-l-rose-500" : "border-l-amber-500";

                let itemCard = document.createElement('div');
                itemCard.className = `bg-white p-3 rounded-xl shadow-sm border border-slate-200 border-l-4 ${textBorderColor} flex justify-between items-center gap-3`;
                
                itemCard.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <h4 class="text-sm font-black text-slate-800 truncate">${drug.name}</h4>
                        <p class="text-[10px] text-slate-400 font-mono font-bold mt-0.5">${drug.id} · ${drug.spec}</p>
                    </div>
                    <div class="w-32 flex items-center space-x-1.5 justify-end">
                        <input type="number" value="${cellVal}" min="0" pattern="[0-9]*" inputmode="numeric"
                               oninput="liveUpdateFromMobileZone('${drug.id}', ${activeMobileTab}, this.value)"
                               onchange="saveMatrixCell('${drug.id}', ${activeMobileTab}, this.value)"
                               class="w-20 text-center font-black text-lg bg-blue-50/50 text-blue-700 border-2 border-blue-100 rounded-lg py-1 outline-none focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition shadow-inner">
                        <span class="text-xs font-bold text-slate-400">粒/支</span>
                    </div>
                `;
                container.appendChild(itemCard);
            });

            if(!hasItems) {
