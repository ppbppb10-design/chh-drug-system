<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管制藥日盤核帳與誤差分析中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-12">

    <!-- 頂部導覽列 -->
    <nav class="bg-gradient-to-r from-red-700 to-rose-800 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-[1600px] mx-auto px-4 py-3.5 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <a href="index.html" class="hover:opacity-80 transition py-1 px-2"><i class="fa-solid fa-arrow-left text-lg"></i></a>
                <h1 class="text-base md:text-xl font-black tracking-wide flex items-center">
                    <i class="fa-solid fa-boxes-stacked mr-2 text-xl animate-pulse"></i>
                    彰醫管制藥儲位動態盤點系統
                </h1>
            </div>
            <div class="text-[11px] bg-white/20 px-2.5 py-1 rounded-full backdrop-blur-sm font-bold">彰醫藥劑科</div>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto px-3 mt-4 space-y-4">
        
        <!-- 控制面板列 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-center">
                <label class="text-[10px] font-bold text-slate-400 mb-0.5">🗓️ 選擇核帳日期</label>
                <input type="date" id="targetDate" class="w-full font-black text-slate-700 border rounded-lg p-1.5 text-xs bg-slate-50 outline-none focus:border-red-500">
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-center">
                <label class="text-[10px] font-bold text-slate-400 mb-0.5">✍️ 線上簽章藥師</label>
                <input type="text" id="pharmacistName" value="育伶" placeholder="姓名" class="w-full font-bold text-slate-700 border rounded-lg p-1.5 text-xs bg-slate-50 outline-none focus:border-red-500">
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-center col-span-1">
                <!-- 徹底解除限制 -->
                <input type="file" id="computerExcel" class="hidden">
                <button onclick="document.getElementById('computerExcel').click()" class="w-full h-full bg-rose-600 hover:bg-rose-700 text-white font-black rounded-lg text-xs shadow transition flex items-center justify-center gap-1 py-2 cursor-pointer">
                    <i class="fa-solid fa-file-upload"></i> 匯入電腦帳
                </button>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-center col-span-1">
                <button id="btnExport" class="w-full h-full bg-slate-800 hover:bg-slate-900 text-white font-black rounded-lg text-xs shadow transition flex items-center justify-center gap-1 py-2 cursor-pointer">
                    <i class="fa-solid fa-download"></i> 匯出報表
                </button>
            </div>
        </div>

        <!-- 警報與即時誤差分析狀態列 -->
        <div id="matchStatusBox" class="p-3 rounded-xl font-black text-xs shadow-sm bg-slate-50 border">
            <div id="matchStatusLabel">載入數據中...</div>
            <div id="errorDetailsLabel" class="mt-1.5 text-[11px] font-medium flex flex-wrap gap-1.5"></div>
        </div>

        <!-- 🔧 精準調試分析面板 -->
        <div id="debugBox" class="hidden bg-amber-50 border border-amber-300 rounded-xl p-3 text-xs text-amber-900 font-mono">
            <p class="font-bold mb-1">📢 系統匯入即時診斷分析：</p>
            <div id="debugContent" class="bg-white/80 p-2 rounded border overflow-x-auto max-h-32 whitespace-pre-wrap"></div>
        </div>

        <!-- 📱 手機專用：依【儲位分類】切換盤點模式 -->
        <div class="block lg:hidden space-y-3">
            <div class="bg-slate-200/80 p-2.5 rounded-xl">
                <span class="text-xs font-black text-slate-700 block mb-2"><i class="fa-solid fa-map-location-dot text-red-600"></i> 請選擇目前所在的盤點儲位：</span>
                <div class="grid grid-cols-3 gap-1.5" id="mobileTabHeader">
                    <button type="button" data-tab="0" class="mobile-tab-btn py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">雙號台</button>
                    <button type="button" data-tab="1" class="mobile-tab-btn py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">罐裝台</button>
                    <button type="button" data-tab="2" class="mobile-tab-btn py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">庫存區</button>
                    <button type="button" data-tab="3" class="mobile-tab-btn py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">藥車</button>
                    <button type="button" data-tab="4" class="mobile-tab-btn py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">住院盒</button>
                    <button type="button" data-tab="5" class="mobile-tab-btn py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">門診盒</button>
                    <button type="button" data-tab="6" class="mobile-tab-btn py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700 col-span-3">單號台</button>
                </div>
            </div>
            <div id="mobileZoneCardsContainer" class="space-y-3"></div>
        </div>

        <!-- 💻 電腦專用：完整二維核帳大矩陣 -->
        <div class="hidden lg:block bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div class="p-4 bg-slate-50 border-b">
                <h3 class="font-black text-slate-800 text-sm">💻 桌上型電腦完整二維核帳矩陣總覽 (小字為前次盤點儲位藥量)</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-700 font-black text-xs text-center border-b border-slate-200 divide-x divide-slate-200">
                            <th class="py-3 px-1 w-10" rowspan="2">劑型</th>
                            <th class="py-3 px-3 text-left w-32" rowspan="2">商品名</th>
                            <th class="py-3 px-1 w-20" rowspan="2">規格</th>
                            <th class="py-3 px-1 w-16 text-red-600" rowspan="2">💻電腦帳<br>(總量)</th>
                            <th class="py-3 px-2" colspan="7">📱 實體調劑台儲位盤點區域</th>
                            <th class="py-3 px-1 w-16 text-blue-600" rowspan="2">📊實際總計</th>
                            <th class="py-3 px-2 w-24 text-orange-600" rowspan="2">🚨對帳誤差<br>(7日均)</th>
                            <th class="py-3 px-1 w-16" rowspan="2">藥師</th>
                        </tr>
                        <tr class="bg-slate-50 text-slate-600 font-bold text-[10px] text-center border-b border-slate-200 divide-x divide-slate-200">
                            <th class="py-1.5 px-0.5 w-16">雙號台</th>
                            <th class="py-1.5 px-0.5 w-16">罐裝台</th>
                            <th class="py-1.5 px-0.5 w-16">庫存區</th>
                            <th class="py-1.5 px-0.5 w-16">藥車Tosho</th>
                            <th class="py-1.5 px-0.5 w-16">住院Tosho</th>
                            <th class="py-1.5 px-0.5 w-16">門診Tosho</th>
                            <th class="py-1.5 px-0.5 w-16">單號台</th>
                        </tr>
                    </thead>
                    <tbody id="matrixTableBody" class="text-slate-700 text-xs divide-y divide-slate-200"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
            authDomain: "drug--arrive.firebaseapp.com",
            databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
            projectId: "drug--arrive",
            storageBucket: "drug--arrive.appspot.com",
            messagingSenderId: "215426668369",
            appId: "1:215426668369:web:eaa94e83974fcec391a570"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const oralList = [
            { id: "ATIO01", name: "Anxiedin", spec: "0.5 mg/tab", disabled: [1, 4, 5] }, 
            { id: "ZOPO01", name: "Apo-Zopiclone", spec: "7.5 mg/tab", disabled: [0, 2, 6] },
            { id: "ALPO02", name: "Aprazo", spec: "0.5 mg/tab", disabled: [4, 5] },
            { id: "BROO19", name: "Bromazin", spec: "3 mg/tab", disabled: [1, 4, 5] },
            { id: "RIVO03", name: "Clonopam", spec: "2 mg/tab", disabled: [4, 5] },
            { id: "DIAO29", name: "Diapin", spec: "2 mg/tab", disabled: [1, 4, 5] },
            { id: "DORO01", name: "Dormicum", spec: "7.5 mg/tab", disabled: [1, 4, 5] },
            { id: "OXAO13", name: "Elinin", spec: "20 mg/tab", disabled: [0, 2, 3, 4, 6] },
            { id: "FLUO66", name: "Flupine", spec: "0.25 mg/tab", disabled: [1, 4, 5] },
            { id: "SANO08", name: "Kinax", spec: "1 mg/tab", disabled: [1, 4, 5] },
            { id: "EURO02", name: "Kinzolam", spec: "2 mg/tab", disabled: [1, 4, 5] },
            { id: "ATIO07", name: "Larpam", spec: "2 mg/tab", disabled: [1, 4, 5] },
            { id: "LENO00", name: "Lendormin", spec: "0.25 mg/tab", disabled: [1, 4, 5] },
            { id: "ATIO12", name: "Lorazepam", spec: "1 mg/tab", disabled: [0, 2, 6] },
            { id: "TRAO16", name: "Muaction SR", spec: "100 mg/tab", disabled: [0, 2, 3, 4, 6] },
            { id: "TRAO33", name: "Opicet", spec: "37.5/325 mg", disabled: [1, 4, 5] },
            { id: "RIVO01", name: "Rivotril", spec: "0.5 mg/tab", disabled: [1, 4, 5] },
            { id: "ZALO04", name: "Sonaplon", spec: "10mg/cap", disabled: [1, 3, 4, 5] },
            { id: "TRAO27", name: "Tramtor", spec: "50 mg/cap", disabled: [1, 4, 5] },
            { id: "ZOLO07", name: "Zolnox", spec: "10 mg/tab", disabled: [1, 4, 5] }
        ];

        const injectList = [
            { id: "ATII01", name: "Anxicam", spec: "2 mg/ml/amp", disabled: [0, 1, 2, 3, 5, 6] }, 
            { id: "PRPIO2", name: "Fresofol", spec: "200mg/20ml", disabled: [0, 1, 3, 5, 6] }, // 🎯 完美對齊 PRPIO2
            { id: "DORI05", name: "Midatin", spec: "15 mg/3ml", disabled: [0, 1, 3, 5, 6] }, 
            { id: "TRAI11", name: "TRAMTOR", spec: "100 mg/2ml", disabled: [0, 1, 3, 5, 6] }  
        ];

        const allDrugs = [...oralList, ...injectList];
        const subZoneNames = ["雙號台", "罐裝台", "庫存區", "藥車", "住院盒", "門診盒", "單號台"];
        
        let currentDayRecords = {}; 
        let historyPastRecords = {}; 
        let avg7DaysErrors = {}; 
        let activeMobileTab = 0; 

        function getDrugSumAndComputer(drugId) {
            const dayData = (currentDayRecords && currentDayRecords[drugId]) ? currentDayRecords[drugId] : {};
            const computerStock = dayData.computerStock !== undefined ? Number(dayData.computerStock) : 0;
            let sum = 0;
            for(let i=0; i<7; i++) {
                sum += dayData[`sub_${i}`] !== undefined ? Number(dayData[`sub_${i}`]) : 0;
            }
            return { sum, computerStock };
        }

        const todayStr = new Date().toLocaleDateString('zh-TW', {timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit'}).replace(/\//g, '-');
        const dateInput = document.getElementById('targetDate');
        dateInput.value = todayStr;

        function loadDailyData() {
            const dateStr = dateInput.value;
            if (!dateStr) return;

            onValue(ref(db, `controlledMatrixRecords`), (snapshot) => {
                const allDatesData = snapshot.val() || {};
                const sortedDates = Object.keys(allDatesData).sort().reverse();
                
                const prevDate = sortedDates.find(d => d !== dateStr);
                historyPastRecords = prevDate ? (allDatesData[prevDate] || {}) : {};
                
                avg7DaysErrors = {};
                allDrugs.forEach(drug => {
                    let totalPastErr = 0;
                    let recordCount = 0;
                    for (let i = 0; i < sortedDates.length; i++) {
                        const dStr = sortedDates[i];
                        if (dStr === dateStr) continue; 
                        if (recordCount >= 7) break;    
                        const dayData = allDatesData[dStr]?.[drug.id];
                        if (dayData) {
                            const comp = dayData.computerStock !== undefined ? Number(dayData.computerStock) : 0;
                            let subSum = 0;
                            for (let z = 0; z < 7; z++) {
                                subSum += dayData[`sub_${z}`] !== undefined ? Number(dayData[`sub_${z}`]) : 0;
                            }
                            totalPastErr += Math.abs(subSum - comp); 
                            recordCount++;
                        }
                    }
                    avg7DaysErrors[drug.id] = recordCount > 0 ? (totalPastErr / recordCount) : 0;
                });

                currentDayRecords = allDatesData[dateStr] || {};
                refreshUI();
            }, (error) => {
                console.error("Firebase 連線失敗:", error);
                currentDayRecords = {};
                refreshUI(); 
            });
        }

        function refreshUI() {
            renderMobileTabButtons(); 
            renderMobileZoneList();   
            renderMatrixTable();      
            recalculateWholePage();   
        }

        function renderMobileTabButtons() {
            document.querySelectorAll('.mobile-tab-btn').forEach(btn => {
                const idx = parseInt(btn.getAttribute('data-tab'));
                if(idx === activeMobileTab) {
                    btn.className = "mobile-tab-btn py-2 text-xs font-black rounded-lg shadow-sm border transition bg-gradient-to-r from-red-600 to-rose-600 text-white border-transparent scale-105 duration-150";
                } else {
                    btn.className = "mobile-tab-btn py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700 border-slate-200";
                }
            });
        }

        function renderMobileZoneList() {
            const container = document.getElementById('mobileZoneCardsContainer');
            if (!container) return;
            container.innerHTML = '';

            let titleBox = document.createElement('div');
            titleBox.className = "bg-slate-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm flex justify-between items-center";
            titleBox.innerHTML = `<span>📍 目前儲位：${subZoneNames[activeMobileTab]}</span> <span class="bg-white/20 text-[10px] px-1.5 py-0.5 rounded">行動模式</span>`;
            container.appendChild(titleBox);

            let hasItems = false;
            const records = currentDayRecords || {};
            const pastRecords = historyPastRecords || {};

            allDrugs.forEach((drug) => {
                if (drug.disabled.includes(activeMobileTab)) return;
                hasItems = true;

                const dayData = records[drug.id] || {};
                const cellVal = dayData[`sub_${activeMobileTab}`] !== undefined ? Number(dayData[`sub_${activeMobileTab}`]) : 0;
                
                const pastData = pastRecords[drug.id] || {};
                const pastCellVal = pastData[`sub_${activeMobileTab}`] !== undefined ? `${pastData[`sub_${activeMobileTab}`]} 粒/支` : '—';

                let isInject = injectList.some(j => j.id === drug.id);
                let textBorderColor = isInject ? "border-l-rose-500" : "border-l-amber-500";

                let itemCard = document.createElement('div');
                itemCard.className = `bg-white p-3 rounded-xl shadow-sm border border-slate-200 border-l-4 ${textBorderColor} flex justify-between items-center gap-3`;
                
                itemCard.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <h4 class="text-sm font-black text-slate-800 truncate">${drug.name}</h4>
                        <p class="text-[10px] text-slate-400 font-mono font-bold mt-0.5">${drug.id} · ${drug.spec}</p>
                        <span class="inline-block mt-1 text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-bold">前次：${pastCellVal}</span>
                    </div>
                    <div class="w-32 flex items-center space-x-1.5 justify-end">
                        <input type="number" value="${cellVal}" min="0" pattern="[0-9]*" inputmode="numeric"
                               data-mobile-drug="${drug.id}" data-mobile-sub="${activeMobileTab}"
                               class="mobile-input w-20 text-center font-black text-lg bg-blue-50/50 text-blue-700 border-2 border-blue-100 rounded-lg py-1 outline-none focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition shadow-inner">
                        <span class="text-xs font-bold text-slate-400">粒/支</span>
                    </div>
                `;
                container.appendChild(itemCard);
            });

            if(!hasItems) {
                container.innerHTML += `<div class="text-center py-8 text-xs text-slate-400 font-bold bg-white rounded-xl border border-dashed">此儲位目前無須盤點四級管制藥品 ✨</div>`;
            }
        }

        function renderMatrixTable() {
            const tbody = document.getElementById('matrixTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';

            const records = currentDayRecords || {};
            const pastRecords = historyPastRecords || {};

            function generateRowRows(list, typeName, bgClass) {
                list.forEach((drug, idx) => {
                    const dayData = records[drug.id] || {};
                    const computerCount = dayData.computerStock !== undefined ? Number(dayData.computerStock) : 0;
                    
                    let tr = document.createElement('tr');
                    tr.className = "divide-x divide-slate-100 text-center hover:bg-slate-50/50 text-xs";
                    
                    let typeHtml = idx === 0 ? `<td class="font-black ${bgClass} text-xs" rowspan="${list.length}">${typeName}</td>` : '';
                    let html = `${typeHtml}<td class="p-2 text-left font-black">${drug.name}</td><td class="p-1 text-slate-400 font-mono text-[10px]">${drug.spec}</td><td class="p-1 bg-slate-50 font-bold text-slate-500">${computerCount}</td>`;
                    
                    let rowSum = 0;
                    for (let i = 0; i < 7; i++) {
                        const cellVal = dayData[`sub_${i}`] !== undefined ? Number(dayData[`sub_${i}`]) : 0; 
                        rowSum += cellVal;

                        const pastData = pastRecords[drug.id] || {};
                        const pastCellVal = pastData[`sub_${i}`] !== undefined ? pastData[`sub_${i}`] : '—';

                        if (drug.disabled.includes(i)) { 
                            html += `<td class="bg-slate-100 p-0.5"></td>`; 
                        } else { 
                            html += `<td class="p-1 bg-white">
                                <input type="number" value="${cellVal}" pattern="[0-9]*" inputmode="numeric" data-comp-drug="${drug.id}" data-comp-sub="${i}" class="matrix-input w-full text-center font-bold border rounded p-0.5 text-xs outline-none focus:border-red-500 bg-white">
                                <div class="text-[9px] text-slate-400 scale-90 mt-0.5 bg-slate-100 rounded py-0.2 font-medium">前次:${pastCellVal}</div>
                            </td>`; 
                        }
                    }
                    const err = rowSum - computerCount;
                    const avg7 = avg7DaysErrors[drug.id] || 0;
                    
                    html += `<td id="total-${drug.id}" class="font-black text-blue-600">${rowSum}</td>
                             <td class="p-1">
                                <span id="err-${drug.id}" class="${getErrClass(err, avg7)}">${err > 0 ? '+' + err : err}</span>
                                <div class="text-[9px] text-slate-400 font-medium scale-90 mt-0.5">均:${avg7.toFixed(1)}</div>
                             </td>
                             <td class="text-[10px] text-slate-400 font-bold">${dayData.user||'—'}</td>`;
                    tr.innerHTML = html; 
                    tbody.appendChild(tr);
                });
            }

            generateRowRows(oralList, "口服", "bg-amber-50 text-amber-800");
            generateRowRows(injectList, "針劑", "bg-rose-50 text-rose-800");
        }

        function liveCalculateMatrixRow(drugId) {
            let sum = 0;
            const inputs = document.querySelectorAll(`input[data-comp-drug="${drugId}"]`);
            inputs.forEach(input => sum += (parseInt(input.value) || 0));
            
            const totalDom = document.getElementById('total-' + drugId);
            if(totalDom) totalDom.innerText = sum;
            
            const dayData = (currentDayRecords && currentDayRecords[drugId]) ? currentDayRecords[drugId] : {};
            const computerCount = dayData.computerStock !== undefined ? Number(dayData.computerStock) : 0;
            const diff = sum - computerCount;
            
            const avg7 = avg7DaysErrors[drugId] || 0;
            const errSpan = document.getElementById('err-' + drugId);
            if(errSpan) {
                errSpan.innerText = diff > 0 ? '+' + diff : diff;
                errSpan.className = getErrClass(diff, avg7);
            }
        }

        function executeSaveCell(drugId, subIdx, val) {
            const dateStr = dateInput.value;
            const userName = document.getElementById('pharmacistName').value || '線上藥師';
            const cellInt = Math.max(0, parseInt(val) || 0);

            if(!currentDayRecords[drugId]) currentDayRecords[drugId] = {};
            currentDayRecords[drugId][`sub_${subIdx}`] = cellInt;
            currentDayRecords[drugId]['user'] = userName;

            const updateMap = {};
            updateMap[`controlledMatrixRecords/${dateStr}/${drugId}/sub_${subIdx}`] = cellInt;
            updateMap[`controlledMatrixRecords/${dateStr}/${drugId}/user`] = userName;

            update(ref(db), updateMap).then(() => {
                recalculateWholePage();
            }).catch(e => console.error("儲存失敗:", e));
        }

        function recalculateWholePage() {
            let totalErrors = 0;
            let errorItemsHtml = ""; 

            allDrugs.forEach(drug => {
                const info = getDrugSumAndComputer(drug.id);
                const diff = info.sum - info.computerStock;
                totalErrors += Math.abs(diff);

                if (diff !== 0) {
                    const avg7 = avg7DaysErrors[drug.id] || 0;
                    const colorClass = Math.abs(diff) > avg7 
                        ? "bg-red-600 text-white border-red-700 animate-pulse" 
                        : "bg-amber-100 text-amber-800 border-amber-300";
                        
                    const diffText = diff > 0 ? `+${diff}` : `${diff}`;
                    errorItemsHtml += `<span class="px-2 py-0.5 rounded-md font-black border text-[11px] ${colorClass}">${drug.name} (${diffText}) <span class="text-[9px] opacity-80">7日均:${avg7.toFixed(1)}</span></span>`;
                }
            });

            const box = document.getElementById('matchStatusBox');
            const label = document.getElementById('matchStatusLabel');
            const errorDetailsLabel = document.getElementById('errorDetailsLabel');
            
            if(!box || !label || !errorDetailsLabel) return;

            if (totalErrors === 0) {
                box.className = "p-3 rounded-xl font-black text-xs shadow-sm bg-green-50 text-green-700 border border-green-200";
                label.innerHTML = `<i class="fa-solid fa-circle-check text-base mr-1"></i> 彰醫今日管制藥帳物完全相符 (零誤差)`;
                errorDetailsLabel.innerHTML = `<span class="text-green-600 font-medium text-[11px]">✨ 全品項盤點完畢，全院帳物平衡。</span>`;
            } else {
                box.className = "p-3 rounded-xl font-black text-xs shadow-sm bg-red-50 text-red-700 border border-red-200";
                label.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-base mr-1"></i> 警告！今日累計絕對誤差 ${totalErrors} 粒/支。以下為今日誤差品項與滾動 7 日平均比對：`;
                errorDetailsLabel.innerHTML = errorItemsHtml;
            }
        }

        function getErrClass(err, avg7) {
            if (err === 0) return "text-green-600 font-black";
            const absErr = Math.abs(err);
            if (absErr > avg7) {
                return "text-white bg-red-600 px-1.5 py-0.5 rounded font-black shadow-sm ring-2 ring-red-300";
            } else {
                return "text-amber-700 bg-amber-100 px-1.5 py-0.5 rounded font-black";
            }
        }

        // ==================== 事件監聽綁定 ====================
        dateInput.addEventListener('change', loadDailyData);

        document.getElementById('mobileTabHeader').addEventListener('click', (e) => {
            const btn = e.target.closest('.mobile-tab-btn');
            if (!btn) return;
            activeMobileTab = parseInt(btn.getAttribute('data-tab'));
            refreshUI();
        });

        document.body.addEventListener('input', (e) => {
            if (e.target.classList.contains('matrix-input')) {
                const drugId = e.target.getAttribute('data-comp-drug');
                liveCalculateMatrixRow(drugId);
            }
            if (e.target.classList.contains('mobile-input')) {
                const drugId = e.target.getAttribute('data-mobile-drug');
                const subIdx = e.target.getAttribute('data-mobile-sub');
                const val = parseInt(e.target.value) || 0;
                
                const compInput = document.querySelector(`input[data-comp-drug="${drugId}"][data-comp-sub="${subIdx}"]`);
                if(compInput) compInput.value = val;
                liveCalculateMatrixRow(drugId);
            }
        });

        document.body.addEventListener('change', (e) => {
            if (e.target.classList.contains('matrix-input')) {
                const drugId = e.target.getAttribute('data-comp-drug');
                const subIdx = parseInt(e.target.getAttribute('data-comp-sub'));
                executeSaveCell(drugId, subIdx, e.target.value);
            }
            if (e.target.classList.contains('mobile-input')) {
                const drugId = e.target.getAttribute('data-mobile-drug');
                const subIdx = parseInt(e.target.getAttribute('data-mobile-sub'));
                executeSaveCell(drugId, subIdx, e.target.value);
            }
        });

        // 🧠 強力相容：舊版二進位與二維工作表混合流讀取法
        document.getElementById('computerExcel').addEventListener('change', function(e) {
            const file = e.target.files[0]; 
            if (!file) return;
            const dateStr = dateInput.value;
            const reader = new FileReader();
            
            reader.onload = function(evt) {
                try {
                    const data = new Uint8Array(evt.target.result);
                    // 🚀 降維相容：強制開啟最底層 read 盲讀模式，打破所有系統跨欄與二進位混亂限制
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonRows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                    
                    let codeIdx = -1; let stockIdx = -1; let foundHeaderRowIdx = -1; let logMsg = "";

                    for (let i = 0; i < Math.min(30, jsonRows.length); i++) {
                        const row = jsonRows[i] || [];
                        let tempCodeIdx = -1; let tempStockIdx = -1;
                        for (let j = 0; j < row.length; j++) {
                            if (row[j] === undefined || row[j] === null) continue;
                            const cellTxt = String(row[j]).replace(/[\s\r\n\t]/g, '').trim();
                            if (cellTxt === "物品代碼" || cellTxt === "藥品代碼" || cellTxt === "藥碼") tempCodeIdx = j;
                            if (cellTxt === "總量") tempStockIdx = j;
                        }
                        if (tempCodeIdx !== -1 && tempStockIdx !== -1) {
                            codeIdx = tempCodeIdx; stockIdx = tempStockIdx; foundHeaderRowIdx = i;
                            logMsg += `成功比對表頭！物品代碼(第 ${codeIdx+1} 欄)，【總量欄】(第 ${stockIdx+1} 欄)\n`;
                            break;
                        }
                    }

                    if (codeIdx === -1 || stockIdx === -1) {
                        logMsg += `提示：啟動彰醫二維固定座標與特徵掃描保險...\n`;
                        for (let i = 0; i < Math.min(100, jsonRows.length); i++) {
                            const row = jsonRows[i] || [];
                            for (let j = 0; j < row.length; j++) {
                                if (row[j] === undefined || row[j] === null) continue;
                                const val = String(row[j]).replace(/[\s\r\n\t]/g, '').trim().toUpperCase();
                                if (allDrugs.some(d => val === d.id)) {
                                    codeIdx = j; foundHeaderRowIdx = Math.max(0, i - 1); break;
                                }
                            }
                            if (codeIdx !== -1) break;
                        }
                        stockIdx = 8; if (codeIdx === -1) codeIdx = 1; 
                        logMsg += `防禦盲測綁定：代碼欄(第 ${codeIdx+1} 欄)，總量欄(第 ${stockIdx+1} 欄)\n`;
                    }

                    let upload封包 = {};
                    allDrugs.forEach(d => { 
                        const existing = (currentDayRecords && currentDayRecords[d.id]) ? currentDayRecords[d.id] : {};
                        upload封包[d.id] = { ...existing, computerStock: 0 };
                    });

                    let matchCount = 0; let previewSamples = [];
                    jsonRows.forEach((row, rowIdx) => {
                        if (rowIdx <= foundHeaderRowIdx || !row || row[codeIdx] === undefined || row[codeIdx] === null) return;
                        try {
                            const excelCode = String(row[codeIdx]).replace(/[\s\r\n\t]/g, '').trim().toUpperCase();
                            if (!excelCode || excelCode.includes("---") || excelCode.includes("填表人")) return;

                            allDrugs.forEach(d => {
                                const systemCode = d.id.trim().toUpperCase();
                                if (excelCode === systemCode || excelCode.includes(systemCode) || systemCode.includes(excelCode)) {
                                    const rawStock = String(row[stockIdx] || '0').replace(/,/g, '').trim();
                                    upload封包[d.id].computerStock = parseFloat(rawStock) || 0;
                                    matchCount++;
                                    if (previewSamples.length < 4) {
                                        previewSamples.push(`${d.name} [${systemCode}] -> 電腦總量: ${upload封包[d.id].computerStock}`);
                                    }
                                }
                            });
                        } catch (rowErr) {}
                    });

                    const debugBox = document.getElementById('debugBox');
                    const debugContent = document.getElementById('debugContent');
                    if(debugBox && debugContent) {
                        debugBox.classList.remove('hidden');
                        debugContent.innerText = `${logMsg}\n字串去噪勾稽範例：\n${previewSamples.join('\n')}\n共計成功勾稽：${matchCount} 項。`;
                    }

                    set(ref(db, `controlledMatrixRecords/${dateStr}`), upload封包).then(() => {
                        alert(`🎉 已成功克服鎖定！精準勾稽 ${matchCount} 項管制藥電腦結存！`);
                        loadDailyData();
                    });
                } catch (parseErr) { console.error(parseErr); }
            };
            reader.readAsArrayBuffer(file);
        });

        loadDailyData();
    </script>
</body>
</html>
