<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管制藥系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 p-4">
    <!-- 導覽列 -->
    <div class="bg-rose-800 text-white p-4 rounded-lg shadow mb-4">
        <h1 class="font-black text-lg">彰醫管制藥系統</h1>
    </div>

    <!-- 主控制區 -->
    <div class="grid grid-cols-2 md:grid-cols-6 gap-2 bg-white p-4 rounded shadow border mb-4">
        <input type="date" id="targetDate" class="border p-2 rounded text-sm">
        
        <select id="pharmacistName" class="border p-2 rounded text-sm font-bold">
            <option value="">請選擇盤點藥師</option>
            <option value="陳東錦">陳東錦</option><option value="賴錦益">賴錦益</option><option value="邱富強">邱富強</option>
            <option value="劉孟育">劉孟育</option><option value="蘇惠敏">蘇惠敏</option><option value="林雅萍">林雅萍</option>
            <option value="張幸逢">張幸逢</option><option value="洪紹寧">洪紹寧</option><option value="黃聖剛">黃聖剛</option>
            <option value="陳麗君">陳麗君</option><option value="楊德宏">楊德宏</option><option value="陳玫君">陳玫君</option>
            <option value="馬惠玲">馬惠玲</option><option value="吳婉瑄">吳婉瑄</option><option value="嚴宗賓">嚴宗賓</option>
            <option value="張雨淳">張雨淳</option><option value="劉育伶">劉育伶</option><option value="邱瑞航">邱瑞航</option>
            <option value="吳致寛">吳致寛</option><option value="葉儒樺">葉儒樺</option><option value="劉子嫣">劉子嫣</option>
            <option value="許佳燕">許佳燕</option><option value="許藝齡">許藝齡</option><option value="劉佳昕">劉佳昕</option>
            <option value="黃竹珈">黃竹珈</option><option value="胡明哲">胡明哲</option><option value="李婉華">李婉華</option>
            <option value="邱麒文">邱麒文</option><option value="陳宜君">陳宜君</option>
        </select>

        <select id="approverName" class="border p-2 rounded text-sm">
            <option value="">選擇覆核藥師</option>
            <option value="劉育伶">劉育伶</option>
        </select>

        <button id="btnLockDay" class="bg-emerald-600 text-white p-2 rounded text-sm font-bold">結束今日盤點</button>
        <button onclick="document.getElementById('computerExcel').click()" class="bg-rose-600 text-white p-2 rounded text-sm font-bold">匯入電腦帳</button>
        <button id="btnExport" class="bg-slate-800 text-white p-2 rounded text-sm font-bold">匯出報表</button>
        <input type="file" id="computerExcel" class="hidden">
    </div>

    <!-- 盤點表格 -->
    <div class="bg-white p-4 rounded shadow border overflow-x-auto">
        <h2 class="font-black text-sm mb-3">盤點清單</h2>
        <table class="w-full text-xs border-collapse text-center">
            <thead>
                <tr class="bg-slate-100 border-b">
                    <th class="p-2 border">藥品</th><th class="p-2 border">規格</th>
                    <th class="p-2 border">總盤量</th><th class="p-2 border">誤差</th><th class="p-2 border">盤點藥師</th>
                </tr>
            </thead>
            <tbody id="matrixTableBody"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        // Firebase 配置 (請保持您原先的配置)
        const app = initializeApp({ /* ... */ });
        const db = getDatabase(app);

        // 已修正 Fresofol 代碼為 PRPI02
        const allDrugs = [
            { id: "ATIO01", name: "Anxiedin", spec: "0.5 mg" },
            { id: "PRPI02", name: "Fresofol", spec: "200mg" }
            // 請依照原始資料補全藥品清單
        ];

        let currentDayRecords = {};

        function render() {
            const tbody = document.getElementById('matrixTableBody');
            tbody.innerHTML = "";
            allDrugs.forEach(drug => {
                const d = currentDayRecords[drug.id] || {};
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-2 border font-bold">${drug.name}</td>
                    <td class="p-2 border">${drug.spec}</td>
                    <td class="p-2 border"><input type="number" value="${d.total || 0}" class="border w-20 text-center"></td>
                    <td class="p-2 border">${d.err || 0}</td>
                    <td class="p-2 border">${d.user || '—'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function loadDailyData() {
            const dateStr = document.getElementById('targetDate').value || new Date().toISOString().split('T')[0];
            onValue(ref(db, `controlledMatrixRecords/${dateStr}`), (snapshot) => {
                currentDayRecords = snapshot.val() || {};
                render();
            });
        }

        document.getElementById('targetDate').addEventListener('change', loadDailyData);
        document.getElementById('btnLockDay').addEventListener('click', () => {
            const dateStr = document.getElementById('targetDate').value;
            const approver = document.getElementById('approverName').value;
            if(!approver) return alert("請選取覆核藥師");
            update(ref(db, `controlledMatrixRecords/${dateStr}/_meta_lock`), { isLocked: true, approver: approver });
        });

        loadDailyData();
    </script>
</body>
</html>
