<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管制藥系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-100 pb-12">
    <nav class="bg-rose-800 text-white p-4 sticky top-0 z-50 shadow-md">
        <h1 class="font-black text-lg">彰醫管制藥系統</h1>
    </nav>
    <main class="max-w-6xl mx-auto p-4 space-y-4">
        <div class="grid grid-cols-2 md:grid-cols-5 gap-2 bg-white p-3 rounded shadow border">
            <input type="date" id="targetDate" class="border p-1 text-xs rounded">
            <select id="pharmacistName" class="border p-1 text-xs rounded font-bold">
                <option value="">請選擇藥師</option>
                <option value="劉育伶">劉育伶</option>
                <option value="陳東錦">陳東錦</option>
                </select>
            <select id="approverName" class="border p-1 text-xs rounded">
                <option value="">選擇覆核藥師</option>
                <option value="劉育伶">劉育伶</option>
            </select>
            <button id="btnLockDay" class="bg-emerald-600 text-white p-1 rounded text-xs font-bold">結束今日盤點</button>
            <button id="btnExport" class="bg-slate-800 text-white p-1 rounded text-xs font-bold">匯出報表</button>
        </div>

        <div id="matchStatusBox" class="p-3 bg-white border rounded text-xs font-bold">載入中...</div>

        <div class="bg-white p-4 rounded shadow overflow-x-auto">
            <table class="w-full text-xs border text-center">
                <thead><tr class="bg-slate-100"><th class="p-2">藥品</th><th class="p-2">規格</th><th class="p-2">實際總計</th><th class="p-2">誤差</th><th class="p-2">盤點人</th></tr></thead>
                <tbody id="matrixTableBody"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = { /* 同原設定 */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 核心代碼修正
        const allDrugs = [
            { id: "ATIO01", name: "Anxiedin", spec: "0.5 mg" },
            { id: "PRPI02", name: "Fresofol", spec: "200mg" }
        ];

        let currentDayRecords = {};
        let isLocked = false;

        function loadDailyData() {
            const dateStr = document.getElementById('targetDate').value || new Date().toISOString().split('T')[0];
            onValue(ref(db, `controlledMatrixRecords/${dateStr}`), (snapshot) => {
                currentDayRecords = snapshot.val() || {};
                isLocked = currentDayRecords?._meta_lock?.isLocked || false;
                render();
            });
        }

        function render() {
            const tbody = document.getElementById('matrixTableBody');
            tbody.innerHTML = "";
            allDrugs.forEach(drug => {
                const dData = currentDayRecords[drug.id] || {};
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-2 font-bold">${drug.name} (${drug.id})</td>
                    <td class="p-2">${drug.spec}</td>
                    <td class="p-2"><input type="number" ${isLocked ? 'disabled' : ''} value="${dData.total || 0}" class="border w-16 text-center"></td>
                    <td class="p-2">${dData.err || 0}</td>
                    <td class="p-2 text-[10px]">${dData.user || '—'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('btnLockDay').addEventListener('click', () => {
            const approver = document.getElementById('approverName').value;
            if(!approver) return alert("請先選取覆核藥師");
            const dateStr = document.getElementById('targetDate').value;
            update(ref(db, `controlledMatrixRecords/${dateStr}/_meta_lock`), { isLocked: true, approver: approver })
            .then(() => alert("今日盤點已鎖定！"));
        });

        document.getElementById('targetDate').addEventListener('change', loadDailyData);
        loadDailyData();
    </script>
</body>
</html>
