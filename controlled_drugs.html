<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管制藥日盤核帳與誤差分析中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-12">

    <nav class="bg-gradient-to-r from-red-700 to-rose-800 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-[1600px] mx-auto px-4 py-3.5 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <a href="index.html" class="hover:opacity-80 transition py-1 px-2"><i class="fa-solid fa-arrow-left text-lg"></i></a>
                <h1 class="text-base md:text-xl font-black tracking-wide flex items-center">
                    <i class="fa-solid fa-boxes-stacked mr-2 text-xl animate-pulse"></i>
                    彰醫管制藥儲位動態盤點系統
                </h1>
            </div>
            <div class="text-[11px] bg-white/20 px-2.5 py-1 rounded-full backdrop-blur-sm font-bold">彰醫藥劑科</div>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto px-3 mt-4 space-y-4">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-center">
                <label class="text-[10px] font-bold text-slate-400 mb-0.5">🗓️ 選擇核帳日期</label>
                <input type="date" id="targetDate" onchange="loadDailyData()" class="w-full font-black text-slate-700 border rounded-lg p-1.5 text-xs bg-slate-50 outline-none focus:border-red-500">
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-center">
                <label class="text-[10px] font-bold text-slate-400 mb-0.5">✍️ 線上簽章藥師</label>
                <input type="text" id="pharmacistName" value="育伶" placeholder="姓名" class="w-full font-bold text-slate-700 border rounded-lg p-1.5 text-xs bg-slate-50 outline-none focus:border-red-500">
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-center col-span-1">
                <input type="file" id="computerExcel" accept=".xlsx, .xls" class="hidden" onchange="importComputerStock(this)">
                <button onclick="document.getElementById('computerExcel').click()" class="w-full h-full bg-rose-600 hover:bg-rose-700 text-white font-black rounded-lg text-xs shadow transition flex items-center justify-center gap-1 py-2 cursor-pointer">
                    <i class="fa-solid fa-file-upload"></i> 匯入電腦帳
                </button>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col justify-center col-span-1">
                <button onclick="exportMonthlyReport()" class="w-full h-full bg-slate-800 hover:bg-slate-900 text-white font-black rounded-lg text-xs shadow transition flex items-center justify-center gap-1 py-2 cursor-pointer">
                    <i class="fa-solid fa-download"></i> 匯出報表
                </button>
            </div>
        </div>

        <div id="matchStatusBox" class="p-3 rounded-xl font-black text-xs flex justify-between items-center shadow-sm bg-slate-50 border">
            <span id="matchStatusLabel">載入數據中...</span>
        </div>

        <div id="debugBox" class="hidden bg-amber-50 border border-amber-300 rounded-xl p-3 text-xs text-amber-900 font-mono">
            <p class="font-bold mb-1">📢 系統匯入即時診斷分析：</p>
            <div id="debugContent" class="bg-white/80 p-2 rounded border overflow-x-auto max-h-32 whitespace-pre-wrap"></div>
        </div>

        <div class="block lg:hidden space-y-3">
            <div class="bg-slate-200/80 p-2.5 rounded-xl">
                <span class="text-xs font-black text-slate-700 block mb-2"><i class="fa-solid fa-map-location-dot text-red-600"></i> 請選擇目前所在的盤點儲位：</span>
                <div class="grid grid-cols-3 gap-1.5" id="mobileTabHeader">
                    <button type="button" onclick="switchMobileTab(0)" id="btnTab-0" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">雙號台</button>
                    <button type="button" onclick="switchMobileTab(1)" id="btnTab-1" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">罐裝台</button>
                    <button type="button" onclick="switchMobileTab(2)" id="btnTab-2" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">庫存區</button>
                    <button type="button" onclick="switchMobileTab(3)" id="btnTab-3" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">藥車</button>
                    <button type="button" onclick="switchMobileTab(4)" id="btnTab-4" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">住院盒</button>
                    <button type="button" onclick="switchMobileTab(5)" id="btnTab-5" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700">門診盒</button>
                    <button type="button" onclick="switchMobileTab(6)" id="btnTab-6" class="py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700 col-span-3">單號台</button>
                </div>
            </div>
            <div id="mobileZoneCardsContainer" class="space-y-3"></div>
        </div>

        <div class="hidden lg:block bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div class="p-4 bg-slate-50 border-b">
                <h3 class="font-black text-slate-800 text-sm">💻 桌上型電腦完整二維核帳矩陣總覽</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-700 font-black text-xs text-center border-b border-slate-200 divide-x divide-slate-200">
                            <th class="py-3 px-1 w-10" rowspan="2">劑型</th>
                            <th class="py-3 px-3 text-left w-32" rowspan="2">商品名</th>
                            <th class="py-3 px-1 w-20" rowspan="2">規格</th>
                            <th class="py-3 px-1 w-16 text-red-600" rowspan="2">💻電腦帳<br>(總量)</th>
                            <th class="py-3 px-2" colspan="7">📱 實體調劑台儲位盤點區域</th>
                            <th class="py-3 px-1 w-16 text-blue-600" rowspan="2">📊實際總計</th>
                            <th class="py-3 px-1 w-16 text-orange-600" rowspan="2">🚨誤差</th>
                            <th class="py-3 px-1 w-16" rowspan="2">藥師</th>
                        </tr>
                        <tr class="bg-slate-50 text-slate-600 font-bold text-[10px] text-center border-b border-slate-200 divide-x divide-slate-200">
                            <th class="py-1.5 px-0.5 w-16">雙號台</th>
                            <th class="py-1.5 px-0.5 w-16">罐裝台</th>
                            <th class="py-1.5 px-0.5 w-16">庫存區</th>
                            <th class="py-1.5 px-0.5 w-16">藥車Tosho</th>
                            <th class="py-1.5 px-0.5 w-16">住院Tosho</th>
                            <th class="py-1.5 px-0.5 w-16">門診Tosho</th>
                            <th class="py-1.5 px-0.5 w-16">單號台</th>
                        </tr>
                    </thead>
                    <tbody id="matrixTableBody" class="text-slate-700 text-xs divide-y divide-slate-200"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
            authDomain: "drug--arrive.firebaseapp.com",
            databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
            projectId: "drug--arrive",
            storageBucket: "drug--arrive.appspot.com",
            messagingSenderId: "215426668369",
            appId: "1:215426668369:web:eaa94e83974fcec391a570"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const todayStr = new Date().toLocaleDateString('zh-TW', {timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit'}).replace(/\//g, '-');
        document.getElementById('targetDate').value = todayStr;

        const oralList = [
            { id: "ATIO01", name: "Anxiedin", spec: "0.5 mg/tab", disabled: [1, 4, 5] }, 
            { id: "ZOPO01", name: "Apo-Zopiclone", spec: "7.5 mg/tab", disabled: [0, 2, 6] },
            { id: "ALPO02", name: "Aprazo", spec: "0.5 mg/tab", disabled: [4, 5] },
            { id: "BROO19", name: "Bromazin", spec: "3 mg/tab", disabled: [1, 4, 5] },
            { id: "RIVO03", name: "Clonopam", spec: "2 mg/tab", disabled: [4, 5] },
            { id: "DIAO29", name: "Diapin", spec: "2 mg/tab", disabled: [1, 4, 5] },
            { id: "DORO01", name: "Dormicum", spec: "7.5 mg/tab", disabled: [1, 4, 5] },
            { id: "OXAO13", name: "Elinin", spec: "20 mg/tab", disabled: [0, 2, 3, 4, 6] },
            { id: "FLUO66", name: "Flupine", spec: "0.25 mg/tab", disabled: [1, 4, 5] },
            { id: "SANO08", name: "Kinax", spec: "1 mg/tab", disabled: [1, 4, 5] },
            { id: "EURO02", name: "Kinzolam", spec: "2 mg/tab", disabled: [1, 4, 5] },
            { id: "ATIO07", name: "Larpam", spec: "2 mg/tab", disabled: [1, 4, 5] },
            { id: "LENO00", name: "Lendormin", spec: "0.25 mg/tab", disabled: [1, 4, 5] },
            { id: "ATIO12", name: "Lorazepam", spec: "1 mg/tab", disabled: [0, 2, 6] },
            { id: "TRAO16", name: "Muaction SR", spec: "100 mg/tab", disabled: [0, 2, 3, 4, 6] },
            { id: "TRAO33", name: "Opicet", spec: "37.5/325 mg", disabled: [1, 4, 5] },
            { id: "RIVO01", name: "Rivotril", spec: "0.5 mg/tab", disabled: [1, 4, 5] },
            { id: "ZALO04", name: "Sonaplon", spec: "10mg/cap", disabled: [1, 3, 4, 5] },
            { id: "TRAO27", name: "Tramtor", spec: "50 mg/cap", disabled: [1, 4, 5] },
            { id: "ZOLO07", name: "Zolnox", spec: "10 mg/tab", disabled: [1, 4, 5] }
        ];

        const injectList = [
            { id: "ATII01", name: "Anxicam", spec: "2 mg/ml/amp", disabled: [0, 1, 2, 3, 5, 6] }, 
            { id: "PRPIO2", name: "Fresofol", spec: "200mg/20ml", disabled: [0, 1, 3, 5, 6] }, 
            { id: "DORI05", name: "Midatin", spec: "15 mg/3ml", disabled: [0, 1, 3, 5, 6] }, 
            { id: "TRAI11", name: "TRAMTOR", spec: "100 mg/2ml", disabled: [0, 1, 3, 5, 6] }  
        ];

        const allDrugs = [...oralList, ...injectList];
        const subZoneNames = ["雙號調劑台(5-1~3)", "罐裝調劑台", "庫存區 (針劑庫存)", "藥車Tosho", "住院Tosho (針劑調劑)", "門診Tosho", "單號調劑台(5-1~3)"];
        
        let currentDayRecords = {};    
        let activeMobileTab = 0; 

        window.loadDailyData = function() {
            const dateStr = document.getElementById('targetDate').value;
            if (!dateStr) return;

            onValue(ref(db, `controlledMatrixRecords/${dateStr}`), (snapshot) => {
                currentDayRecords = snapshot.val() || {};
                renderMobileZoneList(); 
                renderMatrixTable();    
                recalculateWholePage();
            }, (error) => {
                console.error("Firebase 讀取失敗:", error);
            });
        };

        window.switchMobileTab = function(tabIdx) {
            activeMobileTab = tabIdx;
            for(let i=0; i<7; i++) {
                const btn = document.getElementById(`btnTab-${i}`);
                if(!btn) continue;
                if(i === tabIdx) {
                    btn.className = "py-2 text-xs font-black rounded-lg shadow-sm border transition bg-gradient-to-r from-red-600 to-rose-600 text-white border-transparent scale-105 duration-150";
                } else {
                    btn.className = "py-2 text-xs font-black rounded-lg shadow-sm border transition bg-white text-slate-700 border-slate-200";
                }
            }
            renderMobileZoneList();
        };

        function renderMobileZoneList() {
            const container = document.getElementById('mobileZoneCardsContainer');
            if (!container) return;
            container.innerHTML = '';

            let titleBox = document.createElement('div');
            titleBox.className = "bg-slate-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm flex justify-between items-center";
            
            let zoneTitleText = subZoneNames[activeMobileTab];
            if(activeMobileTab === 2) zoneTitleText = "庫存區 (包含口服與針劑UD庫存)";
            if(activeMobileTab === 4) zoneTitleText = "住院Tosho (包含口服與針劑UD調劑)";
            
            titleBox.innerHTML = `<span>📍 目前儲位：${zoneTitleText}</span> <span class="bg-white/20 text-[10px] px-1.5 py-0.5 rounded">行動模式</span>`;
            container.appendChild(titleBox);

            let hasItems = false;

            allDrugs.forEach((drug) => {
                if (drug.disabled.includes(activeMobileTab)) return;

                hasItems = true;
                const dayData = currentDayRecords[drug.id] || {};
                const cellVal = dayData[`sub_${activeMobileTab}`] !== undefined ? dayData[`sub_${activeMobileTab}`] : 0;
                
                let isInject = injectList.some(j => j.id === drug.id);
                let textBorderColor = isInject ? "border-l-rose-500" : "border-l-amber-500";

                let itemCard = document.createElement('div');
                itemCard.className = `bg-white p-3 rounded-xl shadow-sm border border-slate-200 border-l-4 ${textBorderColor} flex justify-between items-center gap-3`;
                
                itemCard.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <h4 class="text-sm font-black text-slate-800 truncate">${drug.name}</h4>
                        <p class="text-[10px] text-slate-400 font-mono font-bold mt-0.5">${drug.id} · ${drug.spec}</p>
                    </div>
                    <div class="w-32 flex items-center space-x-1.5 justify-end">
                        <input type="number" value="${cellVal}" min="0" pattern="[0-9]*" inputmode="numeric"
                               oninput="liveUpdateFromMobileZone('${drug.id}', ${activeMobileTab}, this.value)"
                               onchange="saveMatrixCell('${drug.id}', ${activeMobileTab}, this.value)"
                               class="w-20 text-center font-black text-lg bg-blue-50/50 text-blue-700 border-2 border-blue-100 rounded-lg py-1 outline-none focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition shadow-inner">
                        <span class="text-xs font-bold text-slate-400">粒/支</span>
                    </div>
                `;
                container.appendChild(itemCard);
            });

            if(!hasItems) {
                container.innerHTML += `<div class="text-center py-8 text-xs text-slate-400 font-bold bg-white rounded-xl border border-dashed">此儲位目前無須盤點四級管制藥品 ✨</div>`;
            }
        }

        window.liveUpdateFromMobileZone = function(drugId, zoneIdx, val) {
            const intVal = parseInt(val) || 0;
            if(!currentDayRecords[drugId]) currentDayRecords[drugId] = {};
            currentDayRecords[drugId][`sub_${zoneIdx}`] = intVal; 
            
            const compInput = document.querySelector(`input[data-comp-drug="${drugId}"][data-comp-sub="${zoneIdx}"]`);
            if(compInput) {
                compInput.value = intVal;
                const dayData = currentDayRecords[drugId] || {};
                const computerCount = Number(dayData.computerStock) || 0;
                liveCalculateMatrix(drugId, computerCount);
            }
        };

        function renderMatrixTable() {
            const tbody = document.getElementById('matrixTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';

            oralList.forEach((drug, idx) => {
                const dayData = currentDayRecords[drug.id] || {};
                const computerCount = dayData.computerStock !== undefined ? Number(dayData.computerStock) : 0;
                let tr = document.createElement('tr');
                tr.className = "divide-x divide-slate-100 text-center hover:bg-slate-50/50 text-xs";
                let typeHtml = idx === 0 ? `<td class="font-black bg-amber-50 text-amber-800 text-xs" rowspan="${oralList.length}">口服</td>` : '';
                
                let html = `${typeHtml}<td class="p-2 text-left font-black">${drug.name}</td><td class="p-1 text-slate-400 font-mono text-[10px]">${drug.spec}</td><td class="p-1 bg-slate-50 font-bold text-slate-500">${computerCount}</td>`;
                
                let rowSum = 0;
                for (let i = 0; i < 7; i++) {
                    const cellVal = dayData[`sub_${i}`] || 0; rowSum += cellVal;
                    if (drug.disabled.includes(i)) { html += `<td class="bg-slate-100 p-0.5"></td>`; }
                    else { html += `<td class="p-0.5"><input type="number" value="${cellVal}" pattern="[0-9]*" inputmode="numeric" data-comp-drug="${drug.id}" data-comp-sub="${i}" oninput="liveCalculateMatrix('${drug.id}', ${computerCount})" onchange="saveMatrixCell('${drug.id}', ${i}, this.value)" class="w-full text-center font-bold border rounded p-1 text-xs outline-none focus:border-red-500 bg-white"></td>`; }
                }
                const err = rowSum - computerCount;
                html += `<td id="total-${drug.id}" class="font-black text-blue-600">${rowSum}</td><td><span id="err-${drug.id}" class="${getErrClass(err)}">${err>0?'+'+err:err}</span></td><td class="text-[10px] text-slate-400 font-bold">${dayData.user||'—'}</td>`;
                tr.innerHTML = html; tbody.appendChild(tr);
            });

            injectList.forEach((drug, idx) => {
                const dayData = currentDayRecords[drug.id] || {};
                const computerCount = dayData.computerStock !== undefined ? Number(dayData.computerStock) : 0;
                let tr = document.createElement('tr');
                tr.className = "divide-x divide-slate-100 text-center hover:bg-slate-50/50 text-xs";
                let typeHtml = idx === 0 ? `<td class="font-black bg-rose-50 text-rose-800 text-xs" rowspan="${injectList.length}">針劑</td>` : '';
                
                let html = `${typeHtml}<td class="p-2 text-left font-black">${drug.name}</td><td class="p-1 text-slate-400 font-mono text-[10px]">${drug.spec}</td><td class="p-1 bg-slate-50 font-bold text-slate-500">${computerCount}</td>`;
                
                let rowSum = 0;
                for (let i = 0; i < 7; i++) {
                    const cellVal = dayData[`sub_${i}`] || 0; rowSum += cellVal;
                    if (drug.disabled.includes(i)) { html += `<td class="bg-slate-100 p-0.5"></td>`; }
                    else { html += `<td class="p-0.5"><input type="number" value="${cellVal}" pattern="[0-9]*" inputmode="numeric" data-comp-drug="${drug.id}" data-comp-sub="${i}" oninput="liveCalculateMatrix('${drug.id}', ${computerCount})" onchange="saveMatrixCell('${drug.id}', ${i}, this.value)" class="w-full text-center font-black text-slate-700 bg-white border rounded p-1 text-xs outline-none"></td>`; }
                }
                const err = rowSum - computerCount;
                html += `<td id="total-${drug.id}" class="font-black text-blue-600">${rowSum}</td><td><span id="err-${drug.id}" class="${getErrClass(err)}">${err>0?'+'+err:err}</span></td><td class="text-[10px] text-slate-400 font-bold">${dayData.user||'—'}</td>`;
                tr.innerHTML = html; tbody.appendChild(tr);
            });
        }

        window.liveCalculateMatrix = function(drugId, computerCount) {
            let sum = 0;
            const inputs = document.querySelectorAll(`input[data-comp-drug="${drugId}"]`);
            inputs.forEach(input => sum += (parseInt(input.value) || 0));
            
            const totalDom = document.getElementById(`total-${drugId}`);
            if(totalDom) totalDom.innerText = sum;
            
            const errSpan = document.getElementById(`err-${drugId}`);
            const diff = sum - computerCount;
            if(errSpan) {
                errSpan.innerText = diff > 0 ? '+' + diff : diff;
                errSpan.className = getErrClass(diff);
            }
        };

        window.saveMatrixCell = function(drugId, subIdx, val) {
            const dateStr = document.getElementById('targetDate').value;
            const userName = document.getElementById('pharmacistName').value || '線上藥師';
            const cellInt = Math.max(0, parseInt(val) || 0);

            const updateMap = {};
            updateMap[`controlledMatrixRecords/${dateStr}/${drugId}/sub_${subIdx}`] = cellInt;
            updateMap[`controlledMatrixRecords/${dateStr}/${drugId}/user`] = userName;

            update(ref(db), updateMap).then(() => {
                recalculateWholePage();
            }).catch(e => console.error("儲存格更新失敗:", e));
        };

        function recalculateWholePage() {
            let totalErrors = 0;
            allDrugs.forEach(drug => {
                const dayData = currentDayRecords[drug.id] || {};
                const computerCount = Number(dayData.computerStock) || 0;
                let sum = 0;
                for (let i = 0; i < 7; i++) sum += Number(dayData[`sub_${i}`] || 0);
                totalErrors += Math.abs(sum - computerCount);
            });

            const box = document.getElementById('matchStatusBox');
            const label = document.getElementById('matchStatusLabel');
            if(!box || !label) return;

            if (totalErrors === 0) {
                box.className = "p-3 rounded-xl font-black text-xs flex justify-between items-center shadow-sm bg-green-50 text-green-700 border border-green-200";
                label.innerHTML = `<i class="fa-solid fa-circle-check text-base mr-1"></i> 彰醫今日管制藥帳物完全相符 (零誤差)`;
            } else {
                box.className = "p-3 rounded-xl font-black text-xs flex justify-between items-center shadow-sm bg-red-50 text-red-700 border border-red-200 animate-pulse";
                label.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-base mr-1"></i> 警告！今日全院累計誤差 ${totalErrors} 粒/支`;
            }
        }

        function getErrClass(err) {
            if (err > 0) return "text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded font-black";
            if (err < 0) return "text-red-600 bg-red-50 px-1.5 py-0.5 rounded font-black";
            return "text-green-600 font-black";
        }

        // 🧠 核心升級：防凍結、全隔離安全匯入大腦
        window.importComputerStock = function(element) {
            const file = element.files[0]; 
            if (!file) return;
            const dateStr = document.getElementById('targetDate').value;
            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonRows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                    
                    let codeIdx = -1;
                    let stockIdx = -1;
                    let foundHeaderRowIdx = -1;
                    let logMsg = "";

                    // 1. 表頭字串安全掃描
                    for (let i = 0; i < Math.min(30, jsonRows.length); i++) {
                        const row = jsonRows[i] || [];
                        let tempCodeIdx = -1;
                        let tempStockIdx = -1;

                        for (let j = 0; j < row.length; j++) {
                            if (row[j] === undefined || row[j] === null) continue;
                            const cellTxt = String(row[j]).replace(/[\s\r\n\t]/g, '').trim();
                            
                            if (cellTxt === "物品代碼" || cellTxt === "藥品代碼" || cellTxt === "藥碼") {
                                tempCodeIdx = j;
                            }
                            if (cellTxt === "總量") {
                                tempStockIdx = j;
                            }
                        }

                        if (tempCodeIdx !== -1 && tempStockIdx !== -1) {
                            codeIdx = tempCodeIdx;
                            stockIdx = tempStockIdx;
                            foundHeaderRowIdx = i;
                            logMsg += `成功比對表頭！物品代碼(第 ${codeIdx+1} 欄)，【總量欄】(第 ${stockIdx+1} 欄)\n`;
                            break;
                        }
                    }

                    // 2. 兜底座標防線
                    if (codeIdx === -1 || stockIdx === -1) {
                        logMsg += `提示：未辨識出表頭文字，啟動彰醫二維固定座標特徵掃描...\n`;
                        for (let i = 0; i < Math.min(100, jsonRows.length); i++) {
                            const row = jsonRows[i] || [];
                            for (let j = 0; j < row.length; j++) {
                                if (row[j] === undefined || row[j] === null) continue;
                                const val = String(row[j]).replace(/[\s\r\n\t]/g, '').trim().toUpperCase();
                                if (allDrugs.some(d => val === d.id)) {
                                    codeIdx = j;
                                    foundHeaderRowIdx = Math.max(0, i - 1);
                                    break;
                                }
                            }
                            if (codeIdx !== -1) break;
                        }
                        stockIdx = 8; // 強制指定原始報表 I 欄
                        if (codeIdx === -1) codeIdx = 1; 
                        logMsg += `防禦盲測綁定：代碼欄(第 ${codeIdx+1} 欄)，總量欄(第 ${stockIdx+1} 欄)\n`;
                    }

                    let upload封包 = {};
                    allDrugs.forEach(d => { 
                        // 保留既有的儲位盤點數據，只覆蓋電腦總量
                        const existing = currentDayRecords[d.id] || {};
                        upload封包[d.id] = {
                            ...existing,
                            computerStock: existing.computerStock || 0
                        };
                    });

                    let matchCount = 0;
                    let previewSamples = [];

                    // 3. 核心逐列隔離安全勾稽（避免任何一列錯誤卡死網頁）
                    jsonRows.forEach((row, rowIdx) => {
                        if (rowIdx <= foundHeaderRowIdx || !row || row[codeIdx] === undefined || row[codeIdx] === null) return;
                        
                        try {
                            const excelCode = String(row[codeIdx]).replace(/[\s\r\n\t]/g, '').trim().toUpperCase();
                            if (!excelCode || excelCode.includes("---") || excelCode.includes("填表人")) return;

                            allDrugs.forEach(d => {
                                const systemCode = d.id.trim().toUpperCase();
                                
                                // 模糊安全包含判定
                                if (excelCode === systemCode || excelCode.includes(systemCode) || systemCode.includes(excelCode)) {
                                    const rawStock = String(row[stockIdx] || '0').replace(/,/g, '').trim();
                                    upload封包[d.id].computerStock = parseFloat(rawStock) || 0;
                                    matchCount++;
                                    
                                    if (previewSamples.length < 4) {
                                        previewSamples.push(`${d.name} [${systemCode}] -> 總量: ${upload封包[d.id].computerStock}`);
                                    }
                                }
                            });
                        } catch (rowErr) {
                            console.warn(`第 ${rowIdx + 1} 列解析被安全跳過:`, rowErr);
                        }
                    });

                    const debugBox = document.getElementById('debugBox');
                    const debugContent = document.getElementById('debugContent');
                    if(debugBox && debugContent) {
                        debugBox.classList.remove('hidden');
                        debugContent.innerText = `${logMsg}\n勾稽狀態：\n${previewSamples.join('\n')}\n共計成功勾稽：${matchCount} 項。`;
                    }

                    set(ref(db, `controlledMatrixRecords/${dateStr}`), upload封包).then(() => {
                        alert(`🎉 匯入完成！已成功對齊並載入 ${matchCount} 項電腦帳總量！`);
                        loadDailyData();
                    });

                } catch (parseErr) {
                    alert(" Excel 檔案結構讀取發生錯誤，請重新整理網頁後再試一次！");
                    console.error(parseErr);
                }
            };
            reader.readAsArrayBuffer(file);
        };

        window.exportMonthlyReport = function() {
            const dateStr = document.getElementById('targetDate').value;
            const exportRows = [
                [`彰化醫院藥劑科 - 四級管制藥儲位分類核帳表 (${dateStr})`],
                ["藥品代碼", "藥品名稱", "規格", "電腦結存(總量)", "實際總計", "對帳誤差", "簽章藥師"]
            ];
            allDrugs.forEach(drug => {
                const dayData = currentDayRecords[drug.id] || {};
                const comp = Number(dayData.computerStock) || 0;
                let sum = 0; for(let i=0; i<7; i++) sum += Number(dayData[`sub_${i}`] || 0);
                exportRows.push([drug.id, drug.name, drug.spec, comp, sum, (sum - comp), dayData.user || '—']);
            });
            const ws = XLSX.utils.aoa_to_sheet(exportRows);
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "儲位盤點報表");
            XLSX.writeFile(wb, `彰醫管制藥對帳表_${dateStr}.xlsx`);
        };

        switchMobileTab(0);
        loadDailyData();
    </script>
</body>
</html>
