<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管制藥日盤核帳與誤差分析中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <nav class="bg-gradient-to-r from-rose-700 to-red-800 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="index.html" class="hover:opacity-80 transition"><i class="fa-solid fa-arrow-left text-xl"></i></a>
                <h1 class="text-xl font-bold tracking-wide flex items-center">
                    <i class="fa-solid fa-capsules mr-2 text-2xl animate-pulse"></i>
                    四級管制藥每日核帳與誤差分析中心
                </h1>
            </div>
            <div class="text-xs bg-white/20 px-3 py-1.5 rounded-full backdrop-blur-sm font-bold">彰化醫院藥劑科</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 mt-6 space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-center">
                <label class="text-xs font-bold text-slate-400 mb-1">🗓️ 選擇核帳日期</label>
                <input type="date" id="targetDate" onchange="loadDailyData()" class="w-full font-black text-slate-700 border rounded-xl p-2 bg-slate-50 shadow-inner outline-none focus:border-red-500">
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-center">
                <label class="text-xs font-bold text-slate-400 mb-1">✍️ 登錄線上藥師姓名</label>
                <input type="text" id="pharmacistName" value="育伶" placeholder="請輸入姓名" class="w-full font-bold text-slate-700 border rounded-xl p-2 bg-slate-50 shadow-inner outline-none focus:border-red-500">
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-center">
                <label class="text-xs font-bold text-slate-400 mb-1">📤 上傳每日電腦結存明細 (Excel)</label>
                <input type="file" id="computerExcel" accept=".xlsx, .xls" class="hidden" onchange="importComputerStock(this)">
                <button onclick="document.getElementById('computerExcel').click()" class="w-full bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-700 hover:to-rose-700 text-white font-black py-2 rounded-xl text-xs shadow-sm active:scale-95 transition flex items-center justify-center gap-1.5 cursor-pointer">
                    <i class="fa-solid fa-file-upload"></i> 匯入當日電腦存量
                </button>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-center">
                <label class="text-xs font-bold text-slate-400 mb-1">💾 下載歷史核帳統計</label>
                <button onclick="exportMonthlyReport()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-black py-2 rounded-xl text-xs shadow-sm active:scale-95 transition flex items-center justify-center gap-1.5 cursor-pointer">
                    <i class="fa-solid fa-download"></i> 匯出當月量與誤差表
                </button>
            </div>
        </div>

        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-sm font-black text-slate-800 flex items-center gap-1"><i class="fa-solid fa-chart-line text-red-500"></i> 本月份每日誤差量趨勢監控 (自動連動線上輸入)</h3>
                <span class="text-[10px] bg-red-50 text-red-600 font-bold px-2 py-0.5 rounded-md">單位: 粒/支</span>
            </div>
            <div class="w-full h-[240px] relative">
                <canvas id="monthlyErrorChart"></canvas>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-5 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 bg-slate-50/50">
                <div>
                    <h3 class="font-black text-slate-800 text-md">📋 <span id="currentDateLabel"></span> 管制藥現場對帳表</h3>
                    <p class="text-[11px] text-slate-400 font-medium mt-0.5">💡 線上藥師可直接在【現場盤點量】格子內輸入或修改，系統會即時存檔並計算誤差！</p>
                </div>
                <span class="text-xs font-black" id="matchStatusLabel">讀取數據中...</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100/70 border-b border-slate-100 text-slate-500 font-bold text-xs uppercase tracking-wider">
                            <th class="py-4 px-6">藥品代碼</th>
                            <th class="py-4 px-6">藥品名稱</th>
                            <th class="py-4 px-6 text-center w-36">💻 當日電腦存量</th>
                            <th class="py-4 px-6 text-center w-44">📱 現場盤點量 (可直接輸入)</th>
                            <th class="py-4 px-6 text-center w-36">🚨 盤點誤差量</th>
                            <th class="py-4 px-6 text-center">最後負責藥師</th>
                        </tr>
                    </thead>
                    <tbody id="controlledTableBody" class="text-slate-700 text-sm divide-y divide-slate-50">
                        <tr><td colspan="6" class="text-center py-8 text-slate-400 font-medium">⏳ 正在與 Firebase 同步即時管制藥數據...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAodw0pIkfOUKcWb8hVHLie_QvG0blRN48",
            authDomain: "drug--arrive.firebaseapp.com",
            databaseURL: "https://drug--arrive-default-rtdb.firebaseio.com",
            projectId: "drug--arrive",
            storageBucket: "drug--arrive.appspot.com",
            messagingSenderId: "215426668369",
            appId: "1:215426668369:web:eaa94e83974fcec391a570"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 設定初始日期
        const todayStr = new Date().toLocaleDateString('zh-TW', {timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit'}).replace(/\//g, '-');
        document.getElementById('targetDate').value = todayStr;

        let controlledMasterList = []; 
        let currentDayRecords = {};    
        let fullMonthRecords = {};     
        let errorChart = null;         

        // 1. 讀取管制藥主品項清單
        onValue(ref(db, 'masterInjectList'), (snapshot) => {
            const data = snapshot.val() || {};
            controlledMasterList = Object.values(data).filter(d => d.subZone && d.subZone.includes('管制藥'));
            loadDailyData();
        });

        // 2. 切換日期與讀取歷史
        window.loadDailyData = function() {
            const dateStr = document.getElementById('targetDate').value;
            if (!dateStr) return;
            document.getElementById('currentDateLabel').innerText = dateStr;

            onValue(ref(db, `controlledDailyRecords/${dateStr}`), (snapshot) => {
                currentDayRecords = snapshot.val() || {};
                renderControlledTable();
            });

            // 讀取整月數據供圖表分析
            const currentYearMonth = dateStr.substring(0, 7);
            onValue(ref(db, `controlledDailyRecords`), (snapshot) => {
                fullMonthRecords = snapshot.val() || {};
                updateMonthlyChart(currentYearMonth);
            });
        };

        // 3. 核心：繪製具有即時輸入格子的對帳表
        function renderControlledTable() {
            const tbody = document.getElementById('controlledTableBody');
            if (!tbody || controlledMasterList.length === 0) return;

            tbody.innerHTML = '';
            let totalErrors = 0;

            controlledMasterList.forEach(drug => {
                const dayData = currentDayRecords[drug.id] || { computerStock: 0, actualStock: 0, user: '—' };
                const computerCount = Number(dayData.computerStock) || 0;
                const actualCount = Number(dayData.actualStock) || 0;
                
                // 計算誤差量
                const errorCount = actualCount - computerCount;
                totalErrors += Math.abs(errorCount);

                let errorClass = "text-slate-300 font-bold";
                if (errorCount > 0) errorClass = "text-amber-600 bg-amber-50 px-2.5 py-1 rounded-lg font-black";
                if (errorCount < 0) errorClass = "text-red-600 bg-red-50 px-2.5 py-1 rounded-lg font-black";
                if (errorCount === 0 && actualCount > 0) errorClass = "text-green-600 font-black";

                let tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition text-slate-600 font-medium";
                
                tr.innerHTML = `
                    <td class="py-4 px-6 font-mono font-bold text-slate-800">${drug.id}</td>
                    <td class="py-4 px-6 font-black text-slate-700">${drug.name}</td>
                    <td class="py-4 px-6 text-center font-bold text-slate-500">${computerCount}</td>
                    <td class="py-3 px-6 text-center">
                        <input type="number" 
                               value="${actualCount || 0}" 
                               oninput="liveCalculateError('${drug.id}', this.value, ${computerCount})"
                               onchange="saveActualStock('${drug.id}', this.value)"
                               class="w-28 text-center font-black text-blue-600 bg-blue-50/50 border border-blue-200 rounded-xl p-1.5 focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition shadow-inner">
                    </td>
                    <td class="py-4 px-6 text-center">
                        <span id="err-${drug.id}" class="${errorClass}">${errorCount > 0 ? '+' + errorCount : errorCount}</span>
                    </td>
                    <td class="py-4 px-6 text-center text-xs text-slate-400 font-bold" id="user-${drug.id}">${dayData.user || '—'}</td>
                `;
                tbody.appendChild(tr);
            });

            updateTopStatusLabel(totalErrors);
        }

        // 4. ✨ 貼心小功能：打字的當下「即時計算誤差」，不需要重新整理網頁
        window.liveCalculateError = function(drugId, val, computerCount) {
            const actualCount = parseInt(val) || 0;
            const errorCount = actualCount - computerCount;
            const errSpan = document.getElementById(`err-${drugId}`);
            
            if (errSpan) {
                errSpan.innerText = errorCount > 0 ? '+' + errorCount : errorCount;
                errSpan.className = ""; // 清除舊樣式
                if (errorCount > 0) errSpan.className = "text-amber-600 bg-amber-50 px-2.5 py-1 rounded-lg font-black";
                else if (errorCount < 0) errSpan.className = "text-red-600 bg-red-50 px-2.5 py-1 rounded-lg font-black";
                else errSpan.className = "text-green-600 font-black";
            }
        };

        // 5. ✨ 自動存檔：當藥師點擊其他地方或按 Enter 時，自動悄悄寫入 Firebase
        window.saveActualStock = function(drugId, val) {
            const dateStr = document.getElementById('targetDate').value;
            const userName = document.getElementById('pharmacistName').value || '線上藥師';
            const actualCount = parseInt(val) || 0;

            const updateData = {};
            updateData[`controlledDailyRecords/${dateStr}/${drugId}/actualStock`] = actualCount;
            updateData[`controlledDailyRecords/${dateStr}/${drugId}/user`] = userName;

            update(ref(db), updateData).then(() => {
                document.getElementById(`user-${drugId}`).innerText = userName;
                // 重新計算整頁累計總誤差，點亮頂端警報
                recalculateTotalPageError();
            });
        };

        // 重新統計整頁總誤差
        function recalculateTotalPageError() {
            let totalErrors = 0;
            controlledMasterList.forEach(drug => {
                const errSpan = document.getElementById(`err-${drug.id}`);
                if (errSpan) {
                    const errVal = parseInt(errSpan.innerText) || 0;
                    totalErrors += Math.abs(errVal);
                }
            });
            updateTopStatusLabel(totalErrors);
        }

        function updateTopStatusLabel(totalErrors) {
            const statusLabel = document.getElementById('matchStatusLabel');
            if (totalErrors === 0) {
                statusLabel.className = "text-xs font-black text-green-600 bg-green-50 px-3 py-1.5 rounded-full shadow-sm";
                statusLabel.innerHTML = `<i class="fa-solid fa-circle-check"></i> 當日帳物完全相符 (零誤差)`;
            } else {
                statusLabel.className = "text-xs font-black text-red-600 bg-red-50 px-3 py-1.5 rounded-full shadow-sm animate-pulse";
                statusLabel.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> 警告！今日累計誤差 ${totalErrors} 粒/支`;
            }
        }

        // 6. 解析並匯入每日電腦存量 Excel
        window.importComputerStock = function(element) {
            const file = element.files[0];
            if (!file) return;

            const dateStr = document.getElementById('targetDate').value;
            const userName = document.getElementById('pharmacistName').value || '線上藥師';
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

                let codeIdx = -1, stockIdx = -1;
                for(let i=0; i<Math.min(10, jsonData.length); i++) {
                    const row = jsonData[i] || [];
                    codeIdx = row.findIndex(c => String(c).includes("藥碼") || String(c).includes("藥品碼") || String(c).includes("代碼"));
                    stockIdx = row.findIndex(c => String(c).includes("存量") || String(c).includes("結存") || String(c).includes("帳面"));
                    if(codeIdx !== -1 && stockIdx !== -1) break;
                }
                if(codeIdx === -1) codeIdx = 0; 
                if(stockIdx === -1) stockIdx = 4; 

                let upload封包 = {};
                controlledMasterList.forEach(d => {
                    upload封包[d.id] = { 
                        computerStock: currentDayRecords[d.id]?.computerStock || 0,
                        actualStock: currentDayRecords[d.id]?.actualStock || 0,
                        user: currentDayRecords[d.id]?.user || '—'
                    };
                });

                jsonData.forEach(row => {
                    if(!row || !row[codeIdx]) return;
                    const code = String(row[codeIdx]).trim();
                    const stock = parseInt(row[stockIdx]) || 0;
                    
                    if (controlledMasterList.some(d => d.id === code)) {
                        if (!upload封包[code]) upload封包[code] = { actualStock: 0, user: userName };
                        upload封包[code].computerStock = stock;
                    }
                });

                set(ref(db, `controlledDailyRecords/${dateStr}`), upload封包).then(() => {
                    alert(`🎉 ${dateStr} 電腦帳面結存匯入成功！`);
                    loadDailyData();
                });
            };
            reader.readAsArrayBuffer(file);
        };

        // 7. 繪製並更新本月份每日誤差量趨勢圖表
        function updateMonthlyChart(yearMonth) {
            const ctx = document.getElementById('monthlyErrorChart');
            if (!ctx) return;

            let daysInMonth = [];
            for (let d = 1; d <= 31; d++) daysInMonth.push(`${d}日`);

            let datasetMap = {};
            // 為每款管制藥配置隨機且柔和的線條顏色
            const colors = ['#e11d48', '#ea580c', '#d97706', '#059669', '#2563eb', '#7c3aed', '#db2777', '#4b5563'];
            
            controlledMasterList.forEach((drug, idx) => {
                datasetMap[drug.id] = {
                    label: drug.name.substring(0, 10),
                    data: new Array(31).fill(0),
                    borderColor: colors[idx % colors.length],
                    backgroundColor: colors[idx % colors.length] + '20',
                    borderWidth: 2,
                    pointRadius: 3,
                    tension: 0.1,
                    fill: false
                };
            });

            // 走查當前月份 1~31 日的所有數據
            Object.keys(fullMonthRecords).forEach(dateKey => {
                if (dateKey.startsWith(yearMonth)) {
                    const dayNum = parseInt(dateKey.split('-')[2]);
                    if (dayNum >= 1 && dayNum <= 31) {
                        const dayData = fullMonthRecords[dateKey] || {};
                        controlledMasterList.forEach(drug => {
                            if (datasetMap[drug.id] && dayData[drug.id]) {
                                const comp = Number(dayData[drug.id].computerStock) || 0;
                                const act = Number(dayData[drug.id].actualStock) || 0;
                                datasetMap[drug.id].data[dayNum - 1] = (act - comp); // 誤差值
                            }
                        });
                    }
                }
            });

            if (errorChart) errorChart.destroy();

            errorChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: daysInMonth,
                    datasets: Object.values(datasetMap)
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            title: { display: true, text: '誤差值 (實際-電腦)', font: { weight: 'bold', size: 11 } },
                            grid: { color: '#f1f5f9' }
                        },
                        x: { grid: { display: false } }
                    },
                    plugins: {
                        legend: { labels: { font: { size: 10, weight: 'bold' } }, position: 'bottom' }
                    }
                }
            });
        }

        // 8. 匯出月統計報表明細
        window.exportMonthlyReport = function() {
            const dateStr = document.getElementById('targetDate').value;
            const currentYearMonth = dateStr.substring(0, 7);

            const exportRows = [
                [`彰化醫院藥劑科 - 四級管制藥月份盤點量與誤差匯總統計表 (${currentYearMonth})`],
                ["匯出時間：" + new Date().toLocaleString('zh-TW')],
                [],
                ["藥品代碼", "藥品名稱", "電腦帳面存量", "現場實際盤點量", "盤點誤差量", "最後核對藥師"]
            ];

            controlledMasterList.forEach(drug => {
                const dayData = currentDayRecords[drug.id] || { computerStock: 0, actualStock: 0, user: '—' };
                const comp = Number(dayData.computerStock) || 0;
                const act = Number(dayData.actualStock) || 0;
                exportRows.push([
                    drug.id, 
                    drug.name, 
                    comp, 
                    act, 
                    (act - comp), 
                    dayData.user || '—'
                ]);
            });

            const ws = XLSX.utils.aoa_to_sheet(exportRows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "當日管制藥誤差對帳");
            XLSX.writeFile(wb, `彰醫四級管制藥核帳報表_${dateStr}.xlsx`);
        };
    </script>
</body>
</html>
