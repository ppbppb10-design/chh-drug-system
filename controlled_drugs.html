<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管制藥日盤核帳與誤差分析中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-12">

    <nav class="bg-gradient-to-r from-red-700 to-rose-800 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-[1600px] mx-auto px-4 py-3.5 flex justify-between items-center">
            <h1 class="text-base md:text-xl font-black tracking-wide flex items-center">
                <i class="fa-solid fa-boxes-stacked mr-2 text-xl"></i> 彰醫管制藥儲位動態盤點系統
            </h1>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto px-3 mt-4 space-y-4">
        <!-- 控制面板 -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
            <input type="date" id="targetDate" class="p-2 border rounded-lg text-xs">
            <select id="pharmacistName" class="p-2 border rounded-lg text-xs font-bold">
                <option value="" disabled selected>⚠️ 請選盤點藥師...</option>
                <option value="劉育伶">劉育伶</option>
                <option value="陳東錦">陳東錦</option><option value="賴錦益">賴錦益</option>
                <!-- 其他藥師選項 -->
            </select>
            <button id="btnLockDay" class="bg-emerald-600 text-white font-black rounded-lg text-xs">結束今日</button>
            <button onclick="document.getElementById('computerExcel').click()" class="bg-rose-600 text-white font-black rounded-lg text-xs">匯入電腦帳</button>
            <input type="file" id="computerExcel" class="hidden">
            <button id="btnExport" class="bg-slate-800 text-white font-black rounded-lg text-xs">匯出報表</button>
        </div>

        <div id="matchStatusBox" class="p-3 rounded-xl font-black text-xs shadow-sm bg-slate-50 border"></div>

        <!-- 手機切換區 -->
        <div class="block lg:hidden space-y-3">
            <div class="grid grid-cols-4 gap-1.5" id="mobileTabHeader">
                <button type="button" data-tab="6" class="mobile-tab-btn py-2 text-xs font-black rounded-lg bg-white border">單號台</button>
                <button type="button" data-tab="0" class="mobile-tab-btn py-2 text-xs font-black rounded-lg bg-white border">雙號台</button>
                <button type="button" data-tab="1" class="mobile-tab-btn py-2 text-xs font-black rounded-lg bg-white border">罐裝台</button>
                <button type="button" data-tab="2" class="mobile-tab-btn py-2 text-xs font-black rounded-lg bg-white border">庫存區</button>
            </div>
            <div id="mobileZoneCardsContainer" class="space-y-3"></div>
        </div>

        <!-- 電腦表格區 -->
        <div class="hidden lg:block bg-white rounded-2xl shadow-sm border overflow-hidden">
            <table class="w-full text-center text-xs">
                <thead><tr class="bg-slate-100"><th class="py-3">藥名</th><th class="py-3">規格</th><th class="py-3">盤點值</th></tr></thead>
                <tbody id="matrixTableBody"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";
        
        const firebaseConfig = { /* ...您原本的設定... */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const oralList = [
            { id: "ATIO01", name: "Anxiedin", spec: "0.5 mg/tab", disabled: [1, 4, 5] }, 
            { id: "ZOPO01", name: "Apo-Zopiclone", spec: "7.5 mg/tab", disabled: [0, 2, 6] }
            // ...其他藥品
        ];
        const allDrugs = [...oralList];
        let currentDayRecords = {};
        let activeMobileTab = 6;

        function refreshUI() {
            renderMatrixTable();
            renderMobileZoneList();
        }

        function renderMatrixTable() {
            const tbody = document.getElementById('matrixTableBody');
            if(!tbody) return;
            tbody.innerHTML = '';
            allDrugs.forEach(drug => {
                let tr = document.createElement('tr');
                tr.innerHTML = `<td class="p-2 font-black">${drug.name}</td><td class="p-2">${drug.spec}</td><td class="p-2"><input type="number" data-drug="${drug.id}" class="matrix-input border p-1 w-20 text-center"></td>`;
                tbody.appendChild(tr);
            });
        }

        function renderMobileZoneList() {
            const container = document.getElementById('mobileZoneCardsContainer');
            if(!container) return;
            container.innerHTML = '';
            allDrugs.forEach(drug => {
                if(drug.disabled.includes(activeMobileTab)) return;
                let div = document.createElement('div');
                div.className = "bg-white p-3 rounded-xl border flex justify-between";
                div.innerHTML = `<span>${drug.name}</span><input type="number" class="mobile-input w-20 border p-1 text-center" data-drug="${drug.id}">`;
                container.appendChild(div);
            });
        }

        // 初始化
        document.getElementById('mobileTabHeader').addEventListener('click', (e) => {
            if(e.target.tagName === 'BUTTON') {
                activeMobileTab = parseInt(e.target.getAttribute('data-tab'));
                refreshUI();
            }
        });

        loadDailyData(); // 確保開局執行
    </script>
</body>
</html>
